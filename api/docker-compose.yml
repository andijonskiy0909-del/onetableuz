version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: onetable
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/onetable
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - BOT_TOKEN=${BOT_TOKEN}
      - PAYME_MERCHANT_ID=${PAYME_MERCHANT_ID}
      - PAYME_KEY=${PAYME_KEY}
      - CLICK_SERVICE_ID=${CLICK_SERVICE_ID}
      - CLICK_MERCHANT_ID=${CLICK_MERCHANT_ID}
      - CLICK_SECRET=${CLICK_SECRET}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - API_URL=${API_URL}
      - WEBAPP_URL=${WEBAPP_URL}
    ports:
      - "3000:3000"
    volumes:
      - ./logs:/app/logs

  bot:
    build: .
    command: node bot/index.js
    depends_on:
      - redis
    environment:
      - NODE_ENV=production
      - BOT_TOKEN=${BOT_TOKEN}
      - API_URL=${API_URL}
      - REDIS_URL=redis://redis:6379
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
