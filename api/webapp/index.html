/* ===== TABS ===== */
function switchTab(tab) {
  if (S.tab === tab && tab !== 'reels') return;
  S.tab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  haptic('light');
  if (tab === 'reels')     loadReels();
  if (tab === 'bookings')  loadBookings();
  if (tab === 'favorites') renderFavorites();
  if (tab === 'profile')   renderProfile();
  // Adjust body padding for reels
  document.getElementById('app').style.paddingBottom =
    tab === 'reels' ? '0' : `calc(var(--tabbar-h) + var(--safe-b))`;
}

/* ===== BOOKING SHEET ===== */
async function openSheet(restaurantId) {
  const r = S.restaurants.find(x => x.id === restaurantId);
  if (!r) return;
  S.booking = {
    restaurant: r, step: 1,
    zones: [], menu: [],
    zone: null, date: isoDate(new Date()), time: null,
    guests: 2, preOrder: {}, availability: [],
  };
  document.getElementById('sheet-title').textContent = r.name;
  document.getElementById('sheet-body').innerHTML = `<div style="padding:40px 0;text-align:center;color:var(--ink-muted)"><div class="spin"></div></div>`;
  document.getElementById('sheet-foot').innerHTML = '';
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  if (tg?.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(closeSheet); }
  try {
    const [zones, menu] = await Promise.all([
      api(`/restaurants/${restaurantId}/zones`).catch(()=>[]),
      api(`/restaurants/${restaurantId}/menu`).catch(()=>[]),
    ]);
    S.booking.zones = Array.isArray(zones) ? zones : (zones.zones || []);
    S.booking.menu  = Array.isArray(menu)  ? menu  : (menu.menu || menu.items || []);
  } catch {}
  renderStep();
}
function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  if (tg?.BackButton) { tg.BackButton.hide(); tg.BackButton.offClick(closeSheet); }
}

function stepsBar() {
  const b = S.booking;
  return `<div class="steps-bar">
    <div class="step-seg ${b.step>1?'done':b.step===1?'active':''}"></div>
    <div class="step-seg ${b.step>2?'done':b.step===2?'active':''}"></div>
    <div class="step-seg ${b.step===3?'active':''}"></div>
  </div>`;
}

function renderStep() {
  const b = S.booking;
  const body = document.getElementById('sheet-body');
  const foot = document.getElementById('sheet-foot');

  if (b.step === 1) {
    const zones = b.zones.length ? b.zones : [{ id: null, name: 'Asosiy zal', capacity: b.restaurant.capacity || 50 }];
    const zonesHTML = zones.map(z => `
      <button class="zone-card${b.zone?.id===z.id?' active':''}" data-zid="${z.id??''}">
        <div class="zn">${esc(z.name)}</div>
        <div class="zc">${z.capacity||''} ${T('people')}</div>
      </button>`).join('');

    const dateHTML = Array.from({length:14}, (_,i) => {
      const d = addDays(i);
      const iso = isoDate(d);
      const dow = i===0 ? T('today') : i===1 ? T('tomorrow') : T('days')[d.getDay()];
      return `<button class="date-card${b.date===iso?' active':''}" data-date="${iso}">
        <div class="dc-dow">${dow.slice(0,3)}</div>
        <div class="dc-day">${d.getDate()}</div>
        <div class="dc-mon">${T('months')[d.getMonth()]}</div>
      </button>`;
    }).join('');

    body.innerHTML = `
      ${stepsBar()}
      <div class="field-block">
        <div class="field-label">${T('zone_lbl')}</div>
        <div class="zone-grid">${zonesHTML}</div>
      </div>
      <div class="field-block">
        <div class="field-label">${T('date_lbl')}</div>
        <div class="date-row">${dateHTML}</div>
      </div>
      <div class="field-block">
        <div class="field-label">${T('guests_lbl')}</div>
        <div class="guests-control">
          <div class="guests-display">
            <div class="guests-num">${b.guests}</div>
            <div class="guests-unit">${T('people')}</div>
          </div>
          <div class="guests-btns">
            <button class="g-btn" id="g-minus" ${b.guests<=1?'disabled':''}>−</button>
            <button class="g-btn" id="g-plus"  ${b.guests>=20?'disabled':''}>+</button>
          </div>
        </div>
      </div>`;

    foot.innerHTML = `<button class="btn-primary" id="step-next" ${!b.zone?'disabled':''}>${T('next')} →</button>`;

    body.querySelectorAll('.zone-card').forEach(el => el.addEventListener('click', () => {
      haptic('light');
      const zid = el.dataset.zid;
      b.zone = b.zones.find(z => String(z.id)===zid) || { id: null, name: el.querySelector('.zn').textContent };
      renderStep();
    }));
    body.querySelectorAll('.date-card').forEach(el => el.addEventListener('click', () => {
      haptic('light'); b.date = el.dataset.date; renderStep();
    }));
    document.getElementById('g-minus').addEventListener('click', () => { if(b.guests>1){b.guests--;haptic('light');renderStep();} });
    document.getElementById('g-plus').addEventListener('click',  () => { if(b.guests<20){b.guests++;haptic('light');renderStep();} });
    document.getElementById('step-next').addEventListener('click', async () => {
      if(!b.zone) return;
      haptic('medium'); b.step=2;
      try {
        const av = await api(`/restaurants/${b.restaurant.id}/availability?date=${b.date}`);
        b.availability = Array.isArray(av) ? av : (av.slots||av.busy||[]);
      } catch { b.availability = []; }
      renderStep();
    });

  } else if (b.step === 2) {
    const slots = [];
    for (let h=10;h<=23;h++) { slots.push(`${String(h).padStart(2,'0')}:00`); if(h<23)slots.push(`${String(h).padStart(2,'0')}:30`); }
    const busy = new Set((b.availability||[]).map(a => typeof a==='string'?a.slice(0,5):(a.time||'').slice(0,5)));

    body.innerHTML = `
      ${stepsBar()}
      <div class="field-block">
        <div class="field-label">${T('time_lbl')} <span class="field-label-hint">${humanDate(b.date)}</span></div>
        <div class="time-grid">
          ${slots.map(s => {
            const isBusy = busy.has(s);
            return `<button class="time-card${b.time===s?' active':''}" ${isBusy?'disabled':''} data-time="${s}">${s}</button>`;
          }).join('')}
        </div>
        ${!slots.filter(s=>!busy.has(s)).length ? `<div style="text-align:center;padding:20px;color:var(--ink-muted);font-size:13px;">${T('no_time_slots')}</div>` : ''}
      </div>`;

    foot.innerHTML = `
      <div style="display:flex;gap:10px;">
        <button class="btn-primary" id="step-back" style="background:var(--bg-subtle);color:var(--ink);box-shadow:none;flex:0 0 48px;">←</button>
        <button class="btn-primary" id="step-next" ${!b.time?'disabled':''} style="flex:1">${T('next')} →</button>
      </div>`;

    body.querySelectorAll('.time-card:not([disabled])').forEach(el => el.addEventListener('click', () => {
      haptic('medium'); b.time = el.dataset.time; renderStep();
    }));
    document.getElementById('step-back').addEventListener('click', () => { haptic('light'); b.step=1; renderStep(); });
    document.getElementById('step-next').addEventListener('click', () => { if(!b.time)return; haptic('medium'); b.step=3; renderStep(); });

  } else if (b.step === 3) {
    const menu = b.menu || [];
    const menuHTML = menu.length
      ? menu.slice(0,30).map(m => {
          const qty = b.preOrder[m.id]||0;
          return `<div class="menu-item-row">
            ${m.image_url ? `<img class="mi-img" src="${esc(m.image_url)}" loading="lazy" onerror="this.style.display='none'">` : `<div class="mi-img" style="display:flex;align-items:center;justify-content:center;font-size:24px;">🍽</div>`}
            <div class="mi-info">
              <div class="mi-name">${esc(m.name)}</div>
              ${m.description?`<div class="mi-desc">${esc(m.description)}</div>`:''}
              <div class="mi-price">${fmt(m.price)} ${T('sum')}</div>
            </div>
            <div class="mi-controls">
              <button class="mi-ctrl-btn" data-id="${m.id}" data-act="minus" ${qty===0?'style="opacity:0.25"':''}>−</button>
              <div class="mi-qty">${qty}</div>
              <button class="mi-ctrl-btn add" data-id="${m.id}" data-act="plus">+</button>
            </div>
          </div>`;
        }).join('')
      : `<div style="text-align:center;padding:30px 0;color:var(--ink-muted);font-size:14px;">—</div>`;

    const total = Object.entries(b.preOrder).reduce((s,[id,q]) => {
      const item = menu.find(x=>String(x.id)===String(id));
      return s + (item?(item.price||0)*q:0);
    },0);

    body.innerHTML = `
      ${stepsBar()}
      <div class="field-block">
        <div class="field-label">${T('preorder_lbl')}</div>
        <div style="font-size:12.5px;color:var(--ink-muted);margin-bottom:14px;">${T('preorder_hint')}</div>
        ${menuHTML}
      </div>`;

    foot.innerHTML = `
      ${total>0?`<div class="order-summary"><span class="os-lbl">${T('total')}</span><span class="os-val">${fmt(total)} ${T('sum')}</span></div>`:''}
      <div style="display:flex;gap:10px;">
        <button class="btn-primary" id="step-back" style="background:var(--bg-subtle);color:var(--ink);box-shadow:none;flex:0 0 48px;">←</button>
        <button class="btn-primary" id="step-confirm" style="flex:1">
          ${total===0?T('skip')+' & '+T('confirm'):T('confirm')} · ${b.time}
        </button>
      </div>`;

    body.querySelectorAll('[data-act]').forEach(btn => btn.addEventListener('click', () => {
      haptic('light');
      const id=btn.dataset.id, act=btn.dataset.act;
      const cur = b.preOrder[id]||0;
      if(act==='plus') b.preOrder[id]=cur+1;
      else if(cur>0) { b.preOrder[id]=cur-1; if(!b.preOrder[id]) delete b.preOrder[id]; }
      renderStep();
    }));
    document.getElementById('step-back').addEventListener('click', () => { haptic('light'); b.step=2; renderStep(); });
    document.getElementById('step-confirm').addEventListener('click', submitBooking);
  }
}

async function submitBooking() {
  const b = S.booking;
  const btn = document.getElementById('step-confirm');
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span>`;
  haptic('medium');
  const preOrderArr = Object.entries(b.preOrder).map(([id,qty])=>({menu_item_id:Number(id),quantity:qty}));
  try {
    await api('/reservations', {
      method:'POST',
      body: JSON.stringify({
        restaurant_id: b.restaurant.id,
        zone_id: b.zone?.id || null,
        date: b.date,
        time: b.time,
        guests: b.guests,
        pre_order: preOrderArr.length ? preOrderArr : null,
      })
    });
    haptic('success');
    toast(T('booking_ok'), 'success');
    closeSheet();
    loadBookings();
    switchTab('bookings');
  } catch(e) {
    haptic('error');
    toast(e.message || T('booking_err'), 'error');
    btn.disabled = false;
    btn.innerHTML = `${T('confirm')} · ${b.time}`;
  }
}

/* ===== LANGUAGE ===== */
function setLang(lang) {
  S.lang = lang; localStorage.setItem('ot_lang', lang);
  document.documentElement.lang = lang;
  applyI18n(); renderChips(); renderRestaurants();
}
function cycleLang() {
  const order=['uz','ru','en'];
  setLang(order[(order.indexOf(S.lang)+1)%3]);
  haptic('light');
}
function applyI18n() {
  const flags = {uz:'🇺🇿',ru:'🇷🇺',en:'🇬🇧'};
  document.getElementById('lang-btn').textContent = flags[S.lang];
  document.getElementById('home-eyebrow').textContent = T('welcome');
  document.getElementById('home-greeting').textContent = greeting();
  document.getElementById('home-user-name').textContent = S.user?.first_name || T('guest');
  document.getElementById('search-input').placeholder = T('search_ph');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T(el.dataset.i18n); });
  const ld = document.getElementById('lang-display');
  if (ld) ld.textContent = T('lang_name');
  const insightTitle = document.getElementById('home-insight-title');
  if (insightTitle) insightTitle.innerHTML = T('home_insight_title');
  const reelsTitle = document.getElementById('home-reels-title');
  if (reelsTitle) reelsTitle.innerHTML = T('home_reels_title');
  const seeAll = document.getElementById('see-all-reels-btn');
  if (seeAll) seeAll.textContent = T('see_all');
  renderHomeInsights();
  renderHomeReelsShelf();
}

/* ===== THEME ===== */
function applyTheme() {
  const scheme = tg?.colorScheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', scheme);
  const color = scheme==='dark'?'#100D0A':'#FAF7F2';
  document.querySelector('meta[name="theme-color"]').content = color;
  try { tg?.setHeaderColor?.(color); tg?.setBackgroundColor?.(color); } catch {}
}

/* ===== GEO ===== */
function requestGeo() {
  if (!navigator.geolocation) { S.coords = {lat:41.2995,lng:69.2401}; return; }
  navigator.geolocation.getCurrentPosition(
    p => { S.coords = {lat:p.coords.latitude, lng:p.coords.longitude}; loadRestaurants(); },
    ()  => { S.coords = {lat:41.2995,lng:69.2401}; },
    { timeout:5000, maximumAge:300000 }
  );
}

/* ===== DEEP LINK ===== */
function deepLink() {
  const params = new URLSearchParams(location.search);
  const page = params.get('page'), rid = params.get('restaurant');
  const sp = tg?.initDataUnsafe?.start_param || '';
  if (page === 'bookings') switchTab('bookings');
  const targetId = rid || (sp.startsWith('restaurant_') ? sp.replace('restaurant_','') : null);
  if (targetId) {
    const check = setInterval(() => {
      if (S.restaurants.length) {
        clearInterval(check);
        if (S.restaurants.find(r=>r.id===Number(targetId))) openSheet(Number(targetId));
      }
    },200);
    setTimeout(()=>clearInterval(check), 8000);
  }
}

/* ===== INIT ===== */
async function init() {
  applyTheme();
  if (tg?.onEvent) tg.onEvent('themeChanged', applyTheme);

  // Tab events
  document.querySelectorAll('.tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));

  // Sheet
  document.getElementById('sheet-close-btn').addEventListener('click', closeSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);

  // Lang
  document.getElementById('lang-btn').addEventListener('click', cycleLang);

  // Search
  let st;
  document.getElementById('search-input').addEventListener('input', e => {
    clearTimeout(st);
    const v = e.target.value.trim();
    document.getElementById('search-box').classList.toggle('has-value', !!v);
    st = setTimeout(() => { S.q = v; applyFilters(); }, 240);
  });
  document.getElementById('search-clear').addEventListener('click', () => {
    document.getElementById('search-input').value = '';
    document.getElementById('search-box').classList.remove('has-value');
    S.q = ''; applyFilters();
  });

  // Profile menu
  document.querySelectorAll('.menu-row').forEach(r => {
    r.addEventListener('click', () => {
      const a = r.dataset.action; haptic('light');
      if (a==='language') cycleLang();
      else if (a==='support') { tg?.openTelegramLink?.('https://t.me/onetable_uz_bot') || window.open('https://t.me/onetable_uz_bot','_blank'); }
      else if (a==='about') { tg?.showAlert?.(T('about')) || alert(T('about')); }
    });
  });

  applyI18n();
  renderChips();

  await auth();
  applyI18n();

  requestGeo();
  await loadRestaurants();
  await loadReels();
  deepLink();
}

if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
else init();
</script>
