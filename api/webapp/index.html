<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<title>OneTable — Toshkent restoranlari</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================
   ONETABLE — EDITORIAL WARM HOSPITALITY
   Fraunces (display serif) + Manrope (body sans)
   ============================================================ */

:root {
  /* Warm cream editorial — light */
  --bg: #FAF7F2;
  --bg-elevated: #FFFFFF;
  --bg-subtle: #F2ECE0;
  --bg-overlay: rgba(28, 25, 23, 0.55);

  --ink: #1C1917;
  --ink-soft: #44403C;
  --ink-muted: #8B8178;
  --ink-faint: #B8AFA4;

  --line: #E7E0D2;
  --line-soft: #F0EADC;

  --accent: #7B2D26;           /* deep burgundy */
  --accent-hover: #652019;
  --accent-soft: #F5E6E4;
  --accent-ink: #FFFFFF;

  --gold: #B8813A;             /* warm saffron */
  --gold-soft: #FBF2E3;

  --success: #4A6741;
  --success-soft: #E8EDE4;
  --danger: #9B2C2C;
  --danger-soft: #FBEAEA;

  --radius-xs: 6px;
  --radius-sm: 10px;
  --radius: 18px;
  --radius-lg: 26px;
  --radius-xl: 32px;

  --shadow-xs: 0 1px 2px rgba(60, 40, 20, 0.04);
  --shadow-sm: 0 2px 8px -2px rgba(60, 40, 20, 0.06), 0 1px 3px rgba(60, 40, 20, 0.04);
  --shadow: 0 8px 30px -8px rgba(60, 40, 20, 0.10), 0 3px 10px -3px rgba(60, 40, 20, 0.05);
  --shadow-lg: 0 30px 80px -20px rgba(60, 40, 20, 0.18), 0 10px 30px -10px rgba(60, 40, 20, 0.08);

  --font-display: 'Fraunces', Georgia, 'Times New Roman', serif;
  --font-body: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);

  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

[data-theme="dark"] {
  --bg: #12100E;
  --bg-elevated: #1C1917;
  --bg-subtle: #26211C;
  --bg-overlay: rgba(0, 0, 0, 0.75);

  --ink: #FAF7F2;
  --ink-soft: #E7E0D2;
  --ink-muted: #A8A29E;
  --ink-faint: #6B625A;

  --line: #2A241E;
  --line-soft: #1F1A15;

  --accent: #D4836A;
  --accent-hover: #E89579;
  --accent-soft: #3A2520;

  --gold: #E0A968;
  --gold-soft: #2B2115;

  --success: #7BA16B;
  --success-soft: #1F2A18;
  --danger: #D47373;
  --danger-soft: #2A1818;
}

/* ---------- Reset ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overscroll-behavior-y: none; }
body {
  font-family: var(--font-body);
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  text-rendering: optimizeLegibility;
  font-feature-settings: 'cv11', 'ss01';
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* Subtle grain for warmth */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  opacity: 0.035;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
[data-theme="dark"] body::before { mix-blend-mode: screen; opacity: 0.04; }

/* ---------- Typography ---------- */
.display {
  font-family: var(--font-display);
  font-optical-sizing: auto;
  font-variation-settings: "opsz" 144, "SOFT" 50;
  letter-spacing: -0.02em;
  line-height: 1.05;
}
.display-italic {
  font-family: var(--font-display);
  font-style: italic;
  font-variation-settings: "opsz" 144, "SOFT" 100;
}

/* ---------- App shell ---------- */
#app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  min-height: 100dvh;
  padding-bottom: calc(76px + var(--safe-bottom));
}

/* ---------- Page system ---------- */
.page { display: none; animation: fadeUp 0.5s var(--ease) both; }
.page.active { display: block; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ---------- Top bar ---------- */
.topbar {
  padding: calc(var(--safe-top) + 20px) 20px 8px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.greeting { flex: 1; min-width: 0; }
.greeting .eyebrow {
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 600;
  margin-bottom: 6px;
}
.greeting h1 {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 28px;
  line-height: 1.1;
  letter-spacing: -0.025em;
  color: var(--ink);
  font-variation-settings: "opsz" 144, "SOFT" 50;
}
.greeting h1 em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}
.lang-btn {
  flex-shrink: 0;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  font-size: 18px;
  font-weight: 600;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: transform 0.2s var(--ease-spring);
}
.lang-btn:active { transform: scale(0.92); }

/* ---------- Search ---------- */
.search-wrap { padding: 16px 20px 8px; }
.search {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 14px 18px;
  box-shadow: var(--shadow-xs);
  transition: all 0.2s var(--ease);
}
.search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.search svg { flex-shrink: 0; color: var(--ink-muted); }
.search input {
  flex: 1;
  border: none;
  background: none;
  outline: none;
  font-size: 15px;
  font-weight: 500;
  min-width: 0;
}
.search input::placeholder { color: var(--ink-muted); font-weight: 400; }

/* ---------- Chip row ---------- */
.chip-row {
  display: flex;
  gap: 8px;
  padding: 12px 20px 4px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 10px 18px;
  border-radius: 100px;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-soft);
  white-space: nowrap;
  transition: all 0.25s var(--ease);
}
.chip:active { transform: scale(0.94); }
.chip.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}

/* ---------- Section ---------- */
.section { padding: 24px 20px 8px; }
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 16px;
}
.section-title {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  letter-spacing: -0.02em;
  color: var(--ink);
  font-variation-settings: "opsz" 144, "SOFT" 50;
}
.section-title em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}
.section-link {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink-muted);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

/* ---------- Restaurant card ---------- */
.card-list { display: flex; flex-direction: column; gap: 18px; }
.rest-card {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all 0.3s var(--ease);
  position: relative;
}
.rest-card:active { transform: scale(0.985); box-shadow: var(--shadow); }

.rest-card .image {
  position: relative;
  aspect-ratio: 16/10;
  background: var(--bg-subtle);
  overflow: hidden;
}
.rest-card .image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.6s var(--ease);
}
.rest-card:active .image img { transform: scale(1.04); }

.rest-card .image::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.35) 0%, transparent 50%);
  pointer-events: none;
}

.rest-card .badges {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 2;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 6px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.02em;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.badge-open {
  background: rgba(255,255,255,0.92);
  color: var(--success);
}
.badge-open::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--success);
  box-shadow: 0 0 0 2px rgba(74, 103, 65, 0.25);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}
.badge-closed {
  background: rgba(255,255,255,0.92);
  color: var(--danger);
}
.badge-closed::before {
  content: '';
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--danger);
}
.badge-verified {
  background: rgba(255,255,255,0.92);
  color: var(--accent);
}

.rest-card .body {
  padding: 18px 20px 20px;
}
.rest-card .title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 6px;
}
.rest-card .name {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.02em;
  line-height: 1.15;
  color: var(--ink);
  font-variation-settings: "opsz" 144, "SOFT" 30;
  flex: 1;
  min-width: 0;
}
.rest-card .rating {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}
.rest-card .rating svg { color: var(--gold); }

.rest-card .meta {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 500;
  margin-top: 4px;
}
.rest-card .meta .dot { width: 3px; height: 3px; border-radius: 50%; background: currentColor; opacity: 0.5; }
.rest-card .price { font-weight: 700; color: var(--ink-soft); letter-spacing: 0.05em; }
.rest-card .price .inactive { color: var(--ink-faint); }

.rest-card .foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line-soft);
}
.rest-card .cuisines {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
}
.cuisine-tag {
  font-size: 11px;
  font-weight: 600;
  color: var(--ink-soft);
  padding: 4px 10px;
  background: var(--bg-subtle);
  border-radius: 100px;
  letter-spacing: 0.02em;
}
.book-btn {
  flex-shrink: 0;
  padding: 10px 18px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  transition: all 0.2s var(--ease-spring);
}
.book-btn:active { transform: scale(0.92); }

/* ---------- Skeleton ---------- */
.skeleton {
  background: linear-gradient(90deg, var(--bg-subtle) 0%, var(--line-soft) 50%, var(--bg-subtle) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s linear infinite;
  border-radius: var(--radius);
}
@keyframes shimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}
.sk-card {
  height: 300px;
  border-radius: var(--radius-lg);
}

/* ---------- Empty state ---------- */
.empty {
  padding: 60px 32px;
  text-align: center;
}
.empty .icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  color: var(--ink-muted);
}
.empty h3 {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  margin-bottom: 8px;
  color: var(--ink);
}
.empty p {
  font-size: 14px;
  color: var(--ink-muted);
  max-width: 280px;
  margin: 0 auto;
}

/* ---------- Booking modal (bottom sheet) ---------- */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s var(--ease);
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  max-height: 92vh;
  background: var(--bg);
  border-top-left-radius: var(--radius-xl);
  border-top-right-radius: var(--radius-xl);
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.45s var(--ease);
  display: flex;
  flex-direction: column;
  box-shadow: 0 -20px 60px -20px rgba(0,0,0,0.3);
  padding-bottom: var(--safe-bottom);
}
.sheet.open { transform: translateY(0); }
.sheet .handle {
  width: 40px;
  height: 4px;
  border-radius: 2px;
  background: var(--line);
  margin: 12px auto 8px;
  flex-shrink: 0;
}
.sheet .sheet-head {
  padding: 8px 24px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
}
.sheet .sheet-title {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 400;
  letter-spacing: -0.02em;
  font-variation-settings: "opsz" 144, "SOFT" 50;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sheet-close {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform 0.2s var(--ease-spring);
}
.sheet-close:active { transform: scale(0.9); }

.sheet-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px 24px 24px;
  -webkit-overflow-scrolling: touch;
}
.sheet-foot {
  padding: 16px 24px calc(16px + var(--safe-bottom));
  background: var(--bg);
  border-top: 1px solid var(--line);
  flex-shrink: 0;
}

/* ---------- Steps indicator ---------- */
.steps {
  display: flex;
  gap: 6px;
  margin-bottom: 20px;
}
.step-dot {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: var(--line);
  transition: background 0.3s var(--ease);
}
.step-dot.done { background: var(--accent); }
.step-dot.active { background: var(--ink); }

/* ---------- Form elements ---------- */
.label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
  display: block;
}
.field-group { margin-bottom: 22px; }

.zone-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.zone-opt {
  padding: 16px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  text-align: left;
  transition: all 0.2s var(--ease);
}
.zone-opt:active { transform: scale(0.97); }
.zone-opt.selected {
  border-color: var(--ink);
  background: var(--ink);
  color: var(--bg);
}
.zone-opt .zone-name {
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 2px;
}
.zone-opt .zone-cap {
  font-size: 11px;
  opacity: 0.65;
  font-weight: 500;
}

.date-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
}
.date-row::-webkit-scrollbar { display: none; }
.date-opt {
  flex-shrink: 0;
  min-width: 64px;
  padding: 12px 8px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  text-align: center;
  transition: all 0.2s var(--ease);
}
.date-opt:active { transform: scale(0.94); }
.date-opt.selected {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.date-opt .dow {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  opacity: 0.7;
}
.date-opt .day {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  margin-top: 2px;
  font-variation-settings: "opsz" 144;
}

.guests-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
}
.guests-count {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  font-variation-settings: "opsz" 144;
}
.guests-count small {
  font-family: var(--font-body);
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 500;
  margin-left: 6px;
}
.guests-btns { display: flex; gap: 10px; }
.guests-btn {
  width: 40px; height: 40px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 600;
  transition: all 0.15s var(--ease-spring);
}
.guests-btn:active { transform: scale(0.88); }
.guests-btn:disabled { opacity: 0.3; }

/* Time grid */
.time-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.time-opt {
  padding: 14px 8px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--line);
  border-radius: var(--radius-sm);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  transition: all 0.2s var(--ease);
  font-variant-numeric: tabular-nums;
}
.time-opt:active:not(:disabled) { transform: scale(0.94); }
.time-opt.selected {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.time-opt:disabled {
  opacity: 0.3;
  text-decoration: line-through;
  cursor: not-allowed;
}

/* Menu preorder */
.menu-item {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  border-bottom: 1px solid var(--line-soft);
}
.menu-item:last-child { border-bottom: none; }
.menu-item .mi-info { flex: 1; min-width: 0; }
.menu-item .mi-name {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 2px;
}
.menu-item .mi-desc {
  font-size: 12px;
  color: var(--ink-muted);
  margin-bottom: 6px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.menu-item .mi-price {
  font-weight: 700;
  font-size: 13px;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
}
.menu-item .mi-ctrl {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.mi-btn {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 600;
  transition: transform 0.15s var(--ease-spring);
}
.mi-btn:active { transform: scale(0.88); }
.mi-btn.plus { background: var(--ink); color: var(--bg); }
.mi-qty {
  min-width: 20px;
  text-align: center;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.btn-primary {
  width: 100%;
  padding: 17px 24px;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 700;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.2s var(--ease-spring);
  box-shadow: var(--shadow);
}
.btn-primary:active:not(:disabled) { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.4; }
.btn-secondary {
  width: 100%;
  padding: 15px 24px;
  background: transparent;
  color: var(--ink);
  border: 1.5px solid var(--line);
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  transition: all 0.2s var(--ease);
}
.btn-secondary:active { background: var(--bg-subtle); }

.total-row {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 14px;
  padding: 14px 18px;
  background: var(--bg-subtle);
  border-radius: var(--radius);
}
.total-row .lbl { font-size: 12px; color: var(--ink-muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.total-row .val {
  font-family: var(--font-display);
  font-size: 22px;
  font-weight: 400;
  font-variation-settings: "opsz" 144;
  color: var(--ink);
}

/* ---------- Bookings page ---------- */
.booking-card {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.booking-card .bk-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  gap: 12px;
}
.booking-card .bk-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.015em;
  flex: 1;
}
.bk-status {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 5px 10px;
  border-radius: 100px;
  flex-shrink: 0;
}
.bk-status.pending { background: var(--gold-soft); color: var(--gold); }
.bk-status.confirmed { background: var(--success-soft); color: var(--success); }
.bk-status.cancelled, .bk-status.noshow { background: var(--danger-soft); color: var(--danger); }
.bk-status.completed { background: var(--bg-subtle); color: var(--ink-muted); }

.bk-details {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding-top: 14px;
  border-top: 1px solid var(--line-soft);
}
.bk-detail .bk-lbl {
  font-size: 10px;
  color: var(--ink-muted);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.bk-detail .bk-val {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

.bk-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line-soft);
}
.bk-action {
  flex: 1;
  padding: 10px;
  border-radius: 100px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  border: 1px solid var(--line);
  background: var(--bg-elevated);
  transition: all 0.15s var(--ease);
}
.bk-action:active { transform: scale(0.96); }
.bk-action.danger { color: var(--danger); border-color: var(--danger-soft); }

/* ---------- Profile page ---------- */
.profile-head {
  text-align: center;
  padding: 32px 20px 28px;
}
.profile-avatar {
  width: 96px;
  height: 96px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent) 0%, var(--gold) 100%);

  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--font-display);
  font-size: 36px;
  font-weight: 400;
  color: white;
  box-shadow: var(--shadow-lg);
  font-variation-settings: "opsz" 144;
}
.profile-name {
  font-family: var(--font-display);
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  font-variation-settings: "opsz" 144, "SOFT" 50;
}
.profile-handle {
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 500;
}

.profile-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 0 20px 24px;
}
.profile-stat {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--radius);
  padding: 16px 12px;
  text-align: center;
}
.profile-stat .num {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 400;
  color: var(--ink);
  font-variation-settings: "opsz" 144;
}
.profile-stat .lbl {
  font-size: 10px;
  color: var(--ink-muted);
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 2px;
}

.profile-menu {
  padding: 0 20px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.menu-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  transition: background 0.15s var(--ease);
}
.menu-row:first-child { border-radius: var(--radius) var(--radius) 0 0; }
.menu-row:last-child { border-radius: 0 0 var(--radius) var(--radius); border-top: none; }
.menu-row:only-child { border-radius: var(--radius); }
.menu-row:not(:first-child):not(:last-child) { border-top: none; border-radius: 0; }
.menu-row:active { background: var(--bg-subtle); }
.menu-row .mr-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.menu-row .mr-label {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
}
.menu-row .mr-arrow { color: var(--ink-muted); }

/* ---------- Tab bar ---------- */
.tabbar {
  position: fixed;
  bottom: 0;
  left: 0; right: 0;
  background: var(--bg-elevated);
  border-top: 1px solid var(--line);
  padding: 10px 10px calc(10px + var(--safe-bottom));
  display: flex;
  z-index: 50;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  padding: 8px 4px;
  color: var(--ink-muted);
  transition: color 0.2s var(--ease);
}
.tab.active { color: var(--accent); }
.tab .tab-label {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.tab svg { transition: transform 0.3s var(--ease-spring); }
.tab.active svg { transform: scale(1.1); }

/* ---------- Toast ---------- */
.toast {
  position: fixed;
  top: calc(var(--safe-top) + 20px);
  left: 20px;
  right: 20px;
  background: var(--ink);
  color: var(--bg);
  padding: 14px 20px;
  border-radius: var(--radius);
  font-size: 14px;
  font-weight: 600;
  text-align: center;
  z-index: 200;
  box-shadow: var(--shadow-lg);
  transform: translateY(-120%);
  transition: transform 0.4s var(--ease-spring);
}
.toast.show { transform: translateY(0); }
.toast.success { background: var(--success); }
.toast.error { background: var(--danger); }

/* ---------- Detail sheet for restaurant view ---------- */
.rest-hero {
  position: relative;
  aspect-ratio: 16/10;
  background: var(--bg-subtle);
  margin: -24px -24px 20px;
  overflow: hidden;
}
.rest-hero img { width: 100%; height: 100%; object-fit: cover; }
.rest-hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, var(--bg) 0%, transparent 40%);
}
.rest-detail-title {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 400;
  line-height: 1.05;
  letter-spacing: -0.025em;
  margin-bottom: 8px;
  font-variation-settings: "opsz" 144, "SOFT" 50;
}
.rest-detail-meta {
  display: flex;
  gap: 12px;
  align-items: center;
  color: var(--ink-muted);
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 20px;
}
.rest-detail-section { margin-bottom: 22px; }
.rest-detail-section h4 {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 10px;
}
.rest-detail-section p {
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink-soft);
}

/* Loading spinner */
.spin {
  width: 18px;
  height: 18px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spinA 0.7s linear infinite;
  display: inline-block;
}
@keyframes spinA { to { transform: rotate(360deg); } }

/* Stagger children on reveal */
.stagger > * { animation: fadeUp 0.5s var(--ease) both; }
.stagger > *:nth-child(1) { animation-delay: 0.05s; }
.stagger > *:nth-child(2) { animation-delay: 0.1s; }

.stagger > *:nth-child(7) { animation-delay: 0.35s; }
.stagger > *:nth-child(8) { animation-delay: 0.4s; }

/* =====================================================
   API CLIENT
   ===================================================== */
async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (state.token) headers.Authorization = `Bearer ${state.token}`;
  try {
    const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
    const ct = res.headers.get('content-type') || '';
    const data = ct.includes('application/json') ? await res.json() : await res.text();
    if (!res.ok) throw new Error(data?.error || data?.message || `HTTP ${res.status}`);
    return data;
  } catch (err) {
    console.error('API error:', path, err);
    throw err;
  }
}

/* =====================================================
   TELEGRAM AUTH
   ===================================================== */
async function authenticate() {
  const tgUser = tg?.initDataUnsafe?.user;
  const mockUser = { id: 12345, first_name: 'Guest', username: 'guest', language_code: 'uz' };
  const user = tgUser || mockUser;

  try {
    const res = await api('/auth/telegram', {
      method: 'POST',
      body: JSON.stringify({
        telegram_id: user.id,
        first_name: user.first_name,
        last_name: user.last_name || '',
        username: user.username || '',
        language: user.language_code || 'uz',
        init_data: tg?.initData || ''
      })
    });
    if (res.token) {
      state.token = res.token;
      localStorage.setItem('onetable_token', res.token);
    }
    state.user = res.user || user;
  } catch (e) {
    state.user = user; // fallback
  }
}

/* =====================================================
   HAPTIC + TOAST
   ===================================================== */
function haptic(type = 'light') {
  if (!tg?.HapticFeedback) return;
  if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
  else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
  else if (type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
  else tg.HapticFeedback.impactOccurred(type);
}
let toastTimer;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.classList.remove('show'); }, 2600);
}

/* =====================================================
   GREETING + DATE HELPERS
   ===================================================== */
function getGreeting() {
  const h = new Date().getHours();
  if (h < 6)  return t('good_night');
  if (h < 12) return t('good_morning');
  if (h < 17) return t('good_afternoon');
  if (h < 22) return t('good_evening');
  return t('good_night');
}

function formatCurrency(n) {
  if (!n && n !== 0) return '—';
  return new Intl.NumberFormat('fr-FR').format(n).replace(/\s/g, ' ');
}

function daysFromNow(n) {
  const d = new Date();
  d.setDate(d.getDate() + n);
  return d;
}
function formatDateISO(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

/* Parse working_hours string like "10:00-23:00" or "10:00 - 23:00" */
function isOpenNow(workingHours) {
  if (!workingHours) return null;
  const m = String(workingHours).match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const [_, oh, om, ch, cm] = m.map(Number);
  const now = new Date();
  const cur = now.getHours() * 60 + now.getMinutes();
  const open = oh * 60 + om;
  let close = ch * 60 + cm;
  if (close <= open) close += 24 * 60; // overnight
  return cur >= open && cur <= close;
}

/* =====================================================
   RESTAURANT LIST
   ===================================================== */
async function loadRestaurants() {
  try {
    let url = '/restaurants';
    if (state.coords) url += `?lat=${state.coords.lat}&lng=${state.coords.lng}`;
    const data = await api(url);
    state.restaurants = Array.isArray(data) ? data : (data.restaurants || data.data || []);
    // Filter out demo/inactive
    state.restaurants = state.restaurants.filter(r => r.is_active !== false && r.is_demo !== true);
    // Sort: premium first, then rating
    state.restaurants.sort((a, b) => {
      if (a.is_premium !== b.is_premium) return b.is_premium ? 1 : -1;
      if (state.coords && a.distance_km != null && b.distance_km != null) {
        return a.distance_km - b.distance_km;
      }
      return (b.rating || 0) - (a.rating || 0);
    });
    applyFilters();
  } catch (e) {
    document.getElementById('rest-list').innerHTML = `
      <div class="empty">
        <div class="icon">⚠</div>
        <h3>Ulanib bo'lmadi</h3>
        <p>Internet ulanishini tekshiring yoki qayta urinib ko'ring</p>
      </div>`;
  }
}

function applyFilters() {
  let list = state.restaurants;
  if (state.currentCuisine !== 'all') {
    list = list.filter(r => {
      const cs = Array.isArray(r.cuisine) ? r.cuisine : (r.cuisine ? [r.cuisine] : []);
      return cs.some(c => String(c).toLowerCase().includes(state.currentCuisine.toLowerCase()));
    });
  }
  if (state.currentSearch) {
    const q = state.currentSearch.toLowerCase();
    list = list.filter(r =>
      (r.name || '').toLowerCase().includes(q) ||
      (r.address || '').toLowerCase().includes(q)
    );
  }
  state.filtered = list;
  renderRestaurants();
}

function renderRestaurants() {
  const el = document.getElementById('rest-list');
  const count = document.getElementById('rest-count');
  if (count) count.textContent = `${state.filtered.length} ${t('restaurants_found')}`;

  if (state.filtered.length === 0) {
    el.innerHTML = `
      <div class="empty">
        <div class="icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </div>
        <h3>Hech narsa topilmadi</h3>
        <p>Qidiruvni o'zgartirib ko'ring</p>
      </div>`;
    return;
  }

  el.innerHTML = state.filtered.map(r => {
    const img = r.image_url || (Array.isArray(r.gallery) && r.gallery[0]) || `https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800`;
    const cuisines = Array.isArray(r.cuisine) ? r.cuisine : (r.cuisine ? [r.cuisine] : []);
    const price = r.price_category || '$$';
    const priceDisplay = ['$','$','$'].map((s,i) => {
      const active = (price.match(/\$/g) || []).length > i;
      return `<span class="${active?'':'inactive'}">$</span>`;
    }).join('');
    const open = isOpenNow(r.working_hours);
    const openBadge = open === true
      ? `<span class="badge badge-open">${t('open_now')}</span>`
      : open === false
        ? `<span class="badge badge-closed">${t('closed_now')}</span>`
        : '<span></span>';
    const verifiedBadge = r.is_premium
      ? `<span class="badge badge-verified">✓ ${t('verified')}</span>`
      : '';

    const dist = r.distance_km != null ? `${r.distance_km.toFixed(1)} km` : '';
    const rating = r.rating ? Number(r.rating).toFixed(1) : '—';

    return `
      <div class="rest-card" data-id="${r.id}">
        <div class="image">
          <img src="${img}" alt="${escapeHtml(r.name)}" loading="lazy" onerror="this.style.display='none'">
          <div class="badges">
            ${openBadge}
            ${verifiedBadge}
          </div>
        </div>
        <div class="body">
          <div class="title-row">
            <div class="name">${escapeHtml(r.name || '')}</div>
            <div class="rating">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
              ${rating}
            </div>
          </div>
          <div class="meta">
            <span class="price">${priceDisplay}</span>
            ${dist ? `<span class="dot"></span><span>${dist}</span>` : ''}
            ${r.address ? `<span class="dot"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px;">${escapeHtml(r.address)}</span>` : ''}
          </div>
          <div class="foot">
            <div class="cuisines">
              ${cuisines.slice(0,2).map(c => `<span class="cuisine-tag">${escapeHtml(c)}</span>`).join('')}
            </div>
            <button class="book-btn" onclick="event.stopPropagation(); openBookingSheet(${r.id})">${t('book')}</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Card click → open detail/booking
  el.querySelectorAll('.rest-card').forEach(card => {
    card.addEventListener('click', () => {
      haptic('light');
      openBookingSheet(Number(card.dataset.id));
    });
  });
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =====================================================
   BOOKING SHEET
   ===================================================== */
async function openBookingSheet(restaurantId) {
  const backdrop = document.getElementById('sheet-backdrop');
  const sheet = document.getElementById('sheet');
  const body = document.getElementById('sheet-body');
  const foot = document.getElementById('sheet-foot');
  const title = document.getElementById('sheet-title');

  const r = state.restaurants.find(x => x.id === restaurantId);
  if (!r) return;

  state.booking = {
    restaurant: r,
    step: 1,
    zones: [],
    menu: [],
    selectedZone: null,
    selectedDate: formatDateISO(new Date()),
    selectedTime: null,
    guests: 2,
    preOrder: {},
    availability: [],
  };

  title.textContent = r.name;
  body.innerHTML = `<div style="padding:40px 0;text-align:center;color:var(--ink-muted)"><div class="spin"></div></div>`;
  foot.innerHTML = '';

  backdrop.classList.add('open');
  sheet.classList.add('open');
  if (tg?.BackButton) { tg.BackButton.show(); tg.BackButton.onClick(closeSheet); }

  // Load zones + menu
  try {
    const [zones, menu] = await Promise.all([
      api(`/restaurants/${restaurantId}/zones`).catch(() => []),
      api(`/restaurants/${restaurantId}/menu`).catch(() => [])
    ]);
    state.booking.zones = Array.isArray(zones) ? zones : (zones.zones || []);
    state.booking.menu = Array.isArray(menu) ? menu : (menu.menu || menu.items || []);
  } catch (e) {
    console.error(e);
  }

  renderBookingStep();
}

function closeSheet() {
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
  if (tg?.BackButton) { tg.BackButton.hide(); tg.BackButton.offClick(closeSheet); }
}

function renderBookingStep() {
  const body = document.getElementById('sheet-body');
  const foot = document.getElementById('sheet-foot');
  const b = state.booking;

  // Steps indicator
  const stepsHtml = `
    <div class="steps">
      <div class="step-dot ${b.step >= 1 ? (b.step > 1 ? 'done' : 'active') : ''}"></div>
      <div class="step-dot ${b.step >= 2 ? (b.step > 2 ? 'done' : 'active') : ''}"></div>
      <div class="step-dot ${b.step >= 3 ? 'active' : ''}"></div>
    </div>
  `;

  if (b.step === 1) {
    // Zone + date + guests
    const zonesHtml = (b.zones.length ? b.zones : [{ id: null, name: 'Asosiy zal', capacity: 50 }]).map(z => `
      <button class="zone-opt ${b.selectedZone?.id === z.id ? 'selected' : ''}" data-zone="${z.id ?? ''}">
        <div class="zone-name">${escapeHtml(z.name)}</div>
        <div class="zone-cap">${z.capacity || ''} ${t('people')}</div>
      </button>
    `).join('');

    const dateHtml = Array.from({ length: 14 }, (_, i) => {
      const d = daysFromNow(i);
      const iso = formatDateISO(d);
      const dow = i === 0 ? t('today') : i === 1 ? t('tomorrow') : i18n[state.lang].weekdays[d.getDay()];
      return `
        <button class="date-opt ${b.selectedDate === iso ? 'selected' : ''}" data-date="${iso}">
          <div class="dow">${dow}</div>
          <div class="day">${d.getDate()}</div>
        </button>
      `;
    }).join('');

    body.innerHTML = `
      ${stepsHtml}
      <div class="field-group">
        <label class="label">${t('zone_label')}</label>
        <div class="zone-grid">${zonesHtml}</div>
      </div>
      <div class="field-group">
        <label class="label">${t('date_label')}</label>
        <div class="date-row">${dateHtml}</div>
      </div>
      <div class="field-group">
        <label class="label">${t('guests_label')}</label>
        <div class="guests-row">
          <div class="guests-count">${b.guests}<small>${t('people')}</small></div>
          <div class="guests-btns">
            <button class="guests-btn" id="guests-minus" ${b.guests <= 1 ? 'disabled' : ''}>−</button>
            <button class="guests-btn" id="guests-plus" ${b.guests >= 20 ? 'disabled' : ''}>+</button>
          </div>
        </div>
      </div>
    `;

    foot.innerHTML = `<button class="btn-primary" id="step-next" ${!b.selectedZone ? 'disabled' : ''}>${t('continue')}</button>`;

    // Events
    body.querySelectorAll('.zone-opt').forEach(el => {
      el.addEventListener('click', () => {
        haptic('light');
        const zid = el.dataset.zone;
        const z = b.zones.find(x => String(x.id) === zid) || { id: null, name: 'Asosiy zal' };
        b.selectedZone = z;
        renderBookingStep();
      });
    });
    body.querySelectorAll('.date-opt').forEach(el => {
      el.addEventListener('click', () => {
        haptic('light');
        b.selectedDate = el.dataset.date;
        renderBookingStep();
      });
    });
    document.getElementById('guests-minus').addEventListener('click', () => {
      if (b.guests > 1) { b.guests--; haptic('light'); renderBookingStep(); }
    });
    document.getElementById('guests-plus').addEventListener('click', () => {
      if (b.guests < 20) { b.guests++; haptic('light'); renderBookingStep(); }
    });
    document.getElementById('step-next').addEventListener('click', async () => {
      if (!b.selectedZone) return;
      haptic('medium');
      b.step = 2;
      // Load availability
      try {
        const av = await api(`/restaurants/${b.restaurant.id}/availability?date=${b.selectedDate}`);
        b.availability = Array.isArray(av) ? av : (av.slots || av.busy || []);
      } catch (e) { b.availability = []; }
      renderBookingStep();
    });

  } else if (b.step === 2) {
    // Time selection
    const slots = [];
    for (let h = 10; h <= 23; h++) {
      slots.push(`${String(h).padStart(2,'0')}:00`);
      if (h < 23) slots.push(`${String(h).padStart(2,'0')}:30`);
    }
    const busy = new Set((b.availability || []).map(a => {
      if (typeof a === 'string') return a.slice(0,5);
      return (a.time || '').slice(0,5);
    }));

    const timesHtml = slots.map(s => {
      const isBusy = busy.has(s);
      return `<button class="time-opt ${b.selectedTime === s ? 'selected' : ''}" data-time="${s}" ${isBusy ? 'disabled' : ''}>${s}</button>`;
    }).join('');

    body.innerHTML = `
      ${stepsHtml}
      <div class="field-group">
        <label class="label">${t('time_label')} · ${formatDateHuman(b.selectedDate)}</label>
        <div class="time-grid">${timesHtml}</div>
      </div>
    `;

    foot.innerHTML = `
      <button class="btn-primary" id="step-next" ${!b.selectedTime ? 'disabled' : ''}>${t('continue')}</button>
    `;

    body.querySelectorAll('.time-opt').forEach(el => {
      if (el.disabled) return;
      el.addEventListener('click', () => {
        haptic('medium');
        b.selectedTime = el.dataset.time;
        renderBookingStep();
      });
    });
    document.getElementById('step-next').addEventListener('click', () => {
      if (!b.selectedTime) return;
      haptic('medium');
      b.step = 3;
      renderBookingStep();
    });

  } else if (b.step === 3) {
    // Pre-order menu
    const menu = b.menu || [];
    const menuHtml = menu.length ? menu.slice(0, 30).map(m => {
      const qty = b.preOrder[m.id] || 0;
      return `
        <div class="menu-item">
          <div class="mi-info">
            <div class="mi-name">${escapeHtml(m.name || '')}</div>
            ${m.description ? `<div class="mi-desc">${escapeHtml(m.description)}</div>` : ''}
            <div class="mi-price">${formatCurrency(m.price)} ${t('sum')}</div>
          </div>
          <div class="mi-ctrl">
            <button class="mi-btn" data-mi-id="${m.id}" data-mi-act="minus" ${qty === 0 ? 'style="opacity:0.3"' : ''}>−</button>
            <div class="mi-qty">${qty}</div>
            <button class="mi-btn plus" data-mi-id="${m.id}" data-mi-act="plus">+</button>
          </div>
        </div>
      `;
    }).join('') : `
      <div class="empty" style="padding:30px 0">
        <p>${state.lang === 'uz' ? 'Taomnoma bo\'sh' : state.lang === 'ru' ? 'Меню пусто' : 'Menu is empty'}</p>
      </div>
    `;

    const total = Object.entries(b.preOrder).reduce((sum, [id, q]) => {
      const item = menu.find(x => String(x.id) === String(id));
      return sum + (item ? (item.price || 0) * q : 0);
    }, 0);

    body.innerHTML = `
      ${stepsHtml}
      <div class="field-group">
        <label class="label">${t('preorder_label')}</label>
        <div style="font-size:13px;color:var(--ink-muted);margin-bottom:14px;">${t('preorder_hint')}</div>
        <div>${menuHtml}</div>
      </div>
    `;

    foot.innerHTML = `
      ${total > 0 ? `
        <div class="total-row">
          <span class="lbl">${t('total')}</span>
          <span class="val">${formatCurrency(total)} ${t('sum')}</span>
        </div>` : ''}
      <button class="btn-primary" id="step-confirm">
        ${total === 0 ? t('skip_continue') : t('confirm')} · ${b.selectedTime}
      </button>
    `;

    body.querySelectorAll('[data-mi-id]').forEach(btn => {
      btn.addEventListener('click', () => {
        haptic('light');
        const id = btn.dataset.miId;
        const act = btn.dataset.miAct;
        const cur = b.preOrder[id] || 0;
        if (act === 'plus') b.preOrder[id] = cur + 1;
        else if (cur > 0) {
          b.preOrder[id] = cur - 1;
          if (b.preOrder[id] === 0) delete b.preOrder[id];
        }
        renderBookingStep();
      });
    });

    document.getElementById('step-confirm').addEventListener('click', submitBooking);
  }
}

function formatDateHuman(iso) {
  const d = new Date(iso);
  const M = i18n[state.lang].months;
  return `${d.getDate()} ${M[d.getMonth()]}`;
}

async function submitBooking() {
  const b = state.booking;
  const btn = document.getElementById('step-confirm');
  btn.disabled = true;
  btn.innerHTML = `<span class="spin"></span>`;
  haptic('medium');

  const preOrderArr = Object.entries(b.preOrder).map(([id, qty]) => ({
    menu_item_id: Number(id),
    quantity: qty
  }));

  try {
    await api('/reservations', {
      method: 'POST',
      body: JSON.stringify({
        restaurant_id: b.restaurant.id,
        zone_id: b.selectedZone?.id || null,
        date: b.selectedDate,
        time: b.selectedTime,
        guests: b.guests,
        pre_order: preOrderArr.length ? preOrderArr : null,
      })
    });
    haptic('success');
    toast(t('booking_created'), 'success');
    closeSheet();
    loadBookings();
    switchTab('bookings');
  } catch (e) {
    haptic('error');
    toast(e.message || t('booking_error'), 'error');
    btn.disabled = false;
    btn.innerHTML = t('confirm');
  }
}

/* =====================================================
   BOOKINGS PAGE
   ===================================================== */
async function loadBookings() {
  const el = document.getElementById('bookings-list');
  el.innerHTML = `<div class="skeleton sk-card" style="height:140px;margin-bottom:14px"></div><div class="skeleton sk-card" style="height:140px"></div>`;
  try {
    const data = await api('/reservations/my');
    state.bookings = Array.isArray(data) ? data : (data.reservations || []);
    renderBookings();
  } catch (e) {
    state.bookings = [];
    renderBookings();
  }
}

function renderBookings() {
  const el = document.getElementById('bookings-list');
  if (!state.bookings.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        </div>
        <h3>${t('no_bookings')}</h3>
        <p>${t('no_bookings_hint')}</p>
      </div>`;
    return;
  }
  el.innerHTML = state.bookings.map(bk => {
    const status = bk.status || 'pending';
    return `
      <div class="booking-card">
        <div class="bk-head">
          <div class="bk-name">${escapeHtml(bk.restaurant_name || bk.restaurant?.name || '—')}</div>
          <span class="bk-status ${status}">${t('status_' + status)}</span>
        </div>
        <div class="bk-details">
          <div class="bk-detail">
            <div class="bk-lbl">${t('date_label')}</div>
            <div class="bk-val">${formatDateHuman(bk.date)}</div>
          </div>
          <div class="bk-detail">
            <div class="bk-lbl">${t('time_label')}</div>
            <div class="bk-val">${String(bk.time || '').slice(0,5)}</div>
          </div>
          <div class="bk-detail">
            <div class="bk-lbl">${t('guests_label')}</div>
            <div class="bk-val">${bk.guests} ${t('people')}</div>
          </div>
        </div>
        ${(status === 'pending' || status === 'confirmed') ? `
          <div class="bk-actions">
            <button class="bk-action danger" data-cancel="${bk.id}">${t('cancel_booking')}</button>
          </div>
        ` : ''}
      </div>
    `;
  }).join('');

  el.querySelectorAll('[data-cancel]').forEach(btn => {
    btn.addEventListener('click', async () => {
      const id = btn.dataset.cancel;
      haptic('warning');
      if (tg?.showConfirm) {
        tg.showConfirm(state.lang === 'uz' ? 'Haqiqatan bekor qilasizmi?' : state.lang === 'ru' ? 'Точно отменить?' : 'Really cancel?', async (ok) => {
          if (ok) await cancelBooking(id);
        });
      } else if (confirm('Cancel?')) {
        await cancelBooking(id);
      }
    });
  });
}

async function cancelBooking(id) {
  try {
    await api(`/reservations/${id}`, { method: 'DELETE' });
    haptic('success');
    toast(state.lang === 'uz' ? 'Bekor qilindi' : state.lang === 'ru' ? 'Отменено' : 'Cancelled', 'success');
    loadBookings();
  } catch (e) {
    haptic('error');
    toast(e.message, 'error');
  }
}

/* =====================================================
   FAVORITES
   ===================================================== */
function renderFavorites() {
  const el = document.getElementById('favorites-list');
  const favs = state.restaurants.filter(r => state.favorites.includes(r.id));
  if (!favs.length) {
    el.innerHTML = `
      <div class="empty">
        <div class="icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </div>
        <h3>${t('empty_favorites')}</h3>
        <p>${t('empty_favorites_hint')}</p>
      </div>`;
    return;
  }
  // reuse rest card render
  const prevFiltered = state.filtered;
  state.filtered = favs;
  const prev = document.getElementById('rest-list').innerHTML;
  renderRestaurants();
  el.innerHTML = document.getElementById('rest-list').innerHTML;
  state.filtered = prevFiltered;
  document.getElementById('rest-list').innerHTML = prev;
  renderRestaurants();
}

/* =====================================================
   PROFILE
   ===================================================== */
function renderProfile() {
  const u = state.user || {};
  const name = u.first_name || u.username || t('guest');
  document.getElementById('profile-name').textContent = name;
  document.getElementById('profile-handle').textContent = u.username ? `@${u.username}` : '';
  document.getElementById('profile-avatar').textContent = (name[0] || 'M').toUpperCase();
  document.getElementById('stat-bookings').textContent = state.bookings.length;
  document.getElementById('stat-favorites').textContent = state.favorites.length;
  const visited = new Set(state.bookings.filter(b => b.status === 'completed').map(b => b.restaurant_id));
  document.getElementById('stat-visited').textContent = visited.size;
}

/* =====================================================
   TABS / NAV
   ===================================================== */
function switchTab(tab) {
  if (state.currentTab === tab) return;
  state.currentTab = tab;
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  haptic('light');
  if (tab === 'bookings') loadBookings();
  if (tab === 'favorites') renderFavorites();
  if (tab === 'profile') renderProfile();
}

/* =====================================================
   LANGUAGE
   ===================================================== */
function setLanguage(lang) {
  state.lang = lang;
  localStorage.setItem('onetable_lang', lang);
  document.documentElement.lang = lang;
  applyI18n();
  renderChips();
  renderRestaurants();
}

function applyI18n() {
  // Greeting
  document.getElementById('home-eyebrow').textContent = t('welcome');
  document.getElementById('home-greet-text').textContent = getGreeting();
  document.getElementById('home-user-name').textContent = state.user?.first_name || t('guest');
  // Search
  document.getElementById('search-input').placeholder = t('search_placeholder');
  // Tab labels
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  // Lang btn flag
  const flags = { uz: '🇺🇿', ru: '🇷🇺', en: '🇬🇧' };
  document.getElementById('lang-btn').textContent = flags[state.lang];
}

function cycleLanguage() {
  const order = ['uz', 'ru', 'en'];
  const i = order.indexOf(state.lang);
  setLanguage(order[(i + 1) % order.length]);
  haptic('light');
}

/* =====================================================
   THEME
   ===================================================== */
function applyTheme() {
  const scheme = tg?.colorScheme || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  document.documentElement.setAttribute('data-theme', scheme);
  document.querySelector('meta[name="theme-color"]').content =
    scheme === 'dark' ? '#12100E' : '#FAF7F2';
  if (tg?.setHeaderColor) {
    try { tg.setHeaderColor(scheme === 'dark' ? '#12100E' : '#FAF7F2'); } catch(e){}
  }
  if (tg?.setBackgroundColor) {
    try { tg.setBackgroundColor(scheme === 'dark' ? '#12100E' : '#FAF7F2'); } catch(e){}
  }
}

/* =====================================================
   GEOLOCATION
   ===================================================== */
function requestLocation() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(
    (pos) => {
      state.coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      loadRestaurants();
    },
    () => {
      // fallback: Tashkent center
      state.coords = { lat: 41.2995, lng: 69.2401 };
    },
    { timeout: 4000, maximumAge: 300000 }
  );
}

/* =====================================================
   DEEP LINKING
   ===================================================== */
function handleDeepLink() {
  const params = new URLSearchParams(location.search);
  const page = params.get('page');
  const restId = params.get('restaurant');
  const tgParam = tg?.initDataUnsafe?.start_param || '';

  if (page === 'bookings') switchTab('bookings');

  if (restId || tgParam.startsWith('restaurant_')) {
    const id = Number(restId || tgParam.replace('restaurant_', ''));
    // Wait until restaurants are loaded
    const check = setInterval(() => {
      if (state.restaurants.length) {
        clearInterval(check);
        if (state.restaurants.find(r => r.id === id)) {
          openBookingSheet(id);
        }
      }
    }, 200);
    setTimeout(() => clearInterval(check), 8000);
  }
}

/* =====================================================
   INIT
   ===================================================== */
async function init() {
  applyTheme();

  // Tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => switchTab(tab.dataset.tab));
  });
  // Sheet close
  document.getElementById('sheet-close').addEventListener('click', closeSheet);
  document.getElementById('sheet-backdrop').addEventListener('click', closeSheet);
  // Lang
  document.getElementById('lang-btn').addEventListener('click', cycleLanguage);
  // Search
  let searchTimer;
  document.getElementById('search-input').addEventListener('input', (e) => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.currentSearch = e.target.value.trim();
      applyFilters();
    }, 250);
  });
  // Profile menu
  document.querySelectorAll('.menu-row').forEach(r => {
    r.addEventListener('click', () => {
      const a = r.dataset.action;
      haptic('light');
      if (a === 'language') cycleLanguage();
      else if (a === 'support') {
        if (tg?.openTelegramLink) tg.openTelegramLink('https://t.me/onetable_uz_bot');
        else window.open('https://t.me/onetable_uz_bot', '_blank');
      }
      else if (a === 'about') {
        if (tg?.showAlert) tg.showAlert(t('about_text'));
        else alert(t('about_text'));
      }
    });
  });

  // Telegram theme change
  if (tg?.onEvent) tg.onEvent('themeChanged', applyTheme);

  applyI18n();
  renderChips();

  // Auth + load
  await authenticate();
  applyI18n(); // re-apply with user name
  requestLocation();
  await loadRestaurants();

  // Deep link
  handleDeepLink();
}

// Kick off
document.addEventListener('DOMContentLoaded', init);
if (document.readyState !== 'loading') init();
</script>
