<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<title>OneTable — Toshkent restoranlari</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* =========================================================
   ONETABLE — ULTRA PREMIUM EDITORIAL WARM HOSPITALITY
   Fraunces (display) + Manrope (body)
   ========================================================= */

:root {
  --bg: #FAF7F2;
  --bg-elevated: #FFFFFF;
  --bg-subtle: #F2ECE0;
  --bg-overlay: rgba(20, 16, 12, 0.62);

  --ink: #1C1917;
  --ink-soft: #44403C;
  --ink-muted: #8B8178;
  --ink-faint: #C4B9AD;

  --line: #E8E0D0;
  --line-soft: #F0EADC;

  --accent: #7B2D26;
  --accent-hover: #642019;
  --accent-soft: #F6E8E6;
  --accent-glow: rgba(123, 45, 38, 0.18);

  --gold: #B07B2A;
  --gold-soft: #FBF3E4;
  --gold-bright: #E0A83E;

  --success: #3D6B38;
  --success-soft: #E6EEE4;
  --success-pulse: rgba(61, 107, 56, 0.3);
  --danger: #9B2C2C;
  --danger-soft: #FBEAEA;

  --reel-bg: #0A0906;

  --r-xs: 6px;
  --r-sm: 12px;
  --r-md: 18px;
  --r-lg: 24px;
  --r-xl: 32px;
  --r-full: 100px;

  --shadow-xs: 0 1px 3px rgba(40, 25, 10, 0.05);
  --shadow-sm: 0 2px 10px -3px rgba(40, 25, 10, 0.08), 0 1px 3px rgba(40, 25, 10, 0.04);
  --shadow-md: 0 8px 30px -8px rgba(40, 25, 10, 0.12), 0 3px 10px rgba(40, 25, 10, 0.05);
  --shadow-lg: 0 24px 60px -16px rgba(40, 25, 10, 0.22), 0 8px 24px rgba(40, 25, 10, 0.08);
  --shadow-xl: 0 40px 100px -20px rgba(40, 25, 10, 0.30);

  --fd: 'Fraunces', Georgia, serif;
  --fb: 'Manrope', -apple-system, sans-serif;

  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease: cubic-bezier(0.22, 1, 0.36, 1);
  --ease-in: cubic-bezier(0.55, 0, 1, 0.45);

  --safe-t: env(safe-area-inset-top, 0px);
  --safe-b: env(safe-area-inset-bottom, 0px);
  --tabbar-h: 72px;
}

[data-theme="dark"] {
  --bg: #100D0A;
  --bg-elevated: #1A1612;
  --bg-subtle: #231E18;
  --bg-overlay: rgba(0, 0, 0, 0.78);

  --ink: #F5F0E8;
  --ink-soft: #D8D0C4;
  --ink-muted: #9A9188;
  --ink-faint: #5A5248;

  --line: #2A231B;
  --line-soft: #1E1914;

  --accent: #D4866E;
  --accent-hover: #E09A82;
  --accent-soft: #3A2218;
  --accent-glow: rgba(212, 134, 110, 0.2);

  --gold: #D4A045;
  --gold-soft: #2A1E08;
  --gold-bright: #EDBA5A;

  --success: #6FA860;
  --success-soft: #182A16;
  --success-pulse: rgba(111, 168, 96, 0.3);
  --danger: #D47070;
  --danger-soft: #2A1212;
}

/* ---------- RESET ---------- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; scroll-behavior: smooth; }
body {
  font-family: var(--fb);
  font-size: 15px;
  line-height: 1.55;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  -webkit-tap-highlight-color: transparent;
  text-rendering: optimizeLegibility;
  overflow-x: hidden;
  overscroll-behavior: none;
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

/* Grain texture */
body::after {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9998;
  opacity: 0.028;
  mix-blend-mode: multiply;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 256px;
}
[data-theme="dark"] body::after { mix-blend-mode: screen; opacity: 0.035; }

/* =========================================================
   LAYOUT — APP SHELL
   ========================================================= */
#app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  padding-bottom: calc(var(--tabbar-h) + var(--safe-b));
  position: relative;
}

/* Scrollable page wrapper */
.page {
  display: none;
  min-height: calc(100dvh - var(--tabbar-h) - var(--safe-b));
}
.page.active { display: block; }

/* Reels page — no scroll on wrapper, handled by reel container */
#page-reels { overflow: hidden; padding-bottom: 0 !important; }
#app:has(#page-reels.active) { padding-bottom: 0; }

/* Stagger entrance */
.fadein { animation: fadeUp 0.55s var(--ease) both; }
.stagger > *  { animation: fadeUp 0.5s var(--ease) both; }
.stagger > *:nth-child(1){ animation-delay: 0.04s; }
.stagger > *:nth-child(2){ animation-delay: 0.09s; }
.stagger > *:nth-child(3){ animation-delay: 0.14s; }
.stagger > *:nth-child(4){ animation-delay: 0.19s; }
.stagger > *:nth-child(5){ animation-delay: 0.24s; }
.stagger > *:nth-child(6){ animation-delay: 0.29s; }
.stagger > *:nth-child(7){ animation-delay: 0.34s; }
.stagger > *:nth-child(8){ animation-delay: 0.39s; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* =========================================================
   TOPBAR
   ========================================================= */
.topbar {
  padding: calc(var(--safe-t) + 22px) 22px 10px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}
.greeting { flex: 1; min-width: 0; }
.eyebrow {
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--ink-muted);
  font-weight: 700;
  margin-bottom: 5px;
}
.greet-title {
  font-family: var(--fd);
  font-size: 30px;
  font-weight: 400;
  line-height: 1.08;
  letter-spacing: -0.03em;
  color: var(--ink);
  font-variation-settings: "opsz" 144, "SOFT" 50;
}
.greet-title em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}

/* Lang / avatar button group */
.topbar-actions { display: flex; gap: 10px; align-items: center; }
.icon-btn {
  flex-shrink: 0;
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  font-size: 17px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--spring);
  box-shadow: var(--shadow-xs);
  position: relative;
  overflow: hidden;
}
.icon-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--ink);
  opacity: 0;
  transition: opacity 0.15s;
  border-radius: inherit;
}
.icon-btn:active::after { opacity: 0.07; }
.icon-btn:active { transform: scale(0.92); }

/* =========================================================
   SEARCH
   ========================================================= */
.search-wrap { padding: 14px 22px 6px; }
.search {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg-elevated);
  border: 1.5px solid var(--line);
  border-radius: var(--r-lg);
  padding: 14px 18px;
  box-shadow: var(--shadow-xs);
  transition: all 0.25s var(--ease);
}
.search:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
}
.search svg { flex-shrink: 0; color: var(--ink-muted); }
.search input {
  flex: 1;
  border: none;
  background: none;
  outline: none;
  font-size: 15px;
  font-weight: 500;
  min-width: 0;
}
.search input::placeholder { color: var(--ink-muted); font-weight: 400; }
.search-clear {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  flex-shrink: 0;
  color: var(--ink-muted);
  font-size: 16px;
  font-weight: 600;
}
.search.has-value .search-clear { opacity: 1; pointer-events: auto; }

/* =========================================================
   CHIP ROW
   ========================================================= */
.chip-row {
  display: flex;
  gap: 8px;
  padding: 12px 22px 6px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
}
.chip-row::-webkit-scrollbar { display: none; }
.chip {
  flex-shrink: 0;
  padding: 9px 18px;
  border-radius: var(--r-full);
  background: var(--bg-elevated);
  border: 1.5px solid var(--line);
  font-size: 12.5px;
  font-weight: 700;
  color: var(--ink-soft);
  white-space: nowrap;
  letter-spacing: 0.01em;
  transition: all 0.25s var(--ease);
  position: relative;
  overflow: hidden;
}
.chip::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.25s;
}
.chip span { position: relative; z-index: 1; }
.chip:active { transform: scale(0.93); }
.chip.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}

/* =========================================================
   SECTION HEADER
   ========================================================= */
.section { padding: 20px 22px 6px; }
.section-head {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 18px;
}
.section-title {
  font-family: var(--fd);
  font-size: 23px;
  font-weight: 400;
  letter-spacing: -0.025em;
  color: var(--ink);
  font-variation-settings: "opsz" 144, "SOFT" 50;
  line-height: 1.1;
}
.section-title em {
  font-style: italic;
  font-weight: 300;
  color: var(--accent);
}
.section-count {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-faint);
  letter-spacing: 0.08em;
}

.section-link {
  font-size: 11px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.home-insight-section { padding-top: 10px; }
.insight-strip,
.reels-shelf {
  display: flex;
  gap: 12px;
  overflow-x: auto;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 4px;
}
.insight-strip::-webkit-scrollbar,
.reels-shelf::-webkit-scrollbar { display: none; }

.insight-card {
  min-width: 186px;
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 16px 16px 18px;
  box-shadow: var(--shadow-sm);
  position: relative;
  overflow: hidden;
}
.insight-card::after {
  content: '';
  position: absolute;
  inset: auto -30px -40px auto;
  width: 110px;
  height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(176,123,42,0.16), rgba(176,123,42,0));
  pointer-events: none;
}
.insight-card.primary {
  min-width: 220px;
  background: linear-gradient(135deg, rgba(123,45,38,0.96), rgba(176,123,42,0.92));
  border-color: transparent;
  color: #FFF8F0;
  box-shadow: var(--shadow-lg);
}
[data-theme="dark"] .insight-card.primary {
  background: linear-gradient(135deg, rgba(212,134,110,0.9), rgba(212,160,69,0.88));
  color: #1C1917;
}
.insight-kicker {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 8px;
}
.insight-card.primary .insight-kicker { color: rgba(255,248,240,0.78); }
[data-theme="dark"] .insight-card.primary .insight-kicker { color: rgba(28,25,23,0.72); }
.insight-value-row {
  display: flex;
  align-items: flex-end;
  gap: 6px;
  margin-bottom: 8px;
}
.insight-value {
  font-family: var(--fd);
  font-size: 34px;
  line-height: 0.92;
  font-weight: 400;
  letter-spacing: -0.04em;
  color: var(--ink);
  font-variation-settings: "opsz" 144, "SOFT" 40;
}
.insight-card.primary .insight-value { color: inherit; }
.insight-unit {
  font-size: 13px;
  font-weight: 700;
  color: var(--ink-muted);
  margin-bottom: 3px;
}
.insight-card.primary .insight-unit { color: rgba(255,248,240,0.8); }
[data-theme="dark"] .insight-card.primary .insight-unit { color: rgba(28,25,23,0.75); }
.insight-caption {
  font-size: 12px;
  line-height: 1.5;
  color: var(--ink-muted);
  max-width: 180px;
}
.insight-card.primary .insight-caption { color: rgba(255,248,240,0.82); }
[data-theme="dark"] .insight-card.primary .insight-caption { color: rgba(28,25,23,0.76); }

.home-reels-section { padding-top: 8px; }
.reel-preview-card {
  flex: 0 0 66%;
  min-width: 224px;
  max-width: 262px;
  aspect-ratio: 9 / 15;
  border-radius: 28px;
  position: relative;
  overflow: hidden;
  background: var(--reel-bg);
  box-shadow: var(--shadow-lg);
  scroll-snap-align: start;
}
.reel-preview-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s var(--ease);
}
.reel-preview-card:active img { transform: scale(1.04); }
.reel-preview-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.12) 0%, rgba(0,0,0,0.08) 35%, rgba(0,0,0,0.82) 100%);
  z-index: 1;
}
.reel-preview-pill,
.reel-preview-play {
  position: absolute;
  z-index: 2;
}
.reel-preview-pill {
  top: 12px;
  left: 12px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 11px;
  border-radius: var(--r-full);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.92);
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.reel-preview-play {
  top: 12px;
  right: 12px;
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  background: rgba(255,255,255,0.16);
  color: #fff;
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.reel-preview-meta {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  z-index: 2;
  padding: 18px 16px 16px;
}
.reel-preview-name {
  font-family: var(--fd);
  font-size: 24px;
  line-height: 1.06;
  font-weight: 500;
  letter-spacing: -0.03em;
  color: #fff;
  margin-bottom: 7px;
  text-shadow: 0 2px 16px rgba(0,0,0,0.35);
}
.reel-preview-caption {
  font-size: 12.5px;
  line-height: 1.5;
  color: rgba(255,255,255,0.8);
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.reel-preview-stats {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 10px;
}
.reel-preview-chip {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  border-radius: var(--r-full);
  font-size: 10.5px;
  font-weight: 700;
  color: rgba(255,255,255,0.92);
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.16);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
}
.reel-preview-empty {
  width: 100%;
  padding: 24px 18px;
  border-radius: var(--r-xl);
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  color: var(--ink-muted);
  box-shadow: var(--shadow-xs);
}
.book-btn[disabled] {
  opacity: 0.45;
  pointer-events: none;
  background: var(--bg-subtle);
  color: var(--ink-faint);
  box-shadow: none;
}


/* =========================================================
   RESTAURANT CARD — ULTRA PREMIUM
   ========================================================= */
.card-list { display: flex; flex-direction: column; gap: 20px; }

.rest-card {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  transition: all 0.35s var(--ease);
  position: relative;
  will-change: transform;
}
.rest-card:active { transform: scale(0.983); box-shadow: var(--shadow-md); }

/* Image */
.rest-card .c-image {
  position: relative;
  aspect-ratio: 16/9;
  background: var(--bg-subtle);
  overflow: hidden;
}
.rest-card .c-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.7s var(--ease);
}
.rest-card:active .c-image img { transform: scale(1.05); }

/* Gradient overlays */
.rest-card .c-image::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    160deg,
    rgba(0,0,0,0) 40%,
    rgba(0,0,0,0.45) 100%
  );
  z-index: 1;
  pointer-events: none;
}

/* Top badges */
.c-badges {
  position: absolute;
  top: 14px;
  left: 14px;
  right: 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  z-index: 2;
}
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 11px;
  border-radius: var(--r-full);
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.04em;
  backdrop-filter: blur(16px) saturate(1.8);
  -webkit-backdrop-filter: blur(16px) saturate(1.8);
  border: 1px solid rgba(255,255,255,0.2);
}
.badge-open {
  background: rgba(15,30,15,0.55);
  color: #7ECD72;
}
.badge-open .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #7ECD72;
  box-shadow: 0 0 0 2px rgba(126,205,114,0.3);
  animation: pulseGreen 2s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulseGreen {
  0%, 100% { box-shadow: 0 0 0 2px rgba(126,205,114,0.3); }
  50%       { box-shadow: 0 0 0 5px rgba(126,205,114,0); }
}
.badge-closed {
  background: rgba(30,10,10,0.55);
  color: #F07070;
}
.badge-closed .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #F07070;
  flex-shrink: 0;
}
.badge-premium {
  background: linear-gradient(135deg, rgba(176,123,42,0.85), rgba(224,168,62,0.85));
  color: #FFF8E6;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}

/* Favorite button on card */
.fav-btn {
  position: absolute;
  bottom: 14px;
  right: 14px;
  z-index: 2;
  width: 38px; height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.25);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--spring);
  color: rgba(255,255,255,0.8);
}
.fav-btn:active { transform: scale(0.84); }
.fav-btn.active { background: rgba(220,60,60,0.85); border-color: transparent; color: #fff; }
.fav-btn svg { width: 17px; height: 17px; }

/* Card body */
.c-body { padding: 18px 20px 20px; }
.c-title-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 5px;
}
.c-name {
  font-family: var(--fd);
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.022em;
  line-height: 1.12;
  color: var(--ink);
  font-variation-settings: "opsz" 144, "SOFT" 30;
  flex: 1;
  min-width: 0;
}
.c-rating {
  flex-shrink: 0;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 14px;
  font-weight: 800;
  color: var(--ink);
  padding: 4px 10px;
  background: var(--gold-soft);
  border-radius: var(--r-full);
  border: 1px solid rgba(176,123,42,0.2);
}
.c-rating svg { color: var(--gold-bright); }

.c-meta {
  display: flex;
  align-items: center;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 12.5px;
  color: var(--ink-muted);
  font-weight: 500;
  margin-top: 3px;
}
.c-meta .sep { width: 3px; height: 3px; border-radius: 50%; background: var(--ink-faint); }
.c-price { font-weight: 700; color: var(--ink-soft); letter-spacing: 0.05em; }
.c-price .dim { color: var(--ink-faint); }
.c-dist {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  background: var(--bg-subtle);
  border-radius: var(--r-full);
  color: var(--ink-muted);
}

.c-foot {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line-soft);
  gap: 12px;
}
.c-cuisines {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  flex: 1;
  min-width: 0;
}
.cuisine-tag {
  font-size: 11px;
  font-weight: 700;
  color: var(--ink-soft);
  padding: 4px 10px;
  background: var(--bg-subtle);
  border-radius: var(--r-full);
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.book-btn {
  flex-shrink: 0;
  padding: 11px 20px;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--r-full);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  transition: all 0.22s var(--spring);
  position: relative;
  overflow: hidden;
}
.book-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: #fff;
  opacity: 0;
  transition: opacity 0.15s;
}
.book-btn:active { transform: scale(0.92); }
.book-btn:active::after { opacity: 0.12; }

/* =========================================================
   SKELETON LOADERS
   ========================================================= */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skeleton {
  background: linear-gradient(
    90deg,
    var(--bg-subtle) 0%,
    var(--line-soft) 45%,
    var(--bg-subtle) 100%
  );
  background-size: 200% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
  border-radius: var(--r-md);
}
.sk-card {
  border-radius: var(--r-xl);
  overflow: hidden;
}
.sk-img { aspect-ratio: 16/9; }
.sk-body { padding: 18px 20px 20px; }
.sk-line { height: 14px; border-radius: 6px; margin-bottom: 10px; }
.sk-line.w-70 { width: 70%; }
.sk-line.w-50 { width: 50%; }
.sk-line.w-90 { width: 90%; }

/* =========================================================
   EMPTY STATE
   ========================================================= */
.empty {
  padding: 56px 36px;
  text-align: center;
}
.empty-icon {
  width: 76px; height: 76px;
  border-radius: 50%;
  background: var(--bg-subtle);
  border: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 22px;
  color: var(--ink-muted);
  font-size: 30px;
}
.empty h3 {
  font-family: var(--fd);
  font-size: 22px;
  font-weight: 400;
  font-style: italic;
  margin-bottom: 8px;
  font-variation-settings: "opsz" 144, "SOFT" 80;
}
.empty p {
  font-size: 14px;
  color: var(--ink-muted);
  line-height: 1.6;
  max-width: 260px;
  margin: 0 auto;
}

/* =========================================================
   ===== REELS PAGE — FULL-SCREEN VERTICAL FEED =====
   ========================================================= */
#page-reels {
  height: calc(100dvh - var(--tabbar-h) - var(--safe-b));
  background: var(--reel-bg);
}

.reels-container {
  height: 100%;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}
.reels-container::-webkit-scrollbar { display: none; }

.reel-item {
  height: 100%;
  scroll-snap-align: start;
  scroll-snap-stop: always;
  position: relative;
  overflow: hidden;
  background: #0A0906;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Video / image layer */
.reel-media {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  background: #0A0906;
}
video.reel-media { object-position: center; }

/* Gradient overlay */
.reel-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    180deg,
    rgba(0,0,0,0.35) 0%,
    rgba(0,0,0,0) 30%,
    rgba(0,0,0,0) 45%,
    rgba(0,0,0,0.55) 75%,
    rgba(0,0,0,0.85) 100%
  );
  z-index: 1;
}

/* Top bar on reel */
.reel-topbar {
  position: absolute;
  top: calc(var(--safe-t) + 16px);
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 3;
}
.reel-topbar-title {
  font-family: var(--fd);
  font-size: 17px;
  font-weight: 500;
  color: rgba(255,255,255,0.9);
  font-variation-settings: "opsz" 144, "SOFT" 50;
  letter-spacing: -0.01em;
}

/* Bottom info on reel */
.reel-info {
  position: absolute;
  bottom: 20px;
  left: 18px;
  right: 80px;
  z-index: 2;
}
.reel-name {
  font-family: var(--fd);
  font-size: 26px;
  font-weight: 600;
  color: #fff;
  letter-spacing: -0.02em;
  line-height: 1.1;
  margin-bottom: 6px;
  font-variation-settings: "opsz" 144, "SOFT" 20;
  text-shadow: 0 2px 16px rgba(0,0,0,0.4);
}
.reel-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}
.reel-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  font-weight: 700;
  color: rgba(255,255,255,0.9);
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.2);
  padding: 4px 10px;
  border-radius: var(--r-full);
  letter-spacing: 0.03em;
}
.reel-badge .rdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #7ECD72;
  box-shadow: 0 0 0 2px rgba(126,205,114,0.4);
  animation: pulseGreen 2s ease-in-out infinite;
}
.reel-caption {
  font-size: 13px;
  color: rgba(255,255,255,0.72);
  line-height: 1.5;
  font-weight: 400;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

/* Reel book button */
.reel-book-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 14px;
  padding: 12px 22px;
  background: var(--accent);
  color: #fff;
  border-radius: var(--r-full);
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: none;
  box-shadow: 0 4px 20px rgba(123,45,38,0.5);
  transition: all 0.2s var(--spring);
}
.reel-book-btn:active { transform: scale(0.93); }

/* Right action bar */
.reel-actions {
  position: absolute;
  bottom: 28px;
  right: 16px;
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 22px;
}
.reel-action {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
}
.reel-action-btn {
  width: 52px; height: 52px;
  border-radius: 50%;
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid rgba(255,255,255,0.18);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 22px;
  transition: all 0.18s var(--spring);
}
.reel-action-btn:active { transform: scale(0.86); background: rgba(255,255,255,0.22); }
.reel-action-btn.liked { background: rgba(220,60,60,0.7); border-color: transparent; }
.reel-action-label {
  font-size: 10px;
  font-weight: 700;
  color: rgba(255,255,255,0.75);
  letter-spacing: 0.04em;
}

/* Reel restaurant avatar */
.reel-avatar {
  width: 50px; height: 50px;
  border-radius: 50%;
  border: 2.5px solid #fff;
  object-fit: cover;
  background: var(--bg-subtle);
  box-shadow: 0 2px 12px rgba(0,0,0,0.4);
}

/* Progress bar (swipe indicator) */
.reel-progress-bar {
  position: absolute;
  bottom: 0;
  left: 0; right: 0;
  height: 2px;
  background: rgba(255,255,255,0.12);
  z-index: 4;
}
.reel-progress-fill {
  height: 100%;
  background: rgba(255,255,255,0.55);
  width: 0%;
  transition: width 0.3s linear;
}

/* Reels loading overlay */
.reels-loading {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  color: rgba(255,255,255,0.4);
}
.reels-loading .spin {
  width: 32px; height: 32px;
  border: 2.5px solid rgba(255,255,255,0.15);
  border-top-color: rgba(255,255,255,0.6);
}

/* =========================================================
   BOOKINGS PAGE
   ========================================================= */
.booking-card {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--r-xl);
  padding: 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
  transition: all 0.2s var(--ease);
  position: relative;
  overflow: hidden;
}
.booking-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 4px;
  border-radius: 4px 0 0 4px;
}
.booking-card.status-confirmed::before { background: var(--success); }
.booking-card.status-pending::before { background: var(--gold); }
.booking-card.status-cancelled::before { background: var(--danger); }
.booking-card.status-completed::before { background: var(--ink-faint); }

.bk-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 14px;
  gap: 12px;
  padding-left: 8px;
}
.bk-name {
  font-family: var(--fd);
  font-size: 20px;
  font-weight: 500;
  letter-spacing: -0.015em;
  line-height: 1.15;
  flex: 1;
  font-variation-settings: "opsz" 144, "SOFT" 40;
}
.bk-status {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.09em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: var(--r-full);
  flex-shrink: 0;
}
.bk-status.pending   { background: var(--gold-soft); color: var(--gold); }
.bk-status.confirmed { background: var(--success-soft); color: var(--success); }
.bk-status.cancelled,.bk-status.noshow { background: var(--danger-soft); color: var(--danger); }
.bk-status.completed { background: var(--bg-subtle); color: var(--ink-muted); }

.bk-details {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 14px 8px 0;
  border-top: 1px solid var(--line-soft);
}
.bk-detail .bk-lbl {
  font-size: 9.5px;
  color: var(--ink-muted);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.bk-detail .bk-val {
  font-size: 14px;
  font-weight: 800;
  color: var(--ink);
  font-variant-numeric: tabular-nums;
}

.bk-actions {
  display: flex;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--line-soft);
  padding-left: 8px;
}
.bk-cancel-btn {
  flex: 1;
  padding: 10px;
  border-radius: var(--r-full);
  font-size: 11.5px;
  font-weight: 800;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  border: 1.5px solid var(--danger-soft);
  color: var(--danger);
  background: transparent;
  transition: all 0.15s var(--ease);
}
.bk-cancel-btn:active { background: var(--danger-soft); }

/* =========================================================
   FAVORITES PAGE
   ========================================================= */
/* reuses card styles */

/* =========================================================
   PROFILE PAGE
   ========================================================= */
.profile-head {
  padding: calc(var(--safe-t) + 36px) 22px 24px;
  text-align: center;
}
.profile-avatar {
  width: 96px; height: 96px;
  border-radius: 50%;
  background: linear-gradient(145deg, var(--accent) 0%, var(--gold) 100%);
  margin: 0 auto 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--fd);
  font-size: 38px;
  font-weight: 400;
  color: #fff;
  box-shadow: 0 12px 40px -8px var(--accent-glow), 0 4px 16px rgba(0,0,0,0.12);
  font-variation-settings: "opsz" 144;
}
.profile-name {
  font-family: var(--fd);
  font-size: 26px;
  font-weight: 400;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
  font-variation-settings: "opsz" 144, "SOFT" 50;
}
.profile-handle {
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 500;
}

.profile-stats {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  padding: 0 22px 26px;
}
.profile-stat {
  background: var(--bg-elevated);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  padding: 18px 12px 14px;
  text-align: center;
  box-shadow: var(--shadow-xs);
}
.profile-stat .pnum {
  font-family: var(--fd);
  font-size: 30px;
  font-weight: 400;
  color: var(--ink);
  font-variation-settings: "opsz" 144;
  line-height: 1;
  margin-bottom: 6px;
}
.profile-stat .plbl {
  font-size: 9.5px;
  color: var(--ink-muted);
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}

.profile-section-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  padding: 0 22px;
  margin-bottom: 10px;
}

.profile-menu {
  padding: 0 22px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  border-radius: var(--r-lg);
  border: 1px solid var(--line);
  background: var(--bg-elevated);
  box-shadow: var(--shadow-xs);
}
.menu-row {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  transition: background 0.12s;
  cursor: pointer;
}
.menu-row + .menu-row { border-top: 1px solid var(--line-soft); }
.menu-row:active { background: var(--bg-subtle); }
.mr-icon {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  flex-shrink: 0;
}
.mr-label {
  flex: 1;
  font-size: 15px;
  font-weight: 600;
}
.mr-value {
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 500;
}
.mr-arrow { color: var(--ink-faint); }

/* =========================================================
   TAB BAR — PREMIUM
   ========================================================= */
.tabbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tabbar-h) + var(--safe-b));
  background: rgba(var(--bg-elevated-rgb, 255,255,255), 0.92);
  backdrop-filter: blur(24px) saturate(1.8);
  -webkit-backdrop-filter: blur(24px) saturate(1.8);
  border-top: 1px solid var(--line);
  padding: 10px 8px calc(10px + var(--safe-b));
  display: flex;
  z-index: 50;
}
.tab {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 6px 4px;
  color: var(--ink-faint);
  transition: color 0.22s var(--ease);
  position: relative;
}
.tab.active { color: var(--accent); }
.tab-pip {
  position: absolute;
  top: -2px;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--accent);
  opacity: 0;
  transform: scale(0);
  transition: all 0.3s var(--spring);
}
.tab.active .tab-pip { opacity: 1; transform: scale(1); }
.tab svg { transition: transform 0.3s var(--spring); flex-shrink: 0; }
.tab.active svg { transform: scale(1.14); }
.tab-label {
  font-size: 9.5px;
  font-weight: 800;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Reels tab special */
.tab-reels-icon {
  width: 40px; height: 40px;
  border-radius: 14px;
  background: linear-gradient(135deg, #C2185B, #E91E63, #FF4081);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  box-shadow: 0 4px 14px rgba(233,30,99,0.38);
  transition: all 0.25s var(--spring);
}
.tab.active .tab-reels-icon {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(233,30,99,0.5);
}
.tab:not(.active) .tab-reels-icon {
  background: var(--bg-subtle);
  box-shadow: none;
  color: var(--ink-faint);
}

/* =========================================================
   BOOKING SHEET — BOTTOM SHEET
   ========================================================= */
.sheet-backdrop {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.38s var(--ease);
}
.sheet-backdrop.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  max-height: 93dvh;
  background: var(--bg);
  border-radius: var(--r-xl) var(--r-xl) 0 0;
  z-index: 101;
  transform: translateY(100%);
  transition: transform 0.48s var(--ease);
  display: flex;
  flex-direction: column;
  box-shadow: 0 -8px 60px -10px rgba(0,0,0,0.28);
  will-change: transform;
}
.sheet.open { transform: translateY(0); }

.sheet-handle {
  width: 44px; height: 4px;
  border-radius: 2px;
  background: var(--line);
  margin: 14px auto 6px;
  flex-shrink: 0;
}

.sheet-header {
  padding: 8px 22px 18px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
  border-bottom: 1px solid var(--line-soft);
}
.sheet-title-wrap { flex: 1; min-width: 0; }
.sheet-eyebrow {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 3px;
}
.sheet-title {
  font-family: var(--fd);
  font-size: 24px;
  font-weight: 500;
  letter-spacing: -0.025em;
  line-height: 1.1;
  font-variation-settings: "opsz" 144, "SOFT" 40;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.sheet-close-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s var(--spring);
  flex-shrink: 0;
  color: var(--ink-soft);
  margin-top: 2px;
}
.sheet-close-btn:active { transform: scale(0.88); }

.sheet-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px 22px 16px;
  -webkit-overflow-scrolling: touch;
}
.sheet-foot {
  padding: 14px 22px calc(18px + var(--safe-b));
  background: var(--bg);
  border-top: 1px solid var(--line-soft);
  flex-shrink: 0;
}

/* =========================================================
   STEP INDICATOR
   ========================================================= */
.steps-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 22px;
  align-items: center;
}
.step-seg {
  flex: 1;
  height: 3px;
  border-radius: 2px;
  background: var(--line);
  overflow: hidden;
  position: relative;
}
.step-seg::after {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 0;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.4s var(--ease);
}
.step-seg.done::after { width: 100%; }
.step-seg.active::after {
  background: var(--ink);
  animation: fillSeg 0.4s var(--ease) forwards;
}
@keyframes fillSeg {
  from { width: 0; }
  to   { width: 100%; }
}

.field-block { margin-bottom: 24px; }
.field-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.field-label-hint {
  font-size: 11px;
  font-weight: 500;
  text-transform: none;
  letter-spacing: 0;
  color: var(--ink-muted);
}

/* Zone grid */
.zone-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.zone-card {
  padding: 16px;
  background: var(--bg-elevated);
  border: 2px solid var(--line);
  border-radius: var(--r-lg);
  text-align: left;
  transition: all 0.2s var(--ease);
  position: relative;
  overflow: hidden;
}
.zone-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
}
.zone-card:active { transform: scale(0.96); }
.zone-card.active {
  border-color: var(--ink);
  background: var(--ink);
}
.zone-card > * { position: relative; }
.zone-card .zn { font-weight: 800; font-size: 14px; margin-bottom: 2px; }
.zone-card.active .zn { color: var(--bg); }
.zone-card .zc {
  font-size: 11px;
  opacity: 0.6;
  font-weight: 600;
}
.zone-card.active .zc { color: var(--bg); }

/* Date row */
.date-row {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.date-row::-webkit-scrollbar { display: none; }
.date-card {
  flex-shrink: 0;
  min-width: 62px;
  padding: 13px 8px;
  background: var(--bg-elevated);
  border: 2px solid var(--line);
  border-radius: var(--r-md);
  text-align: center;
  transition: all 0.2s var(--ease);
}
.date-card:active { transform: scale(0.92); }
.date-card.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.date-card .dc-dow {
  font-size: 9px;
  font-weight: 800;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.55;
  margin-bottom: 3px;
}
.date-card .dc-day {
  font-family: var(--fd);
  font-size: 24px;
  font-weight: 400;
  font-variation-settings: "opsz" 144;
  line-height: 1;
  margin-bottom: 1px;
}
.date-card .dc-mon {
  font-size: 9px;
  font-weight: 700;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Guests */
.guests-control {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  background: var(--bg-elevated);
  border: 2px solid var(--line);
  border-radius: var(--r-lg);
}
.guests-display {
  display: flex;
  align-items: baseline;
  gap: 6px;
}
.guests-num {
  font-family: var(--fd);
  font-size: 32px;
  font-weight: 400;
  font-variation-settings: "opsz" 144;
  line-height: 1;
}
.guests-unit {
  font-size: 13px;
  color: var(--ink-muted);
  font-weight: 600;
}
.guests-btns { display: flex; gap: 10px; }
.g-btn {
  width: 42px; height: 42px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: 400;
  transition: all 0.15s var(--spring);
  color: var(--ink);
}
.g-btn:active { transform: scale(0.86); }
.g-btn:disabled { opacity: 0.25; pointer-events: none; }

/* Time grid */
.time-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
}
.time-card {
  padding: 14px 6px;
  background: var(--bg-elevated);
  border: 2px solid var(--line);
  border-radius: var(--r-md);
  font-size: 13.5px;
  font-weight: 700;
  text-align: center;
  transition: all 0.2s var(--ease);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}
.time-card:active:not([disabled]) { transform: scale(0.92); }
.time-card.active {
  background: var(--ink);
  border-color: var(--ink);
  color: var(--bg);
}
.time-card[disabled] {
  opacity: 0.28;
  text-decoration: line-through;
  cursor: not-allowed;
  pointer-events: none;
}

/* Menu preorder */
.menu-item-row {
  display: flex;
  gap: 14px;
  padding: 14px 0;
  align-items: center;
  border-bottom: 1px solid var(--line-soft);
}
.menu-item-row:last-child { border-bottom: none; }
.mi-img {
  width: 54px; height: 54px;
  border-radius: var(--r-sm);
  object-fit: cover;
  background: var(--bg-subtle);
  flex-shrink: 0;
}
.mi-info { flex: 1; min-width: 0; }
.mi-name { font-weight: 700; font-size: 14px; margin-bottom: 2px; line-height: 1.3; }
.mi-desc {
  font-size: 12px;
  color: var(--ink-muted);
  display: -webkit-box;
  -webkit-line-clamp: 1;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-bottom: 4px;
}
.mi-price { font-weight: 800; font-size: 13px; color: var(--accent); font-variant-numeric: tabular-nums; }
.mi-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}
.mi-ctrl-btn {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: var(--bg-subtle);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 700;
  transition: all 0.15s var(--spring);
  line-height: 1;
}
.mi-ctrl-btn:active { transform: scale(0.84); }
.mi-ctrl-btn.add { background: var(--ink); color: var(--bg); }
.mi-qty { min-width: 18px; text-align: center; font-weight: 800; font-size: 15px; }

/* =========================================================
   BUTTONS
   ========================================================= */
.btn-primary {
  width: 100%;
  padding: 17px 24px;
  background: var(--ink);
  color: var(--bg);
  border-radius: var(--r-lg);
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 0.025em;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: all 0.22s var(--spring);
  box-shadow: var(--shadow-md);
  position: relative;
  overflow: hidden;
}
.btn-primary::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.08), transparent);
  pointer-events: none;
}
.btn-primary:active:not([disabled]) { transform: scale(0.97); box-shadow: var(--shadow-sm); }
.btn-primary[disabled] { opacity: 0.38; }

.order-summary {

  border-radius: var(--r-md);

.order-summary .os-lbl { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-muted); }
.order-summary .os-val {

  font-weight: 400;

/* =========================================================

.toast {
  position: fixed;

  color: var(--bg);
  padding: 14px 20px;

}
.toast.show { transform: translateY(0); }
.toast.success { background: var(--success); }
.toast.error   { background: var(--danger); }

/* Spinner */
.spin {
  width: 18px; height: 18px;
  border: 2px solid currentColor;
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin360 0.7s linear infinite;
  display: inline-block;
  flex-shrink: 0;
}
@keyframes spin360 { to { transform: rotate(360deg); } }
</style>

/* ===== UTILS ===== */
function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n) {
  if (!n && n !== 0) return '—';
  return new Intl.NumberFormat('fr-FR').format(n).replace(/\s/g, '\u202F');
}
function isoDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function addDays(n) {
  const d = new Date(); d.setDate(d.getDate() + n); return d;
}
function humanDate(iso) {
  const d = new Date(iso);
  return `${d.getDate()} ${T('months')[d.getMonth()]}`;
}
function greeting() {
  const h = new Date().getHours();
  if (h < 6)  return T('greeting_n');
  if (h < 12) return T('greeting_m');
  if (h < 18) return T('greeting_a');
  if (h < 22) return T('greeting_e');
  return T('greeting_n');
}
function isOpen(wh) {
  if (!wh) return null;
  const m = String(wh).match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const [,oh,om,ch,cm] = m.map(Number);
  const now = new Date();
  const cur = now.getHours()*60 + now.getMinutes();
  const open = oh*60+om;
  let close = ch*60+cm;
  if (close <= open) close += 1440;
  return cur >= open && cur <= close;
}

/* ===== HAPTIC + TOAST ===== */
function haptic(type = 'light') {
  if (!tg?.HapticFeedback) return;
  if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
  else if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
  else if (type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
  else tg.HapticFeedback.impactOccurred(type);
}
let _toastT;
function toast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2800);
}

/* ===== API ===== */
async function api(path, opts = {}) {
  const h = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (S.token) h.Authorization = `Bearer ${S.token}`;
  const res = await fetch(API + path, { ...opts, headers: h });
  const ct = res.headers.get('content-type') || '';
  const data = ct.includes('json') ? await res.json() : await res.text();
  if (!res.ok) throw new Error(data?.error || data?.message || `HTTP ${res.status}`);
  return data;
}

/* ===== AUTH ===== */
async function auth() {
  const u = tg?.initDataUnsafe?.user || { id: 9999, first_name: 'Demo', username: 'demo', language_code: 'uz' };
  try {
    const r = await api('/auth/telegram', {
      method: 'POST',
      body: JSON.stringify({
        telegram_id: u.id,
        first_name: u.first_name || '',
        last_name: u.last_name || '',
        username: u.username || '',
        language: u.language_code || 'uz',
        init_data: tg?.initData || ''
      })
    });
    if (r.token) { S.token = r.token; localStorage.setItem('ot_token', r.token); }
    S.user = r.user || u;
  } catch { S.user = u; }
}

/* ===== RESTAURANTS ===== */
async function loadRestaurants() {
  try {
    let url = '/restaurants';
    if (S.coords) url += `?lat=${S.coords.lat}&lng=${S.coords.lng}`;
    const raw = await api(url);
    let list = Array.isArray(raw) ? raw : (raw.restaurants || raw.data || []);
    list = list.filter(r => r.is_active !== false && r.is_demo !== true && r.status !== 'rejected');
    list.sort((a, b) => {
      if (a.is_premium !== b.is_premium) return b.is_premium ? 1 : -1;
      if (S.coords && a.distance_km != null && b.distance_km != null) return a.distance_km - b.distance_km;
      return (b.rating || 0) - (a.rating || 0);
    });
    S.restaurants = list;
    applyFilters();
  } catch {
    document.getElementById('rest-list').innerHTML = emptyHTML('⚠', 'Ulanib bo\'lmadi', 'Internet yoki server muammosi. Qaytadan urinib ko\'ring.');
  }
}

function applyFilters() {
  const chip = S.chip || 'all';
  const q = (S.q || '').toLowerCase();
  let list = S.restaurants;
  if (chip !== 'all') {
    list = list.filter(r => {
      const cs = Array.isArray(r.cuisine) ? r.cuisine : (r.cuisine ? [r.cuisine] : []);
      return cs.some(c => String(c).toLowerCase().includes(chip));
    });
  }
  if (q) list = list.filter(r => (r.name||'').toLowerCase().includes(q) || (r.address||'').toLowerCase().includes(q));
  S.filtered = list;
  renderRestaurants();
  renderHomeInsights();
  renderHomeReelsShelf();
}

function renderRestaurants() {
  const el = document.getElementById('rest-list');
  const cnt = document.getElementById('rest-count');
  if (cnt) cnt.textContent = `${S.filtered.length} ${T('places')}`;
  if (!S.filtered.length) {
    el.innerHTML = emptyHTML('🔍', 'Hech narsa topilmadi', 'Qidiruvni yoki filterni o\'zgartirib ko\'ring');
    return;
  }
  el.className = 'card-list stagger';
  el.innerHTML = S.filtered.map(r => cardHTML(r)).join('');
  // Fav buttons
  el.querySelectorAll('.fav-btn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      toggleFav(Number(btn.dataset.id));
      btn.classList.toggle('active', S.favorites.includes(Number(btn.dataset.id)));
      haptic('light');
    });
  });
  // Book buttons
  el.querySelectorAll('.book-btn').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); haptic('medium'); openSheet(Number(btn.dataset.id)); });
  });
  // Card click
  el.querySelectorAll('.rest-card').forEach(card => {
    card.addEventListener('click', () => { haptic('light'); openSheet(Number(card.dataset.id)); });
  });
}

function cardHTML(r) {
  const img = r.image_url || (Array.isArray(r.gallery) && r.gallery[0]) || 'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&auto=format&fit=crop';
  const cuisines = Array.isArray(r.cuisine) ? r.cuisine : (r.cuisine ? [r.cuisine] : []);
  const priceSym = (r.price_category || '$$').replace(/[^$]/g,'');
  const priceHTML = ['$','$','$'].map((s,i) => `<span${priceSym.length > i ? '' : ' class="dim"'}>$</span>`).join('');
  const openState = isOpen(r.working_hours);
  const openBadge = openState === true
    ? `<span class="badge badge-open"><span class="dot"></span>${T('open')}</span>`
    : openState === false
      ? `<span class="badge badge-closed"><span class="dot" style="background:#F07070"></span>${T('closed')}</span>`
      : '';
  const premiumBadge = r.is_premium ? `<span class="badge badge-premium">✦ ${T('verified')}</span>` : '';
  const dist = r.distance_km != null ? `<span class="c-dist"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>${r.distance_km.toFixed(1)} km</span>` : '';
  const rating = r.rating ? Number(r.rating).toFixed(1) : '—';
  const isFav = S.favorites.includes(r.id);

  return `
    <div class="rest-card fadein" data-id="${r.id}">
      <div class="c-image">
        <img src="${esc(img)}" alt="${esc(r.name)}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800'">
        <div class="c-badges">
          <div style="display:flex;gap:6px;flex-wrap:wrap;">${openBadge}${premiumBadge}</div>
        </div>
        <button class="fav-btn${isFav?' active':''}" data-id="${r.id}" aria-label="Favourite">
          <svg viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
        </button>
      </div>
      <div class="c-body">
        <div class="c-title-row">
          <div class="c-name">${esc(r.name)}</div>
          <div class="c-rating">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 17.27 18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
            ${rating}
          </div>
        </div>
        <div class="c-meta">
          <span class="c-price">${priceHTML}</span>
          ${dist ? `<span class="sep"></span>${dist}` : ''}
          ${r.address ? `<span class="sep"></span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:130px;">${esc(r.address)}</span>` : ''}
        </div>
        <div class="c-foot">
          <div class="c-cuisines">${cuisines.slice(0,2).map(c=>`<span class="cuisine-tag">${esc(c)}</span>`).join('')}</div>
          <button class="book-btn" data-id="${r.id}">${T('book')}</button>
        </div>
      </div>
    </div>`;
}

function emptyHTML(icon, title, desc) {
  return `<div class="empty"><div class="empty-icon">${icon}</div><h3>${esc(title)}</h3><p>${esc(desc)}</p></div>`;

function previewReels(limit = 8) {
  if (S.reels?.length) return S.reels.slice(0, limit);
  return S.restaurants.slice(0, limit).map(r => ({
    id: `r${r.id}`,
    restaurant_id: r.id,
    url: r.image_url || (Array.isArray(r.gallery) && r.gallery[0]) || '',
    thumbnail_url: r.image_url || (Array.isArray(r.gallery) && r.gallery[0]) || '',
    type: 'image',
    caption: r.description || r.address || '',
    restaurant: {
      name: r.name,
      cuisine: r.cuisine,
      rating: r.rating,
      working_hours: r.working_hours,
      image_url: r.image_url
    }
  }));
}

function renderHomeInsights() {
  const el = document.getElementById('home-insights');
  if (!el) return;
  const base = (S.filtered && S.filtered.length ? S.filtered : S.restaurants) || [];
  if (!base.length) {
    el.innerHTML = `<div class="reel-preview-empty">Ma'lumotlar yuklanmoqda...</div>`;
    return;
  }
  const openNow = base.filter(r => isOpen(r.working_hours) === true).length;
  const premium = base.filter(r => r.is_premium).length;
  const rated = base.filter(r => r.rating != null && !Number.isNaN(Number(r.rating)));
  const avgRating = rated.length ? (rated.reduce((s, r) => s + Number(r.rating || 0), 0) / rated.length).toFixed(1) : '—';
  const cards = [
    { primary: true, kicker: T('home_fast_book'), value: openNow, unit: '', caption: T('home_fast_book_hint') },
    { kicker: T('home_premium'), value: premium, unit: '', caption: T('verified') },
    { kicker: T('home_avg_rating'), value: avgRating, unit: '', caption: T('home_open_now') },
    { kicker: T('home_saved'), value: S.favorites.length, unit: '', caption: T('home_saved_hint') }
  ];
  el.innerHTML = cards.map(card => `
    <div class="insight-card${card.primary ? ' primary' : ''}">
      <div class="insight-kicker">${esc(card.kicker)}</div>
      <div class="insight-value-row">
        <div class="insight-value">${esc(card.value)}</div>
        ${card.unit ? `<div class="insight-unit">${esc(card.unit)}</div>` : ''}
      </div>
      <div class="insight-caption">${esc(card.caption)}</div>
    </div>
  `).join('');
}

function focusReel(index = 0) {
  const items = document.querySelectorAll('#reels-container .reel-item');
  const target = items[Math.max(0, Math.min(index, items.length - 1))];
  if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function openReelAt(index = 0) {
  S.reelsFocusIndex = index;
  switchTab('reels');
  setTimeout(() => focusReel(index), 220);
}

function renderHomeReelsShelf() {
  const el = document.getElementById('home-reels-shelf');

  if (!reels.length) {
    el.innerHTML = `<div class="reel-preview-empty">Reels tayyor bo'lsa shu yerda ko'rinadi.</div>`;
  } else {
    el.innerHTML = reels.map((reel, i) => homeReelCardHTML(reel, i)).join('');
    el.querySelectorAll('.reel-preview-card').forEach(card => {
      card.addEventListener('click', () => {
        haptic('medium');
        openReelAt(Number(card.dataset.index || 0));
      });
    });
  }
  const cta = document.getElementById('see-all-reels-btn');
  if (cta) cta.onclick = () => { haptic('light'); openReelAt(0); };

    btn.addEventListener('click', e => { e.stopPropagation(); haptic('medium'); openSheet(Number(btn.dataset.id)); });
  });
  el.querySelectorAll('.rest-card').forEach(card => {
    card.addEventListener('click', () => { haptic('light'); openSheet(Number(card.dataset.id)); });
  });
}

/* ===== REELS ===== */
async function loadReels() {
  if (S.reelsLoaded && S.reels.length) { renderHomeReelsShelf(); renderReels(); return; }
  if (S.reelsLoading) return;
  S.reelsLoading = true;
  const container = document.getElementById('reels-container');
  try {
    let url = '/restaurants/reels?limit=20';
    if (S.coords) url += `&lat=${S.coords.lat}&lng=${S.coords.lng}`;
    const raw = await api(url).catch(() => null);
    let reels = Array.isArray(raw) ? raw : (raw?.reels || raw?.data || []);
    if (!reels.length && S.restaurants.length) {
      reels = S.restaurants.slice(0, 10).map(r => ({
        id: `r${r.id}`, restaurant_id: r.id,
        url: r.image_url || (Array.isArray(r.gallery) && r.gallery[0]) || '',
        thumbnail_url: r.image_url || '',
        type: 'image', caption: r.description || r.address || '',
        restaurant: { name: r.name, cuisine: r.cuisine, rating: r.rating, working_hours: r.working_hours, image_url: r.image_url }
      }));
    }
    S.reels = reels;
    S.reelsLoaded = true;
    renderHomeReelsShelf();
    renderReels();
  } catch {
    renderHomeReelsShelf();
    container.innerHTML = `<div class="reels-loading"><span style="font-size:30px">🎬</span><span style="font-size:14px;color:rgba(255,255,255,0.4)">Reels hozircha yo'q</span></div>`;
  } finally {
    S.reelsLoading = false;
  }
}

function renderReels() {
  const container = document.getElementById('reels-container');
  if (!S.reels.length) {
    container.innerHTML = `<div class="reels-loading"><span style="font-size:36px">🎬</span><span style="font-size:14px;color:rgba(255,255,255,0.4)">Reels hozircha yo'q</span></div>`;
    return;
  }
  container.innerHTML = `
    <div style="position:absolute;top:calc(env(safe-area-inset-top)+14px);left:0;right:0;display:flex;justify-content:center;z-index:10;pointer-events:none;">
      <div style="font-family:var(--fd);font-size:18px;font-weight:600;color:rgba(255,255,255,0.9);letter-spacing:-0.01em;font-variation-settings:'opsz' 144">
        OneTable <em style="font-style:italic;font-weight:300;color:rgba(255,255,255,0.65)">Reels</em>
      </div>
    </div>
    ${S.reels.map((reel, i) => reelItemHTML(reel, i)).join('')}
  `;

  // IntersectionObserver for autoplay
  const obs = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const vid = entry.target.querySelector('video.reel-media');
      if (!vid) return;
      if (entry.isIntersecting) { vid.play().catch(()=>{}); }
      else { vid.pause(); vid.currentTime = 0; }
    });
  }, { threshold: 0.6 });

  container.querySelectorAll('.reel-item').forEach(item => obs.observe(item));

  // Like buttons
  container.querySelectorAll('.reel-like-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      haptic('medium');
      btn.classList.toggle('liked');
      const icon = btn.querySelector('svg');
      if (icon) icon.setAttribute('fill', btn.classList.contains('liked') ? 'currentColor' : 'none');
      const cnt = btn.closest('.reel-action').querySelector('.reel-action-label');
      if (cnt) {
        const n = parseInt(cnt.textContent) || 0;
        cnt.textContent = btn.classList.contains('liked') ? n+1 : Math.max(0,n-1);
      }
    });
  });

  // Book buttons
  container.querySelectorAll('.reel-book-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      haptic('medium');
      const rid = Number(btn.dataset.rid);
      const r = S.restaurants.find(x => x.id === rid);
      if (r) { switchTab('home'); setTimeout(() => openSheet(rid), 300); }
    });
  });

  // Fav on reel
  container.querySelectorAll('.reel-fav-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      haptic('light');
      toggleFav(Number(btn.dataset.id));
      btn.classList.toggle('liked', S.favorites.includes(Number(btn.dataset.id)));
    });
  });

  if (S.reelsFocusIndex > 0) setTimeout(() => focusReel(S.reelsFocusIndex), 80);
}

function reelItemHTML(reel, i) {
  const rest = reel.restaurant || {};
  const name = rest.name || reel.restaurant_name || 'OneTable';
  const img = reel.thumbnail_url || reel.url || rest.image_url || 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800';
  const isVideo = reel.type === 'video' || reel.type === 'reel' || (reel.url||'').match(/\.(mp4|webm|mov)/i);
  const openState = isOpen(rest.working_hours);
  const cuisines = Array.isArray(rest.cuisine) ? rest.cuisine.slice(0,2).join(' · ') : (rest.cuisine || '');
  const rating = rest.rating ? Number(rest.rating).toFixed(1) : '';
  const likes = Math.floor(Math.random() * 300) + 50;
  const isFav = S.favorites.includes(reel.restaurant_id);

  const mediaTag = isVideo
    ? `<video class="reel-media" src="${esc(reel.url)}" poster="${esc(img)}" playsinline muted loop preload="none"></video>`
    : `<img class="reel-media" src="${esc(img)}" alt="${esc(name)}" loading="${i===0?'eager':'lazy'}">`;

  const openBadge = openState === true
    ? `<span class="reel-badge"><span class="rdot"></span>${T('open')}</span>`
    : openState === false
      ? `<span class="reel-badge" style="background:rgba(180,30,30,0.45);">✕ ${T('closed')}</span>`
      : '';

  return `
    <div class="reel-item">
      ${mediaTag}
      <div class="reel-overlay"></div>

      <div class="reel-info">
        <div class="reel-name">${esc(name)}</div>
        <div class="reel-meta">
          ${openBadge}
          ${rating ? `<span class="reel-badge">⭐ ${rating}</span>` : ''}
          ${cuisines ? `<span class="reel-badge">🍽 ${esc(cuisines)}</span>` : ''}
        </div>
        ${reel.caption ? `<div class="reel-caption">${esc(reel.caption)}</div>` : ''}
        <button class="reel-book-btn" data-rid="${reel.restaurant_id||''}">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
          ${T('reels_book')}
        </button>
      </div>

      <div class="reel-actions">
        <div style="margin-bottom:2px;">
          <img class="reel-avatar" src="${esc(img)}" alt="">
        </div>
        <div class="reel-action">
          <button class="reel-action-btn reel-like-btn" aria-label="Like">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
          </button>
          <div class="reel-action-label">${likes}</div>
        </div>
        <div class="reel-action">
          <button class="reel-action-btn reel-fav-btn${isFav?' liked':''}" data-id="${reel.restaurant_id||''}" aria-label="Favourite">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="${isFav?'currentColor':'none'}" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
          </button>
          <div class="reel-action-label">${T('tab_favorites')}</div>
        </div>
        <div class="reel-action">
          <button class="reel-action-btn" aria-label="Share" onclick="haptic('light');tg?.shareUrl?tg.shareUrl('https://t.me/onetable_uz_bot','${esc(name)}'):null">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
          </button>
          <div class="reel-action-label">Ulash</div>
        </div>
      </div>
    </div>`;
}

/* ===== BOOKINGS ===== */
async function loadBookings() {
  const el = document.getElementById('bookings-list');
  el.innerHTML = `<div class="sk-card skeleton" style="height:140px;margin-bottom:14px"></div><div class="sk-card skeleton" style="height:140px"></div>`;
  try {
    const raw = await api('/reservations/my');
    S.bookings = Array.isArray(raw) ? raw : (raw.reservations || []);
    renderBookings();
  } catch { S.bookings = []; renderBookings(); }
}

function renderBookings() {
  const el = document.getElementById('bookings-list');
  if (!S.bookings.length) {
    el.innerHTML = emptyHTML('📅', T('no_bookings'), T('no_bookings_h'));
    return;
  }
  el.innerHTML = S.bookings.map(bk => {
    const st = bk.status || 'pending';
    const canCancel = st === 'pending' || st === 'confirmed';
    return `
      <div class="booking-card status-${st}">
        <div class="bk-head">
          <div class="bk-name">${esc(bk.restaurant_name || bk.restaurant?.name || '—')}</div>
          <span class="bk-status ${st}">${T('status_'+st)}</span>
        </div>
        <div class="bk-details">
          <div class="bk-detail"><div class="bk-lbl">${T('date_lbl')}</div><div class="bk-val">${humanDate(bk.date)}</div></div>
          <div class="bk-detail"><div class="bk-lbl">${T('time_lbl')}</div><div class="bk-val">${String(bk.time||'').slice(0,5)}</div></div>
          <div class="bk-detail"><div class="bk-lbl">${T('guests_lbl')}</div><div class="bk-val">${bk.guests} ${T('people')}</div></div>
        </div>
        ${canCancel ? `<div class="bk-actions"><button class="bk-cancel-btn" data-id="${bk.id}">${T('cancel')}</button></div>` : ''}
      </div>`;
  }).join('');
  el.querySelectorAll('.bk-cancel-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      haptic('warning');
      const doCancel = () => cancelBooking(btn.dataset.id);
      if (tg?.showConfirm) { tg.showConfirm(T('cancel_q'), ok => { if(ok) doCancel(); }); }
      else if (confirm(T('cancel_q'))) doCancel();
    });
  });
  updateProfileStats();
}

async function cancelBooking(id) {
  try {
    await api(`/reservations/${id}`, { method: 'DELETE' });
    haptic('success'); toast(T('cancelled'), 'success'); loadBookings();
  } catch(e) { haptic('error'); toast(e.message, 'error'); }
}
