<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#09090B">
<title>OneTable · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#09090B;--bg2:#18181B;--bg3:#27272A;--bg4:#3F3F46;
  --t1:#FAFAFA;--t2:#D4D4D8;--t3:#A1A1AA;--t4:#71717A;--t5:#52525B;
  --border:#27272A;--border2:#3F3F46;
  --accent:#8B5CF6;--accent2:#A78BFA;--accent-bg:rgba(139,92,246,0.12);
  --green:#22C55E;--green-bg:rgba(34,197,94,0.12);
  --red:#EF4444;--red-bg:rgba(239,68,68,0.12);
  --yellow:#F59E0B;--yellow-bg:rgba(245,158,11,0.12);
  --blue:#3B82F6;--blue-bg:rgba(59,130,246,0.12);
  --r:10px;--r2:14px;--r3:20px;
  --font:'Instrument Sans',sans-serif;
  --mono:'Space Grotesk',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:inherit;color:inherit;outline:none}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bg3);border-radius:4px}

.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{width:100%;max-width:380px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);padding:40px 32px}
.login-box h1{font-size:24px;font-weight:700;margin-bottom:4px;text-align:center}
.login-box p{color:var(--t3);font-size:13px;text-align:center;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:10px 14px;background:var(--bg);border:1px solid var(--border);border-radius:var(--r);font-size:14px;color:var(--t1);transition:border-color 0.15s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:var(--r);font-size:13px;font-weight:600;transition:all 0.15s}
.btn:active{transform:scale(0.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--bg3);color:var(--t2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--bg4)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-danger{background:var(--red-bg);color:var(--red)}
.btn-success{background:var(--green-bg);color:var(--green)}
.btn-block{width:100%;justify-content:center}

.shell{display:none;min-height:100vh}
.shell.active{display:flex}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
.sb-brand{padding:20px;font-family:var(--mono);font-size:16px;font-weight:700;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.sb-brand span{color:var(--accent)}
.sb-nav{flex:1;padding:12px 8px;display:flex;flex-direction:column;gap:2px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--r);font-size:13px;font-weight:500;color:var(--t3);transition:all 0.12s;cursor:pointer}
.sb-item:hover{background:var(--bg3);color:var(--t2)}
.sb-item.active{background:var(--accent-bg);color:var(--accent)}
.sb-item .badge{margin-left:auto;padding:1px 7px;background:var(--red);color:#fff;font-size:10px;font-weight:700;border-radius:100px;min-width:18px;text-align:center}
.sb-foot{padding:16px;border-top:1px solid var(--border);font-size:12px;color:var(--t4)}

.main-area{flex:1;min-width:0;display:flex;flex-direction:column}
.topbar{height:56px;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;background:var(--bg)}
.topbar h2{font-size:16px;font-weight:600}
.content{flex:1;padding:24px;overflow-y:auto}

.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.stat-card .sc-label{font-size:11px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.stat-card .sc-value{font-family:var(--mono);font-size:32px;font-weight:700;color:var(--t1);line-height:1}
.stat-card .sc-sub{font-size:12px;color:var(--t4);margin-top:6px}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;margin-bottom:16px}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-head h3{font-size:14px;font-weight:600}
.card-body{padding:16px 20px}

table.dt{width:100%;border-collapse:collapse}
table.dt th{text-align:left;padding:10px 16px;font-size:11px;font-weight:600;color:var(--t4);text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);background:var(--bg)}
table.dt td{padding:12px 16px;border-bottom:1px solid var(--border);font-size:13px;color:var(--t2);vertical-align:middle}
table.dt tr:last-child td{border-bottom:none}
table.dt tr:hover td{background:rgba(255,255,255,0.02)}
table.dt .name{font-weight:600;color:var(--t1)}
table.dt .actions{text-align:right;white-space:nowrap}

.pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.04em}
.pill.pending{background:var(--yellow-bg);color:var(--yellow)}
.pill.approved,.pill.confirmed,.pill.active{background:var(--green-bg);color:var(--green)}
.pill.rejected,.pill.cancelled,.pill.inactive{background:var(--red-bg);color:var(--red)}
.pill.completed{background:var(--blue-bg);color:var(--blue)}
.pill.premium{background:var(--accent-bg);color:var(--accent)}

.empty{padding:48px 24px;text-align:center;color:var(--t4)}
.empty .em-icon{font-size:36px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--t3)}

.toast{position:fixed;top:20px;right:20px;padding:12px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);font-size:13px;font-weight:600;color:var(--t1);z-index:500;transform:translateX(130%);transition:transform 0.3s ease}
.toast.show{transform:translateX(0)}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}

.spin{width:14px;height:14px;border:2px solid var(--t4);border-top-color:var(--accent);border-radius:50%;animation:sp 0.6s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r3);width:min(480px,calc(100vw - 32px));max-height:80vh;display:flex;flex-direction:column}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-head h3{font-size:16px;font-weight:600}
.modal-body{padding:20px 22px;overflow-y:auto;flex:1}
.modal-foot{padding:14px 22px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

@media(max-width:900px){
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  .sidebar{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-page" id="login-page">
  <div class="login-box">
    <h1>🛡 Admin Panel</h1>
    <p>OneTable platform boshqaruvi</p>
    <form id="login-form">
      <div class="field"><label>Email</label><input type="email" name="email" required placeholder="admin@onetable.uz"></div>
      <div class="field"><label>Parol</label><input type="password" name="password" required></div>
      <button type="submit" class="btn btn-primary btn-block" style="margin-top:8px">Kirish</button>
    </form>
  </div>
</div>

<!-- SHELL -->
<div class="shell" id="shell">
  <aside class="sidebar">
    <div class="sb-brand"><span>◆</span> OneTable Admin</div>
    <nav class="sb-nav">
      <div class="sb-item active" data-p="dashboard">📊 Dashboard</div>
      <div class="sb-item" data-p="restaurants">🏪 Restoranlar <span class="badge" id="badge-pending" style="display:none">0</span></div>
      <div class="sb-item" data-p="users">👤 Foydalanuvchilar</div>
      <div class="sb-item" data-p="owners">🧑‍💼 Egalari</div>
      <div class="sb-item" data-p="bookings">📅 Bronlar</div>
      <div class="sb-item" data-p="reviews">💬 Sharhlar</div>
      <div class="sb-item" data-p="premium">⭐ Premium</div>
    </nav>
    <div class="sb-foot">
      <div id="admin-name">Admin</div>
      <button style="color:var(--red);margin-top:4px;font-size:12px" onclick="logout()">Chiqish</button>
    </div>
  </aside>
  <div class="main-area">
    <header class="topbar"><h2 id="page-title">Dashboard</h2><div id="admin-email" style="color:var(--t4);font-size:12px"></div></header>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal"><div class="modal-head"><h3 id="m-title"></h3><button onclick="closeModal()" style="color:var(--t3);font-size:18px">✕</button></div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-foot" id="m-foot"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = `${location.origin}/api`
const S = {
  token: localStorage.getItem('ot_admin_token'),
  admin: JSON.parse(localStorage.getItem('ot_admin') || 'null'),
  page: 'dashboard',
  stats: null,
  restaurants: [],
  users: [],
  owners: [],
  bookings: [],
  reviews: [],
  premiumReqs: []
}

const $=s=>document.querySelector(s)
const $$=s=>document.querySelectorAll(s)
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const fmt=n=>new Intl.NumberFormat('en').format(Number(n)||0)

async function api(path,opts={}){
  const h={...opts.headers||{}}
  if(!h['Content-Type'])h['Content-Type']='application/json'
  if(S.token)h.Authorization=`Bearer ${S.token}`
  const r=await fetch(`${API}${path}`,{...opts,headers:h})
  const d=await r.json().catch(()=>null)
  if(!r.ok){if(r.status===401)logout();throw new Error(d?.error||`HTTP ${r.status}`)}
  return d
}

let _tt
function toast(msg,type=''){
  const el=$('#toast');el.textContent=msg;el.className=`toast show ${type}`
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),3000)
}

function openModal(title,body,footer=''){
  $('#m-title').textContent=title;$('#m-body').innerHTML=body;$('#m-foot').innerHTML=footer
  $('#modal-bg').classList.add('open')
}
function closeModal(){$('#modal-bg').classList.remove('open')}

// Auth
$('#login-form').addEventListener('submit',async e=>{
  e.preventDefault()
  const fd=new FormData(e.target)
  try{
    const r=await api('/auth/admin/login',{method:'POST',body:JSON.stringify({email:fd.get('email'),password:fd.get('password')})})
    S.token=r.token;S.admin=r.admin
    localStorage.setItem('ot_admin_token',S.token)
    localStorage.setItem('ot_admin',JSON.stringify(S.admin))
    init()
  }catch(e){toast(e.message,'error')}
})

function logout(){
  S.token=null;S.admin=null
  localStorage.removeItem('ot_admin_token');localStorage.removeItem('ot_admin')
  $('#shell').classList.remove('active');$('#login-page').style.display='flex'
}

function showShell(){
  $('#login-page').style.display='none';$('#shell').classList.add('active')
  $('#admin-name').textContent=S.admin?.full_name||'Admin'
  $('#admin-email').textContent=S.admin?.email||''
}

// Navigation
$$('.sb-item').forEach(el=>el.addEventListener('click',()=>{
  $$('.sb-item').forEach(x=>x.classList.remove('active'))
  el.classList.add('active')
  navigate(el.dataset.p)
}))

function navigate(page){
  S.page=page
  const titles={dashboard:'Dashboard',restaurants:'Restoranlar',users:'Foydalanuvchilar',owners:'Restoran egalari',bookings:'Bronlar',reviews:'Sharhlar',premium:'Premium so\'rovlari'}
  $('#page-title').textContent=titles[page]||page
  const render={dashboard:renderDashboard,restaurants:renderRestaurants,users:renderUsers,owners:renderOwners,bookings:renderBookings,reviews:renderReviews,premium:renderPremium}
  ;(render[page]||renderDashboard)()
}

// Dashboard
async function renderDashboard(){
  $('#content').innerHTML='<div style="text-align:center;padding:40px"><div class="spin"></div></div>'
  try{
    S.stats=await api('/admin/stats')
    const s=S.stats
    $('#content').innerHTML=`
      <div class="stats-grid">
        <div class="stat-card"><div class="sc-label">Foydalanuvchilar</div><div class="sc-value">${fmt(s.totalUsers)}</div></div>
        <div class="stat-card"><div class="sc-label">Restoranlar</div><div class="sc-value">${fmt(s.totalRestaurants)}</div><div class="sc-sub">${s.pendingApprovals} ta kutmoqda</div></div>
        <div class="stat-card"><div class="sc-label">Bronlar</div><div class="sc-value">${fmt(s.totalReservations)}</div></div>
        <div class="stat-card"><div class="sc-label">Sharhlar</div><div class="sc-value">${fmt(s.totalReviews)}</div></div>
      </div>
      <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="sc-label">Tushum (pre-order)</div><div class="sc-value">${fmt(s.totalRevenue)}</div><div class="sc-sub">so'm</div></div>
        <div class="stat-card"><div class="sc-label">Egalari</div><div class="sc-value">${fmt(s.totalOwners)}</div></div>
        <div class="stat-card"><div class="sc-label">Tasdiq kutmoqda</div><div class="sc-value" style="color:var(--yellow)">${s.pendingApprovals}</div></div>
      </div>
      <div class="card"><div class="card-head"><h3>Status taqsimoti</h3></div><div class="card-body">
        ${(s.statusBreakdown||[]).map(r=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)"><span class="pill ${r.status}">${r.status}</span><span style="font-family:var(--mono);font-weight:600">${r.c}</span></div>`).join('')}
      </div></div>
    `
    const b=$('#badge-pending')
    if(s.pendingApprovals>0){b.textContent=s.pendingApprovals;b.style.display=''}else b.style.display='none'
  }catch(e){$('#content').innerHTML=`<div class="empty"><h3>Xatolik</h3><p>${esc(e.message)}</p></div>`}
}

// Restaurants
async function renderRestaurants(){
  $('#content').innerHTML='<div style="text-align:center;padding:40px"><div class="spin"></div></div>'
  try{
    S.restaurants=await api('/admin/restaurants')
    if(!S.restaurants.length){$('#content').innerHTML='<div class="empty"><div class="em-icon">🏪</div><h3>Restoranlar yo\'q</h3></div>';return}
    $('#content').innerHTML=`
      <div class="card"><table class="dt"><thead><tr><th>Nomi</th><th>Egasi</th><th>Status</th><th>Premium</th><th>Bronlar</th><th></th></tr></thead>
      <tbody>${S.restaurants.map(r=>`<tr>
        <td class="name">${esc(r.name)}</td>
        <td style="color:var(--t3)">${esc(r.owner_name||'—')}</td>
        <td><span class="pill ${r.status}">${r.status}</span></td>
        <td>${r.is_premium?'<span class="pill premium">Premium</span>':'—'}</td>
        <td style="font-family:var(--mono)">${r.booking_count||0}</td>
        <td class="actions">
          ${r.status==='pending'?`<button class="btn btn-sm btn-success" onclick="approveRest(${r.id})">✓</button><button class="btn btn-sm btn-danger" onclick="rejectRest(${r.id})">✕</button>`:''}
          <button class="btn btn-sm btn-ghost" onclick="toggleActive(${r.id})">${r.is_active?'🔒':'🔓'}</button>
          <button class="btn btn-sm btn-ghost" onclick="togglePrem(${r.id})">${r.is_premium?'−⭐':'+⭐'}</button>
        </td>
      </tr>`).join('')}</tbody></table></div>
    `
  }catch(e){$('#content').innerHTML=`<div class="empty"><h3>${esc(e.message)}</h3></div>`}
}

window.approveRest=async(id)=>{try{await api(`/admin/restaurants/${id}/approve`,{method:'PUT'});toast('Tasdiqlandi','success');renderRestaurants()}catch(e){toast(e.message,'error')}}
window.rejectRest=async(id)=>{
  const reason=prompt('Rad etish sababi:')
  if(reason===null)return
  try{await api(`/admin/restaurants/${id}/reject`,{method:'PUT',body:JSON.stringify({reason})});toast('Rad etildi','success');renderRestaurants()}catch(e){toast(e.message,'error')}
}
window.toggleActive=async(id)=>{try{await api(`/admin/restaurants/${id}/toggle`,{method:'PUT'});renderRestaurants()}catch(e){toast(e.message,'error')}}
window.togglePrem=async(id)=>{try{await api(`/admin/restaurants/${id}/premium`,{method:'PUT',body:JSON.stringify({months:1})});renderRestaurants()}catch(e){toast(e.message,'error')}}

// Users
async function renderUsers(){
  $('#content').innerHTML='<div style="text-align:center;padding:40px"><div class="spin"></div></div>'
  try{
    const d=await api('/admin/users')
    S.users=d.users||d
    $('#content').innerHTML=`
      <div class="card"><table class="dt"><thead><tr><th>Ism</th><th>Username</th><th>Telegram</th><th>Bronlar</th><th>Sharhlar</th><th>Status</th><th></th></tr></thead>
      <tbody>${(Array.isArray(S.users)?S.users:[]).map(u=>`<tr>
        <td class="name">${esc((u.first_name||'')+' '+(u.last_name||''))}</td>
        <td style="color:var(--t3)">@${esc(u.username||'—')}</td>
        <td style="font-family:var(--mono);font-size:12px">${u.telegram_id||'—'}</td>
        <td style="font-family:var(--mono)">${u.booking_count||0}</td>
        <td style="font-family:var(--mono)">${u.review_count||0}</td>
        <td><span class="pill ${u.is_active?'active':'inactive'}">${u.is_active?'Faol':'Bloklangan'}</span></td>
        <td class="actions"><button class="btn btn-sm ${u.is_active?'btn-danger':'btn-success'}" onclick="toggleUser(${u.id})">${u.is_active?'🔒':'🔓'}</button></td>
      </tr>`).join('')}</tbody></table></div>
    `
  }catch(e){$('#content').innerHTML=`<div class="empty"><h3>${esc(e.message)}</h3></div>`}
}
window.toggleUser=async(id)=>{try{await api(`/admin/users/${id}/toggle`,{method:'PUT'});renderUsers()}catch(e){toast(e.message,'error')}}

// Owners
async function renderOwners(){
  $('#content').innerHTML='<div style="text-align:center;padding:40px"><div class="spin"></div></div>'
  try{
    S.owners=await api('/admin/owners')
    $('#content').innerHTML=`
      <div class="card"><table class="dt"><thead><tr><th>Ism</th><th>Email</th><th>Restoran</th><th>Status</th></tr></thead>
      <tbody>${S.owners.map(o=>`<tr>
        <td class="name">${esc(o.full_name)}</td>
        <td style="color:var(--t3)">${esc(o.email)}</td>
        <td>${esc(o.restaurant_name||'—')} ${o.restaurant_status?`<span class="pill ${o.restaurant_status}">${o.restaurant_status}</span>`:''}</td>
        <td><span class="pill ${o.is_active?'active':'inactive'}">${o.is_active?'Faol':'Bloklangan'}</span></td>
      </tr>`).join('')}</tbody></table></div>
    `
  }catch(e){$('#content').innerHTML=`<div class="empty"><h3>${esc(e.message)}</h3></div>`}
}

// Bookings
async function renderBookings(){
  $('#content').innerHTML='<div style="text-align:center;padding:40px"><div class="spin"></div></div>'
  try{
    S.bookings=await api('/admin/bookings')
    $('#content').innerHTML=`
      <div class="card"><table class="dt"><thead><tr><th>ID</th><th>Restoran</th><th>Mijoz</th><th>Sana</th><th>Vaqt</th><th>Mehmon</th><th>Status</th></tr></thead>
      <tbody>${S.bookings.map(b=>`<tr>
        <td style="font-family:var(--mono)">#${b.id}</td>
        <td class="name">${esc(b.restaurant_name)}</td>
        <td>${esc((b.first_name||'')+(b.last_name?' '+b.last_name:''))}</td>
        <td style="font-family:var(--mono)">${String(b.date).slice(0,10)}</td>
        <td style="font-family:var(--mono)">${String(b.time).slice(0,5)}</td>
        <td style="font-family:var(--mono)">${b.guests}</td>
        <td><span class="pill ${b.status}">${b.status}</span></td>
      </tr>`).join('')}</tbody></table></div>
    `
  }catch(e){$('#content').innerHTML=`<div class="empty"><h3>${esc(e.message)}</h3></div>`}
}

// Reviews
async function renderReviews(){
  $('#content').innerHTML='<div style="text-align:center;padding:40px"><div class="spin"></div></div>'
  try{
    S.reviews=await api('/admin/reviews')
    $('#content').innerHTML=`
      <div class="card"><table class="dt"><thead><tr><th>Restoran</th><th>Foydalanuvchi</th><th>Reyting</th><th>Sharh</th><th>Ko'rinish</th><th></th></tr></thead>
      <tbody>${S.reviews.map(r=>`<tr>
        <td class="name">${esc(r.restaurant_name)}</td>
        <td>${esc((r.first_name||'')+(r.last_name?' '+r.last_name:''))}</td>
        <td style="font-family:var(--mono)">⭐${r.rating}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t3)">${esc(r.comment||'—')}</td>
        <td><span class="pill ${r.is_visible?'active':'inactive'}">${r.is_visible?'Ko\'rinadi':'Yashirin'}</span></td>
        <td class="actions"><button class="btn btn-sm btn-ghost" onclick="toggleReview(${r.id})">${r.is_visible?'👁‍🗨':'👁'}</button></td>
      </tr>`).join('')}</tbody></table></div>
    `
  }catch(e){$('#content').innerHTML=`<div class="empty"><h3>${esc(e.message)}</h3></div>`}
}
window.toggleReview=async(id)=>{try{await api(`/admin/reviews/${id}/toggle`,{method:'PUT'});renderReviews()}catch(e){toast(e.message,'error')}}

// Premium requests
async function renderPremium(){
  $('#content').innerHTML='<div style="text-align:center;padding:40px"><div class="spin"></div></div>'
  try{
    S.premiumReqs=await api('/admin/premium-requests')
    if(!S.premiumReqs.length){$('#content').innerHTML='<div class="empty"><div class="em-icon">⭐</div><h3>Premium so\'rovlari yo\'q</h3></div>';return}
    $('#content').innerHTML=`
      <div class="card"><table class="dt"><thead><tr><th>Restoran</th><th>Egasi</th><th>Reja</th><th>Summa</th><th>Status</th><th></th></tr></thead>
      <tbody>${S.premiumReqs.map(p=>`<tr>
        <td class="name">${esc(p.restaurant_name)}</td>
        <td>${esc(p.owner_name||'—')}</td>
        <td style="font-family:var(--mono)">${p.plan}</td>
        <td style="font-family:var(--mono)">${fmt(p.amount)} so'm</td>
        <td><span class="pill ${p.status}">${p.status}</span></td>
        <td class="actions">
          ${p.status==='pending'?`
            <button class="btn btn-sm btn-success" onclick="processPremium(${p.id},'approved')">✓ Tasdiqlash</button>
            <button class="btn btn-sm btn-danger" onclick="processPremium(${p.id},'rejected')">✕ Rad</button>
          `:'—'}
        </td>
      </tr>`).join('')}</tbody></table></div>
    `
  }catch(e){$('#content').innerHTML=`<div class="empty"><h3>${esc(e.message)}</h3></div>`}
}
window.processPremium=async(id,action)=>{
  try{
    await api(`/admin/premium-requests/${id}`,{method:'PUT',body:JSON.stringify({action,months:action==='approved'?1:0})})
    toast(action==='approved'?'Premium tasdiqlandi':'Rad etildi','success')
    renderPremium()
  }catch(e){toast(e.message,'error')}
}

// Init
async function init(){
  if(!S.token||!S.admin){$('#login-page').style.display='flex';return}
  showShell()
  navigate('dashboard')
}
init()
</script>
