<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F2">
<title>OneTable — Toshkent restoranlari</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   OneTable Premium — Apple-grade Mini App
   ═══════════════════════════════════════════════════════ */
:root{--bg:#FAF7F2;--bg2:#FFF;--bg3:#F2ECE0;--ink:#1C1917;--ink2:#44403C;--ink3:#8B8178;--ink4:#C4B9AD;--line:#E8E0D0;--accent:#7B2D26;--accent2:#642019;--gold:#B07B2A;--success:#3D6B38;--danger:#9B2C2C;--r:12px;--r2:18px;--r3:24px;--fd:'Fraunces',serif;--fb:'Manrope',sans-serif;--tabbar-h:72px;--safe-b:env(safe-area-inset-bottom,0px)}
[data-theme="dark"]{--bg:#100D0A;--bg2:#1A1612;--bg3:#231E18;--ink:#F5F0E8;--ink2:#D8D0C4;--ink3:#9A9188;--ink4:#5A5248;--line:#2A231B;--accent:#D4866E;--accent2:#E09A82;--gold:#D4A045;--success:#6FA860;--danger:#D47070}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--fb);font-size:15px;line-height:1.55;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;font-size:inherit;color:inherit}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
#app{display:flex;flex-direction:column;min-height:100dvh;padding-bottom:calc(var(--tabbar-h) + var(--safe-b))}
.page{display:none;min-height:calc(100dvh - var(--tabbar-h) - var(--safe-b))}
.page.active{display:block}
.topbar{padding:calc(env(safe-area-inset-top,0px) + 22px) 22px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:5px}
.greet-title{font-family:var(--fd);font-size:30px;font-weight:400;line-height:1.08;letter-spacing:-.03em;color:var(--ink)}
.greet-title em{font-style:italic;font-weight:300;color:var(--accent)}
.search-wrap{padding:14px 22px 6px}
.search{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1.5px solid var(--line);border-radius:var(--r3);padding:14px 18px;box-shadow:0 2px 8px rgba(0,0,0,.03);transition:all .25s ease}
.search:focus-within{border-color:var(--accent);box-shadow:0 2px 16px rgba(123,45,38,.08)}
.search input{flex:1;border:none;background:none;outline:none;font-size:15px}
.search input::placeholder{color:var(--ink3)}
.section{padding:20px 22px 6px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px}
.section-title{font-family:var(--fd);font-size:23px;font-weight:400;color:var(--ink)}
.section-title em{font-style:italic;font-weight:300;color:var(--accent)}
.card-list{display:flex;flex-direction:column;gap:20px}
.rest-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r3);overflow:hidden;transition:all .35s ease;box-shadow:0 2px 12px rgba(0,0,0,.04)}
.rest-card:active{transform:scale(.983)}
.rest-card .c-image{position:relative;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.rest-card .c-image::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(transparent,rgba(0,0,0,.35));pointer-events:none}
.rest-card .c-image img{width:100%;height:100%;object-fit:cover;transition:transform .5s ease}
.c-body{padding:18px 20px 20px}
.c-name{font-family:var(--fd);font-size:22px;font-weight:500;letter-spacing:-.022em;line-height:1.12;color:var(--ink)}
.c-meta{display:flex;align-items:center;gap:6px;font-size:12.5px;color:var(--ink3);margin-top:5px;flex-wrap:wrap}
.c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
.book-btn{padding:11px 20px;background:var(--ink);color:var(--bg);border-radius:100px;font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;transition:all .22s ease}
.book-btn:active{transform:scale(.92)}
.chip-row{display:flex;gap:8px;padding:12px 22px 6px;overflow-x:auto;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:9px 18px;border-radius:100px;background:var(--bg2);border:1.5px solid var(--line);font-size:12.5px;font-weight:700;color:var(--ink2)}
.chip.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tabbar-h) + var(--safe-b));background:rgba(250,247,242,.8);border-top:1px solid var(--line);padding:10px 8px calc(10px + var(--safe-b));display:flex;z-index:50;backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px)}
[data-theme="dark"] .tabbar{background:rgba(16,13,10,.85)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--ink4);font-size:9.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;transition:color .2s ease}
.tab.active{color:var(--accent)}
.tab svg{transition:transform .3s cubic-bezier(.34,1.56,.64,1)}
.tab.active svg{transform:scale(1.14)}
.empty{padding:56px 36px;text-align:center}
.empty h3{font-family:var(--fd);font-size:22px;font-weight:400;font-style:italic;margin-bottom:8px}
.empty p{font-size:14px;color:var(--ink3);max-width:260px;margin:0 auto}
.skeleton{background:linear-gradient(90deg,var(--bg3) 0%,var(--line) 45%,var(--bg3) 100%);background-size:200% 100%;animation:shimmer 1.6s ease-in-out infinite;border-radius:var(--r2)}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.toast{position:fixed;top:calc(env(safe-area-inset-top,0px) + 18px);left:18px;right:18px;background:var(--ink);color:var(--bg);padding:14px 20px;border-radius:var(--r2);font-size:14px;font-weight:700;text-align:center;z-index:300;transform:translateY(-130%);transition:transform .42s ease}
.toast.show{transform:translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}
.badge-open{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;font-size:10.5px;font-weight:700;background:rgba(15,30,15,.55);color:#7ECD72;backdrop-filter:blur(16px);position:absolute;top:14px;left:14px;z-index:2}
.badge-open .dot{width:6px;height:6px;border-radius:50%;background:#7ECD72}
.c-rating{display:inline-flex;align-items:center;gap:4px;font-size:14px;font-weight:800;color:var(--ink);padding:4px 10px;background:var(--bg3);border-radius:100px}
.spin{width:18px;height:18px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* Sheet */
.sheet-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(10px);z-index:100;opacity:0;pointer-events:none;transition:opacity .38s ease}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;max-height:93dvh;background:var(--bg);border-radius:var(--r3) var(--r3) 0 0;z-index:101;transform:translateY(100%);transition:transform .48s ease;display:flex;flex-direction:column;will-change:transform}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:44px;height:4px;border-radius:2px;background:var(--line);margin:14px auto 6px}
.sheet-header{padding:8px 22px 18px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--line)}
.sheet-title{font-family:var(--fd);font-size:24px;font-weight:500;letter-spacing:-.025em}
.sheet-body{flex:1;overflow-y:auto;padding:20px 22px 16px}
.sheet-foot{padding:14px 22px calc(18px + var(--safe-b));border-top:1px solid var(--line)}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.zone-card{padding:16px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2);text-align:left;transition:all .2s ease}
.zone-card:active{transform:scale(.96)}
.zone-card.active{border-color:var(--ink);background:var(--ink);color:var(--bg)}
.date-row{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.date-row::-webkit-scrollbar{display:none}
.date-card{flex-shrink:0;min-width:62px;padding:13px 8px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2);text-align:center;transition:all .2s ease}
.date-card.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.date-card .dc-day{font-family:var(--fd);font-size:24px;font-weight:400;line-height:1}
.date-card .dc-dow,.date-card .dc-mon{font-size:9px;font-weight:700;opacity:.55;text-transform:uppercase}
.guests-control{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2)}
.guests-num{font-family:var(--fd);font-size:32px;font-weight:400;line-height:1}
.g-btn{width:42px;height:42px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;transition:all .15s ease}
.g-btn:active{transform:scale(.86)}
.g-btn:disabled{opacity:.25}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.time-card{padding:14px 6px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2);font-size:13.5px;font-weight:700;text-align:center;transition:all .2s ease}
.time-card:active:not([disabled]){transform:scale(.92)}
.time-card.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.time-card[disabled]{opacity:.28;text-decoration:line-through;pointer-events:none}
.btn-primary{width:100%;padding:17px 24px;background:var(--ink);color:var(--bg);border-radius:var(--r2);font-size:15px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .22s ease}
.btn-primary:active:not([disabled]){transform:scale(.97)}
.btn-primary[disabled]{opacity:.38}
.field-label{font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:12px}
.field-block{margin-bottom:24px}
.steps-bar{display:flex;gap:6px;margin-bottom:22px}
.step-seg{flex:1;height:3px;border-radius:2px;background:var(--line);overflow:hidden}
.step-seg.done{background:var(--accent)}
.step-seg.active{background:var(--ink)}

/* Booking card */
.booking-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r3);padding:20px;margin-bottom:14px;position:relative;overflow:hidden}
.booking-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.booking-card.status-confirmed::before{background:var(--success)}
.booking-card.status-pending::before{background:var(--gold)}
.booking-card.status-cancelled::before{background:var(--danger)}
.bk-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;padding-left:8px}
.bk-name{font-family:var(--fd);font-size:20px;font-weight:500;flex:1}
.bk-status{font-size:10px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding:5px 12px;border-radius:100px}
.bk-status.pending{background:rgba(176,123,42,.12);color:var(--gold)}
.bk-status.confirmed{background:rgba(61,107,56,.12);color:var(--success)}
.bk-status.cancelled{background:rgba(155,44,44,.12);color:var(--danger)}
.bk-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;padding:14px 8px 0;border-top:1px solid var(--line)}
.bk-detail .bk-lbl{font-size:9.5px;color:var(--ink3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.bk-detail .bk-val{font-size:14px;font-weight:800;color:var(--ink)}

/* ── Premium Animations ── */
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse-gold{0%,100%{box-shadow:0 0 0 0 rgba(176,123,42,.3)}50%{box-shadow:0 0 0 10px rgba(176,123,42,0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
.page.active{animation:fadeIn .35s ease}
.rest-card{animation:fadeInUp .5s ease both}
.rest-card:nth-child(2){animation-delay:.08s}
.rest-card:nth-child(3){animation-delay:.16s}
.rest-card:nth-child(4){animation-delay:.24s}
.rest-card .c-image img{transition:transform .6s ease}
.rest-card:active .c-image img{transform:scale(1.04)}
.book-btn{background:linear-gradient(135deg,var(--ink),var(--ink2));box-shadow:0 4px 14px rgba(0,0,0,.15)}
.book-btn:active{box-shadow:0 2px 6px rgba(0,0,0,.1)}
.badge-premium{position:absolute;top:14px;right:14px;padding:5px 11px;border-radius:100px;font-size:10px;font-weight:800;background:linear-gradient(135deg,#B07B2A,#D4A045);color:#fff;letter-spacing:.05em;z-index:2;animation:pulse-gold 2s ease infinite}
.c-rating{background:linear-gradient(135deg,var(--bg3),var(--bg2));box-shadow:0 2px 8px rgba(0,0,0,.04)}
.search{transition:all .3s ease;box-shadow:0 2px 12px rgba(0,0,0,.03)}
.search:focus-within{box-shadow:0 4px 20px rgba(123,45,38,.1);transform:translateY(-1px)}
.chip{transition:all .25s ease}
.chip:active{transform:scale(.93)}
.chip.active{box-shadow:0 4px 14px rgba(0,0,0,.12)}
.tabbar{backdrop-filter:blur(20px);background:rgba(250,247,242,.85)}
[data-theme="dark"] .tabbar{background:rgba(16,13,10,.85)}
.tab{transition:all .25s ease}
.sheet{box-shadow:0 -16px 48px rgba(0,0,0,.15)}
.sheet-backdrop{transition:opacity .35s ease}
.zone-card{transition:all .25s cubic-bezier(.4,0,.2,1)}
.zone-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.06)}
.date-card{transition:all .2s cubic-bezier(.4,0,.2,1)}
.time-card{transition:all .2s cubic-bezier(.4,0,.2,1)}
.btn-primary{background:linear-gradient(135deg,var(--ink),var(--ink2));box-shadow:0 6px 20px rgba(0,0,0,.15);transition:all .25s ease}
.btn-primary:active:not([disabled]){box-shadow:0 2px 8px rgba(0,0,0,.1)}
.booking-card{transition:all .3s ease;animation:fadeInUp .4s ease both}
.booking-card:nth-child(2){animation-delay:.06s}
.booking-card:nth-child(3){animation-delay:.12s}

/* ── Interactive Table Map ── */
.table-map{position:relative;width:100%;aspect-ratio:4/3;background:var(--bg3);border-radius:var(--r2);overflow:hidden;border:1px solid var(--line)}
.table-map-grid{position:absolute;inset:0;background-image:radial-gradient(var(--line) 1px,transparent 1px);background-size:24px 24px;opacity:.5}
.map-table{position:absolute;display:flex;align-items:center;justify-content:center;border:2px solid var(--line);background:var(--bg2);cursor:pointer;transition:all .3s ease;font-size:11px;font-weight:800;color:var(--ink3)}
.map-table.round{border-radius:50%}
.map-table.rect{border-radius:var(--r)}
.map-table:hover{transform:scale(1.08);border-color:var(--gold);color:var(--gold);box-shadow:0 4px 16px rgba(176,123,42,.2)}
.map-table.selected{border-color:var(--gold);color:var(--gold);background:rgba(176,123,42,.08);box-shadow:0 0 0 3px rgba(176,123,42,.2)}
.map-table.booked{border-color:var(--danger);color:var(--danger);background:rgba(155,44,44,.06);cursor:not-allowed;opacity:.6}
.map-table.booked:hover{transform:none;box-shadow:none}
.map-seat{position:absolute;width:8px;height:4px;border-radius:4px;background:var(--line);transition:all .3s ease}
.map-table:hover .map-seat,.map-table.selected .map-seat{background:var(--gold)}
.map-legend{display:flex;gap:16px;margin-top:12px;justify-content:center}
.map-legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3);font-weight:600}
.map-legend-dot{width:10px;height:10px;border-radius:50%;border:2px solid}

/* ── Trust Score Badge ── */
.trust-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700}
.trust-badge.high{background:rgba(61,107,56,.1);color:var(--success)}
.trust-badge.medium{background:rgba(176,123,42,.1);color:var(--gold)}
.trust-badge.low{background:rgba(155,44,44,.1);color:var(--danger)}

/* ── Reels Section ── */
.reels-row{display:flex;gap:12px;overflow-x:auto;scrollbar-width:none;padding:0 22px 8px;scroll-snap-type:x mandatory}
.reels-row::-webkit-scrollbar{display:none}
.reel-card{flex-shrink:0;width:140px;height:200px;border-radius:var(--r2);overflow:hidden;position:relative;scroll-snap-align:start;background:var(--bg3)}
.reel-card img,.reel-card video{width:100%;height:100%;object-fit:cover}
.reel-card .reel-overlay{position:absolute;inset:0;background:linear-gradient(transparent 50%,rgba(0,0,0,.7));display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
.reel-card .reel-name{font-size:12px;font-weight:700;color:#fff;line-height:1.2}
.reel-card .reel-views{font-size:10px;color:rgba(255,255,255,.6);margin-top:2px}

/* ── Trust Badge ── */
.trust-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:100px;font-size:11px;font-weight:700;letter-spacing:.03em}
.trust-badge.high{background:rgba(61,107,56,.12);color:var(--success)}
.trust-badge.medium{background:rgba(176,123,42,.12);color:var(--gold)}
.trust-badge.low{background:rgba(155,44,44,.12);color:var(--danger)}

/* ── Card entrance ── */
.rest-card{animation:cardIn .5s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.card-list .rest-card:nth-child(1){animation-delay:.0s}
.card-list .rest-card:nth-child(2){animation-delay:.08s}
.card-list .rest-card:nth-child(3){animation-delay:.16s}
.card-list .rest-card:nth-child(4){animation-delay:.24s}
.card-list .rest-card:nth-child(5){animation-delay:.32s}

/* ── Book button gradient ── */
.book-btn{background:linear-gradient(135deg,var(--ink),var(--ink2));box-shadow:0 2px 8px rgba(0,0,0,.12)}
[data-theme="dark"] .book-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff}
</style>
</head>
<body>
<div id="app">
<div class="page active" id="page-home">
<!-- Hero Greeting -->
<div style="position:relative;overflow:hidden">
<div style="position:absolute;inset:0;background:linear-gradient(165deg,var(--accent) 0%,rgba(123,45,38,.08) 50%,transparent 70%);opacity:.12;pointer-events:none"></div>
<div class="topbar">
<div>
<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
<div style="width:28px;height:28px;border-radius:8px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:14px;font-style:italic;color:var(--bg)">O</div>
<span style="font-family:var(--fd);font-size:13px;font-weight:400;color:var(--ink3)">One<em style="color:var(--accent);font-style:italic">Table</em></span>
</div>
<h1 class="greet-title"><span id="home-greeting">Xayrli kun,</span><br><em id="home-user-name">mehmon</em></h1>
</div>
<div style="display:flex;gap:10px;align-items:center">
<button style="width:44px;height:44px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);font-size:17px;backdrop-filter:blur(10px);transition:all .2s ease" id="lang-btn">🇺🇿</button>
<div style="width:44px;height:44px;border-radius:50%;background:linear-gradient(145deg,var(--accent),var(--gold));display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-size:18px;color:#fff;font-style:italic;box-shadow:0 4px 16px rgba(123,45,38,.25)" id="home-avatar">M</div>
</div>
</div>
</div>
<!-- Search -->
<div class="search-wrap"><div class="search"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="search-input" placeholder="Restoran qidirish..."></div></div>
<!-- Chips -->
<div class="chip-row" id="chip-row"></div>
<!-- Reels -->

<!-- Featured / Premium -->

<div class="sheet-backdrop" id="sheet-backdrop"></div>
<div class="sheet" id="sheet"><div class="sheet-handle"></div><div class="sheet-header"><div style="flex:1"><div class="eyebrow" style="color:var(--accent)">Bron qilish</div><div class="sheet-title" id="sheet-title">Restoran</div></div><button style="width:36px;height:36px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;color:var(--ink2)" id="sheet-close">✕</button></div><div class="sheet-body" id="sheet-body"></div><div class="sheet-foot" id="sheet-foot"></div></div>

<div class="toast" id="toast"></div>

<script>
'use strict'
const API=`${location.origin}/api`
const tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();tg.disableVerticalSwipes?.()}

const S={token:localStorage.getItem('ot_token'),user:null,restaurants:[],filtered:[],bookings:[],favorites:JSON.parse(localStorage.getItem('ot_favs')||'[]'),coords:null,tab:'home',booking:{restaurant:null,step:1,zones:[],menu:[],zone:null,date:null,time:null,guests:2,preOrder:{},availability:[]}}
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const fmt=n=>n!=null?new Intl.NumberFormat('fr-FR').format(n).replace(/\s/g,'\u202F'):'—'
const isoDate=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`
const addDays=n=>{const d=new Date();d.setDate(d.getDate()+n);return d}
const humanDate=iso=>{const d=new Date(iso);const ms=['Yan','Fev','Mar','Apr','May','Iyun','Iyul','Avg','Sen','Okt','Noy','Dek'];return`${d.getDate()} ${ms[d.getMonth()]}`}
function isOpen(wh){if(!wh)return null;const m=String(wh).match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);if(!m)return null;const[,oh,om,ch,cm]=m.map(Number);const now=new Date(),cur=now.getHours()*60+now.getMinutes(),open=oh*60+om;let close=ch*60+cm;if(close<=open)close+=1440;return cur>=open&&cur<=close}

let _tt;function toast(msg,type=''){const el=document.getElementById('toast');el.textContent=msg;el.className='toast show'+(type?' '+type:'');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2800)}

async function api(path,opts={}){const h={'Content-Type':'application/json',...(opts.headers||{})};if(S.token)h.Authorization=`Bearer ${S.token}`;const r=await fetch(API+path,{...opts,headers:h});const d=await r.json().catch(()=>null);if(!r.ok)throw new Error(d?.error||`HTTP ${r.status}`);return d}

function greeting(){const h=new Date().getHours();return h<6?'Xayrli kech,':h<12?'Xayrli tong,':h<18?'Xayrli kun,':h<22?'Xayrli oqshom,':'Xayrli kech,'}

// Auth
async function auth(){const u=tg?.initDataUnsafe?.user||{id:9999,first_name:'Demo',username:'demo'};try{const r=await api('/auth/telegram',{method:'POST',body:JSON.stringify({telegram_id:u.id,first_name:u.first_name||'',last_name:u.last_name||'',username:u.username||'',language:u.language_code||'uz'})});if(r.token){S.token=r.token;localStorage.setItem('ot_token',r.token)};S.user=r.user||u}catch{S.user=u}}

// Restaurants
async function loadRestaurants(){try{let url='/restaurants';if(S.coords)url+=`?lat=${S.coords.lat}&lng=${S.coords.lng}`;const raw=await api(url);S.restaurants=Array.isArray(raw)?raw:(raw.restaurants||[]);S.restaurants.sort((a,b)=>(b.is_premium?1:0)-(a.is_premium?1:0)||(b.rating||0)-(a.rating||0));applyFilters();renderFeatured()}catch(e){document.getElementById('rest-list').innerHTML='<div class="empty"><h3>Yuklab bo\'lmadi</h3><p>Internet yoki server xatosi</p></div>'}}

// Featured (Premium restaurants horizontal)
function renderFeatured(){const featured=S.restaurants.filter(r=>r.is_premium||Number(r.rating)>=4.5).slice(0,6);const sec=document.getElementById('featured-section');const el=document.getElementById('featured-list');if(!featured.length){sec.style.display='none';return}sec.style.display='';el.style.cssText='display:flex;gap:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px';el.innerHTML=featured.map(r=>{const img=r.image_url||'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800';return`<div onclick="openSheet(${r.id})" style="flex-shrink:0;width:220px;border-radius:var(--r2);overflow:hidden;background:var(--bg2);border:1px solid var(--line);cursor:pointer;transition:all .25s ease"><div style="position:relative;height:130px;overflow:hidden"><img src="${esc(img)}" alt="" style="width:100%;height:100%;object-fit:cover" loading="lazy">${r.is_premium?'<div class="badge-premium">★ Premium</div>':''}</div><div style="padding:12px 14px"><div style="font-family:var(--fd);font-size:16px;font-weight:500;margin-bottom:4px">${esc(r.name)}</div><div style="font-size:11px;color:var(--ink3);display:flex;gap:6px;align-items:center">⭐ ${r.rating?Number(r.rating).toFixed(1):'—'}${r.price_category?' · '+r.price_category:''}</div></div></div>`}).join('')}

function applyFilters(){const chip=S.chip||'all',q=(S.q||'').toLowerCase();let list=S.restaurants;if(chip!=='all')list=list.filter(r=>{const cs=Array.isArray(r.cuisine)?r.cuisine:(r.cuisine?[r.cuisine]:[]);return cs.some(c=>String(c).toLowerCase().includes(chip))});if(q)list=list.filter(r=>(r.name||'').toLowerCase().includes(q));S.filtered=list;renderRestaurants()}

function renderRestaurants(){const el=document.getElementById('rest-list'),cnt=document.getElementById('rest-count');if(cnt)cnt.textContent=`${S.filtered.length} ta joy`;if(!S.filtered.length){el.innerHTML='<div class="empty"><h3>Topilmadi</h3><p>Qidiruvni o\'zgartiring</p></div>';return}
el.className='card-list';el.innerHTML=S.filtered.map((r,idx)=>{
const img=r.image_url||'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800';const rating=r.rating?Number(r.rating).toFixed(1):'—';const o=isOpen(r.working_hours);const cuisines=Array.isArray(r.cuisine)?r.cuisine.slice(0,2):[];const dist=r.distance_km?`${r.distance_km} km`:'';const wh=r.working_hours||''
return`<div class="rest-card" data-id="${r.id}" onclick="openSheet(${r.id})" style="animation-delay:${idx*0.06}s"><div class="c-image"><img src="${esc(img)}" alt="${esc(r.name)}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800'">${o===true?'<div class="badge-open"><span class="dot"></span>Ochiq</div>':''}${r.is_premium?'<div class="badge-premium">★ Premium</div>':''}</div><div class="c-body"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px"><div class="c-name">${esc(r.name)}</div><div class="c-rating">⭐ ${rating}</div></div><div class="c-meta">${r.address?`<span>📍 ${esc(r.address)}</span>`:''}${dist?`<span>· ${dist}</span>`:''}${wh?`<span>· 🕐 ${esc(wh)}</span>`:''}</div>${r.deposit_required?`<div style="margin-top:6px;font-size:11px;color:var(--gold);font-weight:700">💳 Depozit: ${fmt(r.deposit_amount)} so'm</div>`:''}<div class="c-foot"><div style="display:flex;gap:6px">${cuisines.map(c=>`<span style="font-size:11px;font-weight:700;padding:4px 10px;background:var(--bg3);border-radius:100px">${esc(c)}</span>`).join('')}</div><button class="book-btn" onclick="event.stopPropagation();openSheet(${r.id})">Bron qilish</button></div></div></div>`}).join('')}

// Reels
async function loadReels(){try{const r=await api('/restaurants/reels');if(Array.isArray(r)&&r.length){const el=document.getElementById('reels-list');const sec=document.getElementById('reels-section');sec.style.display='';el.innerHTML=r.slice(0,10).map(reel=>`<div class="reel-card" onclick="openSheet(${reel.restaurant_id})"><img src="${esc(reel.thumbnail_url||reel.url)}" alt="" loading="lazy"><div class="reel-overlay"><div class="reel-name">${esc(reel.restaurant?.name||'')}</div><div class="reel-views">👁 ${reel.views||0}</div></div></div>`).join('')}}catch{}}

// Chips
function renderChips(){const defs=[{id:'all',lbl:'Barchasi'},{id:'uzbek',lbl:"O'zbek"},{id:'european',lbl:'Yevropa'},{id:'italian',lbl:'Italyan'},{id:'asian',lbl:'Osiyo'}];const row=document.getElementById('chip-row');row.innerHTML=defs.map(d=>`<button class="chip${(S.chip||'all')===d.id?' active':''}" data-c="${d.id}">${d.lbl}</button>`).join('');row.querySelectorAll('.chip').forEach(el=>el.onclick=()=>{S.chip=el.dataset.c;renderChips();applyFilters()})}

// Bookings
async function loadBookings(){const el=document.getElementById('bookings-list');el.innerHTML='<div class="skeleton" style="height:120px;margin-bottom:14px"></div>';try{const raw=await api('/reservations/my');S.bookings=Array.isArray(raw)?raw:[];renderBookings()}catch{S.bookings=[];renderBookings()}}
function renderBookings(){const el=document.getElementById('bookings-list');if(!S.bookings.length){el.innerHTML='<div class="empty"><h3>Bronlar yo\'q</h3><p>Restoran tanlang va bron qiling</p></div>';return}
el.innerHTML=S.bookings.map(bk=>{const st=bk.status||'pending';return`<div class="booking-card status-${st}"><div class="bk-head"><div class="bk-name">${esc(bk.restaurant_name||'—')}</div><span class="bk-status ${st}">${({pending:'Kutilmoqda',confirmed:'Tasdiqlangan',cancelled:'Bekor',completed:'Tugallangan'})[st]||st}</span></div><div class="bk-details"><div class="bk-detail"><div class="bk-lbl">Sana</div><div class="bk-val">${humanDate(bk.date)}</div></div><div class="bk-detail"><div class="bk-lbl">Vaqt</div><div class="bk-val">${String(bk.time||'').slice(0,5)}</div></div><div class="bk-detail"><div class="bk-lbl">Mehmon</div><div class="bk-val">${bk.guests}</div></div></div>${['pending','confirmed'].includes(st)?`<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--line);padding-left:8px"><button style="padding:10px;border-radius:100px;font-size:11.5px;font-weight:800;border:1.5px solid var(--danger);color:var(--danger);width:100%;text-transform:uppercase;letter-spacing:.05em" onclick="cancelBooking(${bk.id})">Bekor qilish</button></div>`:''}</div>`}).join('');updateStats()}
async function cancelBooking(id){if(!confirm('Bekor qilasizmi?'))return;try{await api(`/reservations/${id}`,{method:'DELETE'});toast('Bekor qilindi','success');loadBookings()}catch(e){toast(e.message,'error')}}

// Favorites
function renderFavorites(){const el=document.getElementById('fav-list');const favR=S.restaurants.filter(r=>S.favorites.includes(r.id));if(!favR.length){el.innerHTML='<div class="empty"><h3>Sevimlilar bo\'sh</h3><p>❤️ bosib qo\'shing</p></div>';return}
el.className='card-list';el.innerHTML=favR.map(r=>{const img=r.image_url||'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800';return`<div class="rest-card" onclick="openSheet(${r.id})"><div class="c-image"><img src="${esc(img)}" alt="${esc(r.name)}" loading="lazy"></div><div class="c-body"><div class="c-name">${esc(r.name)}</div><div class="c-foot"><span></span><button class="book-btn" onclick="event.stopPropagation();openSheet(${r.id})">Bron</button></div></div></div>`}).join('')}

// Profile
function renderProfile(){const u=S.user||{};const letter=(u.first_name||'M')[0].toUpperCase();document.getElementById('profile-name').textContent=u.first_name||'Mehmon';document.getElementById('profile-handle').textContent=u.username?`@${u.username}`:'';document.getElementById('profile-avatar').textContent=letter;const ha=document.getElementById('home-avatar');if(ha)ha.textContent=letter;const pt=document.getElementById('profile-trust');if(pt&&u.trust_score!=null){const ts=u.trust_score;const cls=ts>=70?'high':ts>=40?'medium':'low';pt.innerHTML=`<span class="trust-badge ${cls}">🛡 Ishonch: ${ts}%</span>`}updateStats()}
function updateStats(){document.getElementById('stat-bookings').textContent=S.bookings.length;document.getElementById('stat-favs').textContent=S.favorites.length;document.getElementById('stat-visited').textContent=new Set(S.bookings.filter(b=>b.status==='completed').map(b=>b.restaurant_id)).size}

// Language cycle
function cycleLang(){const langs=['🇺🇿','🇷🇺','🇬🇧'];const names=["O'zbek",'Русский','English'];const idx=(langs.indexOf(document.getElementById('lang-btn').textContent)+1)%3;document.getElementById('lang-btn').textContent=langs[idx];toast(names[idx],'success')}

// Tabs
function switchTab(tab){S.tab=tab;document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(`page-${tab}`).classList.add('active');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));if(tab==='bookings')loadBookings();if(tab==='favorites')renderFavorites();if(tab==='profile')renderProfile()}
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>switchTab(t.dataset.tab))

// Booking sheet
async function openSheet(rid){const r=S.restaurants.find(x=>x.id===rid);if(!r)return;S.booking={restaurant:r,step:1,zones:[],menu:[],zone:null,date:isoDate(new Date()),time:null,guests:2,preOrder:{},availability:[]};document.getElementById('sheet-title').textContent=r.name;document.getElementById('sheet-body').innerHTML='<div style="padding:40px 0;text-align:center"><div class="spin"></div></div>';document.getElementById('sheet-foot').innerHTML='';document.getElementById('sheet-backdrop').classList.add('open');document.getElementById('sheet').classList.add('open')
try{const[zones,menu]=await Promise.all([api(`/restaurants/${rid}/zones`).catch(()=>[]),api(`/restaurants/${rid}/menu`).catch(()=>[])]);S.booking.zones=Array.isArray(zones)?zones:[];S.booking.menu=Array.isArray(menu)?menu:[]}catch{};renderStep()}
function closeSheet(){document.getElementById('sheet-backdrop').classList.remove('open');document.getElementById('sheet').classList.remove('open')}
document.getElementById('sheet-close').onclick=closeSheet;document.getElementById('sheet-backdrop').onclick=closeSheet
window.openSheet=openSheet

function renderStep(){const b=S.booking,body=document.getElementById('sheet-body'),foot=document.getElementById('sheet-foot')
if(b.step===1){const zones=b.zones.length?b.zones:[{id:null,name:'Asosiy zal',capacity:b.restaurant.capacity||50}];const dates=Array.from({length:14},(_,i)=>{const d=addDays(i);const iso=isoDate(d);const dow=i===0?'Bugun':i===1?'Ertaga':['Yak','Du','Se','Chor','Pay','Ju','Sha'][d.getDay()];const ms=['Yan','Fev','Mar','Apr','May','Iyun','Iyul','Avg','Sen','Okt','Noy','Dek'];return{iso,dow:dow.slice(0,3),day:d.getDate(),mon:ms[d.getMonth()]}})
body.innerHTML=`<div class="steps-bar"><div class="step-seg active"></div><div class="step-seg"></div><div class="step-seg"></div></div><div class="field-block"><div class="field-label">Zona</div><div class="zone-grid">${zones.map(z=>`<button class="zone-card${b.zone?.id===z.id?' active':''}" onclick="S.booking.zone=${z.id===null?'{id:null,name:\\'Asosiy\\'}':'{id:'+z.id+',name:\\''+esc(z.name)+'\\'}'};renderStep()"><div style="font-weight:800;font-size:14px">${esc(z.name)}</div><div style="font-size:11px;opacity:.6">${z.capacity||''} kishi</div></button>`).join('')}</div></div><div class="field-block"><div class="field-label">Sana</div><div class="date-row">${dates.map(d=>`<button class="date-card${b.date===d.iso?' active':''}" onclick="S.booking.date='${d.iso}';renderStep()"><div class="dc-dow">${d.dow}</div><div class="dc-day">${d.day}</div><div class="dc-mon">${d.mon}</div></button>`).join('')}</div></div><div class="field-block"><div class="field-label">Mehmonlar</div><div class="guests-control"><div style="display:flex;align-items:baseline;gap:6px"><div class="guests-num">${b.guests}</div><div style="font-size:13px;color:var(--ink3)">kishi</div></div><div style="display:flex;gap:10px"><button class="g-btn" onclick="if(S.booking.guests>1){S.booking.guests--;renderStep()}" ${b.guests<=1?'disabled':''}>−</button><button class="g-btn" onclick="if(S.booking.guests<20){S.booking.guests++;renderStep()}" ${b.guests>=20?'disabled':''}>+</button></div></div></div>`
foot.innerHTML=`<button class="btn-primary" ${!b.zone?'disabled':''} onclick="S.booking.step=2;loadAvailability()">Davom etish →</button>`}

else if(b.step===2){const slots=[];for(let h=10;h<=23;h++){slots.push(`${String(h).padStart(2,'0')}:00`);if(h<23)slots.push(`${String(h).padStart(2,'0')}:30`)};const busy=new Set((b.availability||[]).map(a=>typeof a==='string'?a.slice(0,5):(a.time||'').slice(0,5)))
body.innerHTML=`<div class="steps-bar"><div class="step-seg done"></div><div class="step-seg active"></div><div class="step-seg"></div></div><div class="field-block"><div class="field-label">Vaqt · ${humanDate(b.date)}</div><div class="time-grid">${slots.map(s=>`<button class="time-card${b.time===s?' active':''}" ${busy.has(s)?'disabled':''} onclick="S.booking.time='${s}';renderStep()">${s}</button>`).join('')}</div></div>`
foot.innerHTML=`<div style="display:flex;gap:10px"><button class="btn-primary" style="background:var(--bg3);color:var(--ink);flex:0 0 48px" onclick="S.booking.step=1;renderStep()">←</button><button class="btn-primary" style="flex:1" ${!b.time?'disabled':''} onclick="S.booking.step=3;renderStep()">Davom →</button></div>`}

else if(b.step===3){body.innerHTML=`<div class="steps-bar"><div class="step-seg done"></div><div class="step-seg done"></div><div class="step-seg active"></div></div><div style="text-align:center;padding:20px 0"><div style="font-family:var(--fd);font-size:28px;margin-bottom:8px">${esc(b.restaurant.name)}</div><div style="color:var(--ink3)">${humanDate(b.date)} · ${b.time} · ${b.guests} kishi</div><div style="color:var(--ink3);margin-top:4px">${esc(b.zone?.name||'Asosiy')}</div></div>`
foot.innerHTML=`<div style="display:flex;gap:10px"><button class="btn-primary" style="background:var(--bg3);color:var(--ink);flex:0 0 48px" onclick="S.booking.step=2;renderStep()">←</button><button class="btn-primary" style="flex:1" id="submit-btn" onclick="submitBooking()">Tasdiqlash · ${b.time}</button></div>`}}

async function loadAvailability(){try{const av=await api(`/restaurants/${S.booking.restaurant.id}/availability?date=${S.booking.date}`);S.booking.availability=Array.isArray(av)?av:[]}catch{S.booking.availability=[]};renderStep()}

async function submitBooking(){const b=S.booking,btn=document.getElementById('submit-btn');btn.disabled=true;btn.innerHTML='<span class="spin"></span>'
try{await api('/reservations',{method:'POST',body:JSON.stringify({restaurant_id:b.restaurant.id,zone_id:b.zone?.id||null,date:b.date,time:b.time,guests:b.guests})});toast('Bron yaratildi!','success');closeSheet();loadBookings();switchTab('bookings')}catch(e){toast(e.message||'Xatolik','error');btn.disabled=false;btn.innerHTML=`Tasdiqlash · ${b.time}`}}

// Lang
function cycleLang(){const flags=['🇺🇿','🇷🇺','🇬🇧'],cur=document.getElementById('lang-btn').textContent,idx=(flags.indexOf(cur)+1)%3;document.getElementById('lang-btn').textContent=flags[idx]}
document.getElementById('lang-btn').onclick=cycleLang

// Search
let st;document.getElementById('search-input').oninput=e=>{clearTimeout(st);st=setTimeout(()=>{S.q=e.target.value.trim();applyFilters()},250)}

// Theme
function applyTheme(){const scheme=tg?.colorScheme||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',scheme)}

// Geo
function requestGeo(){if(!navigator.geolocation){S.coords={lat:41.2995,lng:69.2401};return};navigator.geolocation.getCurrentPosition(p=>{S.coords={lat:p.coords.latitude,lng:p.coords.longitude};loadRestaurants()},()=>{S.coords={lat:41.2995,lng:69.2401}},{timeout:5000})}

// Init
async function init(){applyTheme();if(tg?.onEvent)tg.onEvent('themeChanged',applyTheme);document.getElementById('home-greeting').textContent=greeting();renderChips();await auth();const name=S.user?.first_name||'mehmon';document.getElementById('home-user-name').textContent=name;const ha=document.getElementById('home-avatar');if(ha)ha.textContent=(name||'M')[0].toUpperCase();requestGeo();await loadRestaurants();loadReels().catch(()=>{});const params=new URLSearchParams(location.search);if(params.get('page')==='bookings')switchTab('bookings')}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init()
</script>
</body>
</html>
