<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F0">
<title>OneTable — Toshkent restoranlari</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ─── DESIGN TOKENS ─────────────────────────────────────────────────────── */
:root {
  --bg:        #FAF7F0;
  --bg2:       #FFFFFF;
  --bg3:       #F3EDE0;
  --bg4:       #EDE6D5;
  --ink:       #1A1714;
  --ink2:      #3D3830;
  --ink3:      #857A6E;
  --ink4:      #C0B5A8;
  --line:      #E8DFD0;
  --line2:     #F0E9DC;
  --accent:    #7B2D26;
  --accent2:   #9B3D34;
  --accentRgb: 123,45,38;
  --gold:      #A8722A;
  --goldLight: #F5E9D0;
  --success:   #3A6835;
  --danger:    #8B2828;
  --r:   10px;
  --r2:  16px;
  --r3:  22px;
  --r4:  28px;
  --fd: 'Fraunces', Georgia, serif;
  --fb: 'Manrope', system-ui, sans-serif;
  --tabbar-h: 68px;
  --safe-b:   env(safe-area-inset-bottom, 0px);
  --safe-t:   env(safe-area-inset-top, 0px);
  --sh1: 0 2px 12px rgba(0,0,0,.05);
  --sh2: 0 8px 32px rgba(0,0,0,.09);
  --sh3: 0 20px 60px rgba(0,0,0,.14);
  --tt: .35s ease;
}
[data-theme="dark"] {
  --bg:        #0E0C09;
  --bg2:       #181410;
  --bg3:       #221D17;
  --bg4:       #2C2520;
  --ink:       #F2EDE3;
  --ink2:      #CFC7BB;
  --ink3:      #8A8078;
  --ink4:      #4A4540;
  --line:      #2A231A;
  --line2:     #1E1A14;
  --accent:    #D4866E;
  --accent2:   #E09A82;
  --accentRgb: 212,134,110;
  --gold:      #D4A045;
  --goldLight: #2A2010;
  --success:   #6FA860;
  --danger:    #D47070;
  --sh1: 0 2px 12px rgba(0,0,0,.32);
  --sh2: 0 8px 32px rgba(0,0,0,.42);
  --sh3: 0 20px 60px rgba(0,0,0,.52);
}

/* ─── RESET ──────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{
  font-family:var(--fb);font-size:15px;line-height:1.55;
  color:var(--ink);background:var(--bg);
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
  transition:background var(--tt),color var(--tt)
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
input{font-family:inherit;font-size:inherit;color:inherit}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}

/* ─── LAYOUT ─────────────────────────────────────────────────────────────── */
#app{display:flex;flex-direction:column;min-height:100dvh;padding-bottom:calc(var(--tabbar-h) + var(--safe-b))}
.page{display:none;min-height:calc(100dvh - var(--tabbar-h) - var(--safe-b))}
.page.active{display:block;animation:pageFade .38s ease}
@keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ─── TOP BAR ────────────────────────────────────────────────────────────── */
.topbar{
  padding:calc(var(--safe-t) + 20px) 20px 12px;
  display:flex;align-items:flex-start;justify-content:space-between;gap:14px
}
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:4px}
.greet-title{font-family:var(--fd);font-size:28px;font-weight:400;line-height:1.1;letter-spacing:-.03em;color:var(--ink)}
.greet-title em{font-style:italic;font-weight:300;color:var(--accent)}
.header-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:4px}
.icon-btn{
  width:42px;height:42px;border-radius:50%;background:var(--bg2);
  border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;
  font-size:16px;transition:all .2s ease;box-shadow:var(--sh1)
}
.icon-btn:active{transform:scale(.9)}

/* ─── THEME TOGGLE ───────────────────────────────────────────────────────── */
.theme-toggle{
  width:52px;height:28px;border-radius:14px;background:var(--bg3);
  border:1.5px solid var(--line);position:relative;
  transition:background var(--tt),border-color var(--tt);cursor:pointer;flex-shrink:0
}
.theme-pill{
  position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;
  background:var(--ink);transition:transform .35s cubic-bezier(.34,1.56,.64,1),background var(--tt);
  display:flex;align-items:center;justify-content:center;font-size:11px
}
[data-theme="dark"] .theme-pill{transform:translateX(24px)}

/* ─── SEARCH ─────────────────────────────────────────────────────────────── */
.search-wrap{padding:6px 20px 8px}
.search{
  display:flex;align-items:center;gap:11px;background:var(--bg2);
  border:1.5px solid var(--line);border-radius:var(--r4);padding:13px 18px;
  transition:border-color .2s ease,box-shadow .2s ease;box-shadow:var(--sh1)
}
.search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accentRgb),.1)}
.search svg{color:var(--ink3);flex-shrink:0}
.search input{flex:1;border:none;background:none;outline:none;font-size:14.5px}
.search input::placeholder{color:var(--ink4)}

/* ─── CHIP ROW ───────────────────────────────────────────────────────────── */
.chip-row{display:flex;gap:8px;padding:10px 20px 8px;overflow-x:auto;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{
  flex-shrink:0;padding:8px 17px;border-radius:100px;background:var(--bg2);
  border:1.5px solid var(--line);font-size:12px;font-weight:700;color:var(--ink2);
  transition:all .2s ease;white-space:nowrap
}
.chip.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.chip:active{transform:scale(.93)}

/* ─── SECTIONS ───────────────────────────────────────────────────────────── */
.section{padding:18px 20px 6px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--fd);font-size:22px;font-weight:400;color:var(--ink);letter-spacing:-.02em}
.section-title em{font-style:italic;font-weight:300;color:var(--accent)}
.see-all{font-size:11.5px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.divider{height:1px;background:var(--line2);margin:6px 20px 0}

/* ─── LIVE BADGE ─────────────────────────────────────────────────────────── */
.live-badge{
  display:inline-flex;align-items:center;gap:5px;padding:4px 10px;
  border-radius:100px;background:rgba(var(--accentRgb),.1);color:var(--accent);
  font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase
}
.live-dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  animation:livePulse 1.6s ease-in-out infinite
}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

/* ─── TRENDING PILLS ─────────────────────────────────────────────────────── */
.trending-strip{
  display:flex;align-items:center;gap:9px;
  padding:8px 20px 10px;overflow-x:auto;scrollbar-width:none
}
.trending-strip::-webkit-scrollbar{display:none}
.trend-pill{
  flex-shrink:0;display:flex;align-items:center;gap:7px;
  padding:7px 13px;background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r3);font-size:12px;font-weight:700;color:var(--ink2);
  box-shadow:var(--sh1)
}
.trend-pill-emoji{font-size:13px}
.trend-pill-count{font-size:10px;color:var(--ink3);font-weight:600}

/* ─── RESTAURANT CARDS ───────────────────────────────────────────────────── */
.card-list{display:flex;flex-direction:column;gap:18px}
.rest-card{
  background:var(--bg2);border:1px solid var(--line);border-radius:var(--r3);
  overflow:hidden;transition:transform .3s ease,box-shadow .3s ease;
  box-shadow:var(--sh1);will-change:transform
}
.rest-card:active{transform:scale(.984);box-shadow:none}
.rest-card .c-image{position:relative;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.rest-card .c-image img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.rest-card:hover .c-image img{transform:scale(1.03)}
.badge-open{
  display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;
  font-size:10.5px;font-weight:700;background:rgba(10,25,10,.6);color:#6ECC6A;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  position:absolute;top:12px;left:12px;z-index:2
}
.badge-open .dot{width:5px;height:5px;border-radius:50%;background:#6ECC6A}
.badge-premium{
  position:absolute;top:12px;right:12px;z-index:2;padding:4px 10px;
  border-radius:100px;background:rgba(168,114,42,.85);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  color:#fff;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase
}
.c-body{padding:15px 17px 17px}
.c-name{font-family:var(--fd);font-size:19px;font-weight:500;letter-spacing:-.022em;line-height:1.14;color:var(--ink)}
.c-meta{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink3);margin-top:3px}
.c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid var(--line2)}
.c-rating{
  display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:800;
  color:var(--ink);padding:4px 9px;background:var(--bg3);border-radius:100px
}
.book-btn{
  padding:9px 17px;background:var(--ink);color:var(--bg);border-radius:100px;
  font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;
  transition:all .2s ease
}
.book-btn:active{transform:scale(.9);opacity:.85}
.cuisine-tag{font-size:10.5px;font-weight:700;padding:3px 9px;background:var(--bg3);border-radius:100px;color:var(--ink3)}

/* ─── REELS ──────────────────────────────────────────────────────────────── */
.reels-scroll{
  display:flex;gap:12px;padding:4px 20px 16px;
  overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch
}
.reels-scroll::-webkit-scrollbar{display:none}
.reel-card{
  flex-shrink:0;width:162px;border-radius:var(--r3);overflow:hidden;position:relative;
  background:var(--bg3);box-shadow:var(--sh2);cursor:pointer;
  transition:transform .3s ease;will-change:transform
}
.reel-card:active{transform:scale(.95)}
.reel-thumb{width:100%;aspect-ratio:9/16;object-fit:cover;display:block}
.reel-gradient{
  position:absolute;inset:0;
  background:linear-gradient(to bottom,transparent 28%,rgba(0,0,0,.14) 52%,rgba(0,0,0,.8) 100%)
}
.reel-play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,.22);backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.45);
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s ease,background .2s ease
}
.reel-card:active .reel-play{transform:translate(-50%,-58%) scale(.86);background:rgba(255,255,255,.35)}
.reel-play svg{margin-left:3px}
.reel-meta{position:absolute;bottom:0;left:0;right:0;padding:11px 11px 13px}
.reel-name{
  font-family:var(--fd);font-size:13.5px;font-weight:500;color:#fff;
  line-height:1.2;margin-bottom:3px;text-shadow:0 1px 4px rgba(0,0,0,.4)
}
.reel-caption{font-size:10px;color:rgba(255,255,255,.75);margin-bottom:7px;line-height:1.3}
.reel-stats{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.reel-stat{display:flex;align-items:center;gap:3px;font-size:10px;color:rgba(255,255,255,.8);font-weight:700}
.reel-book-btn{
  width:100%;padding:7px 0;background:rgba(255,255,255,.18);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.28);border-radius:100px;
  font-size:10px;font-weight:800;color:#fff;letter-spacing:.05em;
  text-transform:uppercase;text-align:center;transition:background .2s ease
}
.reel-book-btn:active{background:rgba(255,255,255,.3)}
.reel-media-badge{
  position:absolute;top:10px;right:10px;padding:3px 8px;border-radius:100px;
  font-size:9px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)
}
.reel-media-badge.video{background:rgba(0,0,0,.5);color:#fff;border:1px solid rgba(255,255,255,.2)}
.reel-media-badge.image{background:rgba(255,255,255,.2);color:#fff;border:1px solid rgba(255,255,255,.2)}

/* ─── DEALS ──────────────────────────────────────────────────────────────── */
.deals-scroll{display:flex;flex-direction:column;gap:13px;padding:4px 20px 16px}
.deal-card{
  border-radius:var(--r3);overflow:hidden;background:var(--bg2);border:1px solid var(--line);
  box-shadow:var(--sh1);display:flex;min-height:116px;position:relative;
  transition:transform .28s ease,box-shadow .28s ease;cursor:pointer
}
.deal-card:active{transform:scale(.983);box-shadow:none}
.deal-thumb{width:108px;flex-shrink:0;position:relative;overflow:hidden;background:var(--bg3)}
.deal-thumb img{width:100%;height:100%;object-fit:cover}
.deal-thumb-grad{position:absolute;inset:0;background:linear-gradient(to right,transparent 50%,var(--bg2))}
.deal-disc{
  position:absolute;top:9px;left:9px;padding:5px 10px;border-radius:var(--r);
  background:var(--accent);color:#fff;font-size:13px;font-weight:800;letter-spacing:-.01em;
  box-shadow:0 3px 12px rgba(var(--accentRgb),.45)
}
.deal-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center
}
.deal-play svg{filter:drop-shadow(0 2px 8px rgba(0,0,0,.5))}
.deal-body{flex:1;padding:13px 14px 13px 7px;display:flex;flex-direction:column;justify-content:space-between}
.deal-title{font-family:var(--fd);font-size:15.5px;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:4px}
.deal-desc{font-size:11px;color:var(--ink3);line-height:1.4}
.deal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.deal-expire{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em}
.deal-cta{
  padding:6px 13px;background:var(--ink);color:var(--bg);border-radius:100px;
  font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase;
  transition:all .18s ease
}
.deal-cta:active{transform:scale(.9)}
.deal-new{
  position:absolute;top:0;right:0;padding:3px 10px;background:var(--goldLight);
  color:var(--gold);font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
  border-radius:0 var(--r3) 0 var(--r)
}

/* ─── TRENDING TONIGHT ───────────────────────────────────────────────────── */
.tonight-scroll{display:flex;gap:11px;padding:4px 20px 16px;overflow-x:auto;scrollbar-width:none}
.tonight-scroll::-webkit-scrollbar{display:none}
.tonight-card{
  flex-shrink:0;width:196px;background:var(--bg2);border:1px solid var(--line);
  border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1);cursor:pointer;
  transition:transform .28s ease
}
.tonight-card:active{transform:scale(.95)}
.tonight-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.tonight-body{padding:11px 13px 14px}
.tonight-name{font-family:var(--fd);font-size:14.5px;font-weight:500;color:var(--ink);margin-bottom:4px}
.tonight-meta{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);font-weight:600}
.tonight-pop{display:flex;align-items:center;gap:5px;margin-top:7px}
.pop-bar{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.pop-fill{height:100%;background:linear-gradient(to right,var(--accent),var(--gold));border-radius:2px;transition:width 1.2s ease}
.pop-label{font-size:9.5px;color:var(--accent);font-weight:800}

/* ─── BOTTOM NAV ─────────────────────────────────────────────────────────── */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tabbar-h) + var(--safe-b));
  background:rgba(var(--bg2-rgb, 255,255,255),.92);
  border-top:1px solid var(--line);
  padding:8px 6px calc(8px + var(--safe-b));
  display:flex;z-index:50;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:background var(--tt),border-color var(--tt)
}
[data-theme="dark"] .tabbar{background:rgba(24,20,16,.92)}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;color:var(--ink4);font-size:9px;font-weight:800;letter-spacing:.04em;
  text-transform:uppercase;position:relative;transition:color .25s ease;
  border-radius:var(--r2)
}
.tab.active{color:var(--accent)}
.tab-icon-wrap{
  width:36px;height:28px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;transition:background .25s ease,transform .3s cubic-bezier(.34,1.56,.64,1)
}
.tab.active .tab-icon-wrap{background:rgba(var(--accentRgb),.1);transform:scale(1.08)}

/* ─── PROFILE PAGE ───────────────────────────────────────────────────────── */
.profile-header{padding:calc(var(--safe-t) + 34px) 20px 22px;text-align:center}
.profile-avatar{
  width:90px;height:90px;border-radius:50%;
  background:linear-gradient(145deg,var(--accent),var(--gold));
  margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:34px;color:#fff;
  box-shadow:0 8px 30px rgba(var(--accentRgb),.35)
}
.profile-name{font-family:var(--fd);font-size:24px;letter-spacing:-.02em}
.profile-handle{font-size:13px;color:var(--ink3);margin-top:3px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:0 20px 24px}
.stat-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r2);padding:16px 10px;text-align:center;box-shadow:var(--sh1)}
.stat-num{font-family:var(--fd);font-size:28px;font-weight:400;line-height:1}
.stat-label{font-size:9px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:4px}

/* ─── SKELETON ───────────────────────────────────────────────────────────── */
.skeleton{
  background:linear-gradient(90deg,var(--bg3) 0%,var(--line) 45%,var(--bg3) 100%);
  background-size:200% 100%;animation:shimmer 1.6s ease-in-out infinite;border-radius:var(--r2)
}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel-reel{width:162px;flex-shrink:0;border-radius:var(--r3);aspect-ratio:9/16}
.skel-deal{height:116px;border-radius:var(--r3)}

/* ─── TOAST ──────────────────────────────────────────────────────────────── */
.toast{
  position:fixed;top:calc(var(--safe-t) + 16px);left:16px;right:16px;
  background:var(--ink);color:var(--bg);padding:13px 20px;border-radius:var(--r2);
  font-size:13.5px;font-weight:700;text-align:center;z-index:300;
  transform:translateY(-140%);transition:transform .42s cubic-bezier(.34,1.56,.64,1);
  box-shadow:var(--sh3)
}
.toast.show{transform:translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

/* ─── SHEET ──────────────────────────────────────────────────────────────── */
.sheet-backdrop{
  position:fixed;inset:0;background:rgba(0,0,0,.55);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  z-index:100;opacity:0;pointer-events:none;transition:opacity .36s ease
}
.sheet-backdrop.open{opacity:1;pointer-events:auto}
.sheet{
  position:fixed;left:0;right:0;bottom:0;max-height:93dvh;background:var(--bg);
  border-radius:var(--r3) var(--r3) 0 0;z-index:101;transform:translateY(100%);
  transition:transform .48s cubic-bezier(.32,.72,0,1);
  display:flex;flex-direction:column;will-change:transform
}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;border-radius:2px;background:var(--line);margin:13px auto 5px}
.sheet-header{padding:6px 20px 15px;display:flex;align-items:flex-start;justify-content:space-between;border-bottom:1px solid var(--line)}
.sheet-title{font-family:var(--fd);font-size:21px;font-weight:500;letter-spacing:-.025em}
.sheet-body{flex:1;overflow-y:auto;padding:17px 20px 13px}
.sheet-foot{padding:11px 20px calc(15px + var(--safe-b));border-top:1px solid var(--line)}

/* ─── BOOKING FORM ───────────────────────────────────────────────────────── */
.steps-bar{display:flex;gap:5px;margin-bottom:20px}
.step-seg{flex:1;height:3px;border-radius:2px;background:var(--line);overflow:hidden;position:relative}
.step-seg.done{background:var(--accent)}
.step-seg.active::after{content:'';position:absolute;inset:0;background:var(--ink);animation:stepFill .45s ease forwards}
@keyframes stepFill{from{width:0}to{width:100%}}
.field-block{margin-bottom:20px}
.field-label{font-size:10px;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
.zone-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.zone-card{padding:14px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2);text-align:left;transition:all .2s ease}
.zone-card:active{transform:scale(.95)}
.zone-card.active{border-color:var(--ink);background:var(--ink);color:var(--bg)}
.date-row{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.date-row::-webkit-scrollbar{display:none}
.date-card{flex-shrink:0;min-width:58px;padding:11px 7px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2);text-align:center;transition:all .2s ease}
.date-card.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.date-card .dc-day{font-family:var(--fd);font-size:21px;font-weight:400;line-height:1}
.date-card .dc-dow,.date-card .dc-mon{font-size:9px;font-weight:700;opacity:.55;text-transform:uppercase}
.guests-control{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2)}
.guests-num{font-family:var(--fd);font-size:29px;font-weight:400;line-height:1}
.g-btn{width:40px;height:40px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:20px;transition:all .15s ease}
.g-btn:active{transform:scale(.84)}
.g-btn:disabled{opacity:.25}
.time-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}
.time-card{padding:12px 4px;background:var(--bg2);border:2px solid var(--line);border-radius:var(--r2);font-size:12.5px;font-weight:700;text-align:center;transition:all .2s ease}
.time-card:active:not([disabled]){transform:scale(.9)}
.time-card.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.time-card[disabled]{opacity:.28;text-decoration:line-through;pointer-events:none}
.btn-primary{
  width:100%;padding:15px 22px;background:var(--ink);color:var(--bg);
  border-radius:var(--r2);font-size:14.5px;font-weight:800;
  display:flex;align-items:center;justify-content:center;gap:9px;
  transition:all .2s ease;box-shadow:0 4px 18px rgba(0,0,0,.15)
}
.btn-primary:active:not([disabled]){transform:scale(.97);box-shadow:none}
.btn-primary[disabled]{opacity:.38}

/* ─── BOOKING CARD ───────────────────────────────────────────────────────── */
.booking-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r3);padding:17px;margin-bottom:12px;position:relative;overflow:hidden;box-shadow:var(--sh1)}
.booking-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
.booking-card.status-confirmed::before{background:var(--success)}
.booking-card.status-pending::before{background:var(--gold)}
.booking-card.status-cancelled::before{background:var(--danger)}
.bk-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;padding-left:8px}
.bk-name{font-family:var(--fd);font-size:17px;font-weight:500;flex:1}
.bk-status{font-size:9.5px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;padding:4px 11px;border-radius:100px}
.bk-status.pending{background:rgba(168,114,42,.12);color:var(--gold)}
.bk-status.confirmed{background:rgba(58,104,53,.12);color:var(--success)}
.bk-status.cancelled{background:rgba(139,40,40,.12);color:var(--danger)}
.bk-details{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:12px 8px 0;border-top:1px solid var(--line)}
.bk-detail .bk-lbl{font-size:9px;color:var(--ink3);font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px}
.bk-detail .bk-val{font-size:13px;font-weight:800;color:var(--ink)}

/* ─── EMPTY ──────────────────────────────────────────────────────────────── */
.empty{padding:50px 32px;text-align:center}
.empty h3{font-family:var(--fd);font-size:20px;font-weight:400;font-style:italic;margin-bottom:7px}
.empty p{font-size:13.5px;color:var(--ink3);max-width:240px;margin:0 auto}

/* ─── SPINNER ────────────────────────────────────────────────────────────── */
.spin{width:18px;height:18px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* ─── REVEAL ─────────────────────────────────────────────────────────────── */
.reveal{opacity:0;transform:translateY(18px);transition:opacity .58s ease,transform .58s ease}
.reveal.visible{opacity:1;transform:translateY(0)}

/* ─── LANG POPUP ─────────────────────────────────────────────────────────── */
.lang-popup{
  position:fixed;top:82px;right:16px;background:var(--bg2);
  border:1.5px solid var(--line);border-radius:var(--r2);
  box-shadow:var(--sh3);z-index:200;overflow:hidden;display:none;min-width:142px;
  animation:popIn .22s cubic-bezier(.34,1.56,.64,1)
}
.lang-popup.open{display:block}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(-8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.lang-option{
  display:flex;align-items:center;gap:10px;padding:12px 16px;
  font-size:13.5px;font-weight:700;cursor:pointer;
  transition:background .15s ease;border-bottom:1px solid var(--line2)
}
.lang-option:last-child{border-bottom:none}
.lang-option:active{background:var(--bg3)}
.lang-option.active{color:var(--accent)}
.lang-option-flag{font-size:18px}
</style>
</head>

const isoDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = n => { const d = new Date(); d.setDate(d.getDate()+n); return d; };
const humanDate = iso => { const d = new Date(iso); return `${d.getDate()} ${t('months')[d.getMonth()]}`; };
function isOpen(wh) {
  if (!wh) return null;
  const m = String(wh).match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);
  if (!m) return null;
  const [,oh,om,ch,cm] = m.map(Number);
  const now = new Date(), cur = now.getHours()*60+now.getMinutes(), op = oh*60+om;
  let cl = ch*60+cm; if(cl<=op) cl+=1440;
  return cur>=op && cur<=cl;
}

/* ─── API ─────────────────────────────────────────────────────────────────── */
async function api(path,opts={}){
  const h={'Content-Type':'application/json',...(opts.headers||{})};
  if(S.token) h.Authorization=`Bearer ${S.token}`;
  const r=await fetch(API+path,{...opts,headers:h});
  const d=await r.json().catch(()=>null);
  if(!r.ok) throw new Error(d?.error||`HTTP ${r.status}`);
  return d;
}

async function loadRestaurants(){
  try{
    let url='/restaurants';
    if(S.coords) url+=`?lat=${S.coords.lat}&lng=${S.coords.lng}`;
    const raw=await api(url);
    S.restaurants=Array.isArray(raw)?raw:(raw.restaurants||[]);
    S.restaurants.sort((a,b)=>(b.is_premium?1:0)-(a.is_premium?1:0)||(b.rating||0)-(a.rating||0));

  }catch{
    document.getElementById('rest-list').innerHTML=`<div class="empty"><h3>${t('err_load')}</h3><p>${t('err_load_s')}</p></div>`;

function applyFilters(){
  const chip=S.chip||'all', q=(S.q||'').toLowerCase();
  let list=S.restaurants;
  if(chip!=='all') list=list.filter(r=>{const cs=Array.isArray(r.cuisine)?r.cuisine:(r.cuisine?[r.cuisine]:[]);return cs.some(c=>String(c).toLowerCase().includes(chip));});
  if(q) list=list.filter(r=>(r.name||'').toLowerCase().includes(q));
  S.filtered=list; renderRestaurants(); renderTonightSection();
}

function switchTab(tab){
  S.tab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(`page-${tab}`).classList.add('active');
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===tab));
  if(tab==='bookings') loadBookings();
  if(tab==='favorites') renderFavorites();
  if(tab==='profile') renderProfile();
}
document.querySelectorAll('.tab').forEach(el=>el.addEventListener('click',()=>switchTab(el.dataset.tab)));

/* ─── BOOKING SHEET ───────────────────────────────────────────────────────── */
async function openSheet(rid){
  const restaurant=S.restaurants.find(x=>x.id===rid)||{id:rid,name:'Restoran',capacity:50};
  S.booking={restaurant,step:1,zones:[],menu:[],zone:null,date:isoDate(new Date()),time:null,guests:2,preOrder:{},availability:[]};
  document.getElementById('sheet-title').textContent=restaurant.name;
  document.getElementById('sheet-body').innerHTML='<div style="padding:48px 0;text-align:center"><div class="spin"></div></div>';
  document.getElementById('sheet-foot').innerHTML='';
  document.getElementById('sheet-backdrop').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  try{
    const[zones,menu]=await Promise.all([api(`/restaurants/${rid}/zones`).catch(()=>[]),api(`/restaurants/${rid}/menu`).catch(()=>[])]);
    S.booking.zones=Array.isArray(zones)?zones:[];
    S.booking.menu=Array.isArray(menu)?menu:[];
  }catch{}
  renderStep();
}
window.openSheet=openSheet;

function closeSheet(){
  document.getElementById('sheet-backdrop').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
document.getElementById('sheet-close').addEventListener('click',closeSheet);
document.getElementById('sheet-backdrop').addEventListener('click',closeSheet);

function renderStep(){
  const b=S.booking, body=document.getElementById('sheet-body'), foot=document.getElementById('sheet-foot');

  if(b.step===1){
    const zones=b.zones.length?b.zones:[{id:null,name:t('main_hall'),capacity:b.restaurant.capacity||50}];
    const dates=Array.from({length:14},(_,i)=>{const d=addDays(i);const iso=isoDate(d);const dow=i===0?t('today'):i===1?t('tomorrow'):t('days')[d.getDay()];return{iso,dow:dow.slice(0,3),day:d.getDate(),mon:t('months')[d.getMonth()]};});
    body.innerHTML=`
      <div class="steps-bar"><div class="step-seg active"></div><div class="step-seg"></div><div class="step-seg"></div></div>
      <div class="field-block">
        <div class="field-label">${t('zone_l')}</div>
        <div class="zone-grid">${zones.map(z=>`<button class="zone-card${b.zone?.id===z.id?' active':''}" onclick='selectZone(${JSON.stringify(z)})'><div style="font-weight:800;font-size:13px">${esc(z.name)}</div><div style="font-size:11px;opacity:.6;margin-top:2px">${z.capacity||''} ${t('guests_s')}</div></button>`).join('')}</div>
      </div>
      <div class="field-block">
        <div class="field-label">${t('date_l')}</div>
        <div class="date-row">${dates.map(d=>`<button class="date-card${b.date===d.iso?' active':''}" onclick="S.booking.date='${d.iso}';renderStep()"><div class="dc-dow">${d.dow}</div><div class="dc-day">${d.day}</div><div class="dc-mon">${d.mon}</div></button>`).join('')}</div>
      </div>
      <div class="field-block">
        <div class="field-label">${t('guests_l')}</div>
        <div class="guests-control">
          <div style="display:flex;align-items:baseline;gap:6px"><div class="guests-num">${b.guests}</div><div style="font-size:12px;color:var(--ink3)">${t('guests_s')}</div></div>
          <div style="display:flex;gap:10px">
            <button class="g-btn" onclick="if(S.booking.guests>1){S.booking.guests--;renderStep()}" ${b.guests<=1?'disabled':''}>−</button>
            <button class="g-btn" onclick="if(S.booking.guests<20){S.booking.guests++;renderStep()}" ${b.guests>=20?'disabled':''}>+</button>
          </div>
        </div>
      </div>`;
    foot.innerHTML=`<button class="btn-primary" ${!b.zone?'disabled':''} onclick="S.booking.step=2;loadAvailability()">${t('cont1')}</button>`;
  }

  else if(b.step===2){
    const slots=[]; for(let h=10;h<=23;h++){slots.push(`${String(h).padStart(2,'0')}:00`);if(h<23)slots.push(`${String(h).padStart(2,'0')}:30`);}
    const busy=new Set((b.availability||[]).map(a=>typeof a==='string'?a.slice(0,5):(a.time||'').slice(0,5)));
    body.innerHTML=`
      <div class="steps-bar"><div class="step-seg done"></div><div class="step-seg active"></div><div class="step-seg"></div></div>
      <div class="field-block">
        <div class="field-label">${t('time_l')} · ${humanDate(b.date)}</div>
        <div class="time-grid">${slots.map(s=>`<button class="time-card${b.time===s?' active':''}" ${busy.has(s)?'disabled':''} onclick="S.booking.time='${s}';renderStep()">${s}</button>`).join('')}</div>
      </div>`;
    foot.innerHTML=`<div style="display:flex;gap:9px"><button class="btn-primary" style="background:var(--bg3);color:var(--ink);flex:0 0 48px;box-shadow:none" onclick="S.booking.step=1;renderStep()">←</button><button class="btn-primary" style="flex:1" ${!b.time?'disabled':''} onclick="S.booking.step=3;renderStep()">${t('cont2')}</button></div>`;
  }

  else if(b.step===3){
    body.innerHTML=`
      <div class="steps-bar"><div class="step-seg done"></div><div class="step-seg done"></div><div class="step-seg active"></div></div>
      <div style="text-align:center;padding:20px 0 16px"><div style="font-family:var(--fd);font-size:24px;margin-bottom:8px">${esc(b.restaurant.name)}</div><div style="color:var(--ink3);font-size:13.5px">${humanDate(b.date)} · ${b.time} · ${b.guests} ${t('guests_s')}</div><div style="color:var(--ink4);font-size:12.5px;margin-top:4px">${esc(b.zone?.name||t('main_zone'))}</div></div>
      <div style="background:var(--bg3);border-radius:var(--r2);padding:15px 17px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('date_l')}</div><div style="font-weight:800;font-size:14px">${humanDate(b.date)}</div></div>
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('time_l')}</div><div style="font-weight:800;font-size:14px">${b.time}</div></div>
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('guests_l')}</div><div style="font-weight:800;font-size:14px">${b.guests} ${t('guests_s')}</div></div>
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('zone_l')}</div><div style="font-weight:800;font-size:14px">${esc(b.zone?.name||t('main_zone'))}</div></div>
        </div>
      </div>`;
    foot.innerHTML=`<div style="display:flex;gap:9px"><button class="btn-primary" style="background:var(--bg3);color:var(--ink);flex:0 0 48px;box-shadow:none" onclick="S.booking.step=2;renderStep()">←</button><button class="btn-primary" style="flex:1" id="submit-btn" onclick="submitBooking()">${t('confirm_btn')} · ${b.time}</button></div>`;
  }
}

window.selectZone=function(z){S.booking.zone=typeof z==='string'?JSON.parse(z):z;renderStep();};

async function loadAvailability(){
  try{const av=await api(`/restaurants/${S.booking.restaurant.id}/availability?date=${S.booking.date}`);S.booking.availability=Array.isArray(av)?av:[];}
  catch{S.booking.availability=[];}
  renderStep();
}
async function submitBooking(){
  const b=S.booking, btn=document.getElementById('submit-btn');
  btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  try{
    await api('/reservations',{method:'POST',body:JSON.stringify({restaurant_id:b.restaurant.id,zone_id:b.zone?.id||null,date:b.date,time:b.time,guests:b.guests})});
    toast(t('bk_ok'),'success'); closeSheet(); loadBookings(); switchTab('bookings');
  }catch(e){
    toast(e.message||'Xatolik','error'); btn.disabled=false; btn.innerHTML=`${t('confirm_btn')} · ${b.time}`;
  }
}

/* ─── SEARCH ──────────────────────────────────────────────────────────────── */
let _st;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(_st); _st=setTimeout(()=>{S.q=e.target.value.trim();applyFilters();},250);
});

/* ─── GEO ─────────────────────────────────────────────────────────────────── */
function requestGeo(){
  if(!navigator.geolocation){S.coords={lat:41.2995,lng:69.2401};return;}
  navigator.geolocation.getCurrentPosition(
    p=>{S.coords={lat:p.coords.latitude,lng:p.coords.longitude};loadRestaurants();},
    ()=>{S.coords={lat:41.2995,lng:69.2401};},
    {timeout:5000}
  );
}

/* ─── SCROLL REVEAL ───────────────────────────────────────────────────────── */
function initReveal(){
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:.08});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

/* ─── INIT ────────────────────────────────────────────────────────────────── */
async function init(){
  applyTheme();
  if(tg?.onEvent) tg.onEvent('themeChanged',()=>{if(S.theme==='auto') applyTheme();});

  const savedLang=localStorage.getItem('ot_lang');
  if(savedLang) S.lang=savedLang;
  else if(tg?.initDataUnsafe?.user?.language_code){
    const lc=tg.initDataUnsafe.user.language_code;
    S.lang=lc.startsWith('ru')?'ru':lc.startsWith('en')?'en':'uz';
  }

  applyLang();
  renderChips();
  renderTrending();

  await auth();
  document.getElementById('home-user-name').textContent=S.user?.first_name||(S.lang==='uz'?'mehmon':S.lang==='ru'?'гость':'guest');

  requestGeo();
  await loadRestaurants();

  renderReels();
  renderDeals();
  renderTonightSection();
  initReveal();
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
