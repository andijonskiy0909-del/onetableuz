<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneTable</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1a1a2e; }
    .header { background: #1a1a2e; color: white; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .search { padding: 12px 16px; }
    .search input { width: 100%; padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; }
    .filters { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; }
    .filter-btn { padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 20px; background: white; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
    .restaurants { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card img { width: 100%; height: 160px; object-fit: cover; }
    .card-body { padding: 12px; }
    .card-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .card-meta { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .rating { font-size: 13px; color: #f59e0b; font-weight: 600; }
    .btn-reserve { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; padding: 8px 0; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px; }
    .nav-item span { font-size: 10px; color: #64748b; }
    .nav-item.active span { color: #ef4444; }
    .content { padding-bottom: 70px; }
  </style>
</head>

    <h1>🍽 OneTable</h1>
  </div>

      <input type="text" id="searchInput" placeholder="Restoran qidiring..." oninput="filterRestaurants()">
    </div>

      <button class="filter-btn" onclick="setFilter('Uzbek', this)">O'zbek</button>
