<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneTable</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; color: #1a1a2e; }
    .header { background: #1a1a2e; color: white; padding: 16px; text-align: center; position: sticky; top: 0; z-index: 100; }
    .header h1 { font-size: 20px; font-weight: 700; }
    .search { padding: 12px 16px; }
    .search input { width: 100%; padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; }
    .filters { display: flex; gap: 8px; padding: 0 16px 12px; overflow-x: auto; }
    .filter-btn { padding: 6px 14px; border: 1px solid #e2e8f0; border-radius: 20px; background: white; font-size: 13px; cursor: pointer; white-space: nowrap; }
    .filter-btn.active { background: #ef4444; color: white; border-color: #ef4444; }
    .restaurants { padding: 0 16px; display: flex; flex-direction: column; gap: 12px; }
    .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card img { width: 100%; height: 160px; object-fit: cover; }
    .card-body { padding: 12px; }
    .card-name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .card-meta { font-size: 13px; color: #64748b; margin-bottom: 8px; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; }
    .rating { font-size: 13px; color: #f59e0b; font-weight: 600; }
    .btn-reserve { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; font-weight: 600; }
    .loading { text-align: center; padding: 40px; color: #64748b; }
    .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; border-top: 1px solid #e2e8f0; display: flex; padding: 8px 0; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 4px; }
    .nav-item span { font-size: 10px; color: #64748b; }
    .nav-item.active span { color: #ef4444; }
    .content { padding-bottom: 70px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍽 OneTable</h1>
  </div>

  <div class="content">
    <div class="search">
      <input type="text" id="searchInput" placeholder="Restoran qidiring..." oninput="filterRestaurants()">
    </div>

    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all', this)">Hammasi</button>
      <button class="filter-btn" onclick="setFilter('Uzbek', this)">O'zbek</button>
      <button class="filter-btn" onclick="setFilter('European', this)">Evropa</button>
      <button class="filter-btn" onclick="setFilter('Asian', this)">Osiyo</button>
      <button class="filter-btn" onclick="setFilter('Italian', this)">Italyan</button>
      <button class="filter-btn" onclick="setFilter('$', this)">$</button>
      <button class="filter-btn" onclick="setFilter('$$', this)">$$</button>
      <button class="filter-btn" onclick="setFilter('$$$', this)">$$$</button>
    </div>

    <div class="restaurants" id="restaurantList">
      <div class="loading">Yuklanmoqda...</div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item active">
      <span>🏠</span>
      <span>Bosh sahifa</span>
    </div>
    <div class="nav-item">
      <span>📅</span>
      <span>Bronlarim</span>
    </div>
    <div class="nav-item">
      <span>👤</span>
      <span>Profil</span>
    </div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const API_URL = 'https://onetableuz-production.up.railway.app/api';
    let allRestaurants = [];
    let currentFilter = 'all';

    async function loadRestaurants() {
      try {
        const res = await fetch(`${API_URL}/restaurants`);
        allRestaurants = await res.json();
        renderRestaurants(allRestaurants);
      } catch (err) {
        document.getElementById('restaurantList').innerHTML = '<div class="loading">Xatolik yuz berdi. Qayta urinib ko\'ring.</div>';
      }
    }

    function renderRestaurants(list) {
      const container = document.getElementById('restaurantList');
      if (!list.length) {
        container.innerHTML = '<div class="loading">Restoran topilmadi</div>';
        return;
      }
      container.innerHTML = list.map(r => `
        <div class="card" onclick="openRestaurant('${r.id}')">
          <img src="${r.image_url || 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'}" alt="${r.name}" onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'">
          <div class="card-body">
            <div class="card-name">${r.name}</div>
            <div class="card-meta">${r.cuisine ? r.cuisine.join(', ') : ''} • ${r.price_category || ''} • ${r.address || ''}</div>
            <div class="card-footer">
              <span class="rating">⭐ ${r.rating || '4.5'}</span>
              <button class="btn-reserve" onclick="event.stopPropagation(); reserve('${r.id}', '${r.name}')">Bron qilish</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterRestaurants();
    }

    function filterRestaurants() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      let filtered = allRestaurants;
      if (currentFilter !== 'all') {
        filtered = filtered.filter(r => 
          (r.cuisine && r.cuisine.includes(currentFilter)) || 
          r.price_category === currentFilter
        );
      }
      if (q) {
        filtered = filtered.filter(r => 
          r.name.toLowerCase().includes(q) || 
          (r.description && r.description.toLowerCase().includes(q))
        );
      }
      renderRestaurants(filtered);
    }

    function reserve(id, name) {
      tg.showPopup({
        title: name,
        message: 'Bron qilish uchun quyidagilarni tanlang:',
        buttons: [
          { id: 'book', type: 'default', text: '📅 Bron qilish' },
          { id: 'cancel', type: 'cancel', text: 'Bekor qilish' }
        ]
      }, (btnId) => {
        if (btnId === 'book') {
          tg.sendData(JSON.stringify({ action: 'reserve', restaurant_id: id, restaurant_name: name }));
        }
      });
    }

    function openRestaurant(id) {
      window.location.href = `restaurant.html?id=${id}`;
    }

    loadRestaurants();
  </script>
</body>
</html>
