<!DOCTYPE html>
<html lang="uz" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#FAF7F0">
<title>OneTable — Toshkent restoranlari</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FAF7F0;--bg2:#FFFFFF;--bg3:#F3EDE0;--bg4:#EDE6D5;
  --ink:#1A1714;--ink2:#3D3830;--ink3:#857A6E;--ink4:#C0B5A8;
  --line:#E8DFD0;--line2:#F0E9DC;
  --accent:#7B2D26;--accent2:#9B3D34;--accentRgb:123,45,38;
  --gold:#A8722A;--goldLight:#F5E9D0;
  --success:#3A6835;--danger:#8B2828;
  --r:10px;--r2:16px;--r3:22px;--r4:28px;
  --fd:'Fraunces',Georgia,serif;--fb:'Manrope',system-ui,sans-serif;
  --tabbar-h:72px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
  --sh1:0 2px 12px rgba(0,0,0,.05);
  --sh2:0 8px 32px rgba(0,0,0,.09);
  --sh3:0 20px 60px rgba(0,0,0,.14);
  --tt:.35s ease;
}
[data-theme="dark"] {
  --bg:#0E0C09;--bg2:#181410;--bg3:#221D17;--bg4:#2C2520;
  --ink:#F2EDE3;--ink2:#CFC7BB;--ink3:#8A8078;--ink4:#4A4540;
  --line:#2A231A;--line2:#1E1A14;
  --accent:#D4866E;--accent2:#E09A82;--accentRgb:212,134,110;
  --gold:#D4A045;--goldLight:#2A2010;
  --success:#6FA860;--danger:#D47070;
  --sh1:0 2px 12px rgba(0,0,0,.32);
  --sh2:0 8px 32px rgba(0,0,0,.42);
  --sh3:0 20px 60px rgba(0,0,0,.52);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:var(--fb);font-size:15px;line-height:1.55;color:var(--ink);background:var(--bg);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background var(--tt),color var(--tt)}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:inherit;font-size:inherit;color:inherit;outline:none}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
video{display:block}

#app{display:flex;flex-direction:column;min-height:100dvh;padding-bottom:calc(var(--tabbar-h) + var(--safe-b))}
.page{display:none;min-height:calc(100dvh - var(--tabbar-h) - var(--safe-b))}
.page.active{display:block;animation:pageFade .38s ease}
@keyframes pageFade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.topbar{padding:calc(var(--safe-t) + 20px) 20px 12px;display:flex;align-items:flex-start;justify-content:space-between;gap:14px}
.eyebrow{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink3);font-weight:700;margin-bottom:4px}
.greet-title{font-family:var(--fd);font-size:28px;font-weight:400;line-height:1.1;letter-spacing:-.03em;color:var(--ink)}
.greet-title em{font-style:italic;font-weight:300;color:var(--accent)}
.header-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:4px}
.icon-btn{width:42px;height:42px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .2s ease;box-shadow:var(--sh1)}
.icon-btn:active{transform:scale(.9)}

.theme-toggle{width:52px;height:28px;border-radius:14px;background:var(--bg3);border:1.5px solid var(--line);position:relative;transition:background var(--tt),border-color var(--tt);cursor:pointer;flex-shrink:0}
.theme-pill{position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--ink);transition:transform .35s cubic-bezier(.34,1.56,.64,1),background var(--tt);display:flex;align-items:center;justify-content:center;font-size:11px}
[data-theme="dark"] .theme-pill{transform:translateX(24px)}

.search-wrap{padding:6px 20px 8px}
.search{display:flex;align-items:center;gap:11px;background:var(--bg2);border:1.5px solid var(--line);border-radius:var(--r4);padding:13px 18px;transition:border-color .2s ease,box-shadow .2s ease;box-shadow:var(--sh1)}
.search:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accentRgb),.1)}
.search svg{color:var(--ink3);flex-shrink:0}
.search input{flex:1;border:none;background:none;outline:none;font-size:14.5px}
.search input::placeholder{color:var(--ink4)}

.chip-row{display:flex;gap:8px;padding:10px 20px 8px;overflow-x:auto;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 17px;border-radius:100px;background:var(--bg2);border:1.5px solid var(--line);font-size:12px;font-weight:700;color:var(--ink2);transition:all .2s ease;white-space:nowrap}
.chip.active{background:var(--ink);border-color:var(--ink);color:var(--bg)}
.chip:active{transform:scale(.93)}

.section{padding:18px 20px 6px}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px}
.section-title{font-family:var(--fd);font-size:22px;font-weight:400;color:var(--ink);letter-spacing:-.02em}
.section-title em{font-style:italic;font-weight:300;color:var(--accent)}
.see-all{font-size:11.5px;font-weight:700;color:var(--accent);letter-spacing:.04em;text-transform:uppercase}
.divider{height:1px;background:var(--line2);margin:6px 20px 0}

.live-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;background:rgba(var(--accentRgb),.1);color:var(--accent);font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:livePulse 1.6s ease-in-out infinite}
@keyframes livePulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}

.trending-strip{display:flex;align-items:center;gap:9px;padding:8px 20px 10px;overflow-x:auto;scrollbar-width:none}
.trending-strip::-webkit-scrollbar{display:none}
.trend-pill{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:7px 13px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r3);font-size:12px;font-weight:700;color:var(--ink2);box-shadow:var(--sh1)}
.trend-pill-emoji{font-size:13px}
.trend-pill-count{font-size:10px;color:var(--ink3);font-weight:600}

.card-list{display:flex;flex-direction:column;gap:18px}
.rest-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r3);overflow:hidden;transition:transform .3s ease,box-shadow .3s ease;box-shadow:var(--sh1);will-change:transform}
.rest-card:active{transform:scale(.984);box-shadow:none}
.rest-card .c-image{position:relative;aspect-ratio:16/9;background:var(--bg3);overflow:hidden}
.rest-card .c-image img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.rest-card:hover .c-image img{transform:scale(1.03)}
.badge-open{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:100px;font-size:10.5px;font-weight:700;background:rgba(10,25,10,.6);color:#6ECC6A;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);position:absolute;top:12px;left:12px;z-index:2}
.badge-open .dot{width:5px;height:5px;border-radius:50%;background:#6ECC6A}
.badge-premium{position:absolute;top:12px;right:12px;z-index:2;padding:4px 10px;border-radius:100px;background:rgba(168,114,42,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:#fff;font-size:9.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.c-body{padding:15px 17px 17px}
.c-name{font-family:var(--fd);font-size:19px;font-weight:500;letter-spacing:-.022em;line-height:1.14;color:var(--ink)}
.c-meta{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--ink3);margin-top:3px}
.c-foot{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid var(--line2)}
.c-rating{display:inline-flex;align-items:center;gap:4px;font-size:13px;font-weight:800;color:var(--ink);padding:4px 9px;background:var(--bg3);border-radius:100px}
.book-btn{padding:9px 17px;background:var(--ink);color:var(--bg);border-radius:100px;font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;transition:all .2s ease}
.book-btn:active{transform:scale(.9);opacity:.85}
.cuisine-tag{font-size:10.5px;font-weight:700;padding:3px 9px;background:var(--bg3);border-radius:100px;color:var(--ink3)}

/* ─── REELS PAGE — full-screen vertical scroll feed ─────────────────────── */
.page#page-reels{padding:0;background:#000;min-height:100dvh;display:none}
.page#page-reels.active{display:block}
.reels-feed{
  height:calc(100dvh - var(--tabbar-h) - var(--safe-b));
  overflow-y:scroll;scroll-snap-type:y mandatory;
  scrollbar-width:none;-webkit-overflow-scrolling:touch;
  background:#000
}
.reels-feed::-webkit-scrollbar{display:none}
.reel-slide{
  position:relative;height:calc(100dvh - var(--tabbar-h) - var(--safe-b));
  scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;align-items:center;justify-content:center;
  background:#000;overflow:hidden
}
.reel-media-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.reel-media-wrap video,.reel-media-wrap img{
  width:100%;height:100%;object-fit:cover
}
.reel-overlay{
  position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,.5) 0%,transparent 25%,transparent 55%,rgba(0,0,0,.85) 100%)
}
.reel-top{
  position:absolute;top:calc(var(--safe-t) + 16px);left:0;right:0;
  padding:0 18px;display:flex;align-items:center;justify-content:space-between;
  pointer-events:auto;z-index:3
}
.reel-top-title{
  font-family:var(--fd);font-size:20px;font-weight:500;color:#fff;
  letter-spacing:-.02em;text-shadow:0 2px 8px rgba(0,0,0,.4)
}
.reel-top-sub{font-size:11px;color:rgba(255,255,255,.7);font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-top:2px}

.reel-pause-overlay{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;transition:opacity .25s ease;z-index:4
}
.reel-pause-overlay.show{opacity:1}
.reel-pause-icon{
  width:78px;height:78px;border-radius:50%;
  background:rgba(0,0,0,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1.5px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center
}

.reel-actions{
  position:absolute;right:14px;bottom:120px;
  display:flex;flex-direction:column;gap:18px;align-items:center;
  z-index:5;pointer-events:auto
}
.reel-action{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  cursor:pointer;transition:transform .2s ease
}
.reel-action:active{transform:scale(.88)}
.reel-action-icon{
  width:48px;height:48px;border-radius:50%;
  background:rgba(0,0,0,.35);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.18);
  display:flex;align-items:center;justify-content:center;color:#fff;
  transition:all .2s ease
}
.reel-action.liked .reel-action-icon{
  background:rgba(255,60,60,.85);border-color:transparent;
  animation:likePop .45s cubic-bezier(.34,1.56,.64,1)
}
@keyframes likePop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
.reel-action-count{
  font-size:11.5px;font-weight:700;color:#fff;
  text-shadow:0 1px 4px rgba(0,0,0,.6);letter-spacing:.02em
}

.reel-info{
  position:absolute;left:0;right:80px;bottom:24px;
  padding:0 18px;color:#fff;z-index:4;pointer-events:auto
}
.reel-author{
  display:flex;align-items:center;gap:10px;margin-bottom:11px;cursor:pointer
}
.reel-author-avatar{
  width:38px;height:38px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--gold));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fd);font-size:16px;font-weight:500;color:#fff;
  border:2px solid rgba(255,255,255,.3);flex-shrink:0
}
.reel-author-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.reel-author-meta{flex:1;min-width:0}
.reel-author-name{font-family:var(--fd);font-size:15px;font-weight:500;line-height:1.2}
.reel-author-sub{font-size:11px;color:rgba(255,255,255,.7);font-weight:600}
.reel-caption{font-size:13.5px;line-height:1.4;margin-bottom:14px;font-weight:500;text-shadow:0 1px 6px rgba(0,0,0,.4);max-width:100%}
.reel-caption-more{color:rgba(255,255,255,.65);font-weight:700;cursor:pointer}
.reel-cta{
  display:inline-flex;align-items:center;gap:8px;padding:10px 18px;
  background:rgba(255,255,255,.95);color:var(--ink);border-radius:100px;
  font-size:12px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;
  transition:all .2s ease
}
.reel-cta:active{transform:scale(.94);background:#fff}

.reels-empty{
  height:calc(100dvh - var(--tabbar-h) - var(--safe-b));
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;color:rgba(255,255,255,.7);padding:32px
}
.reels-empty h3{font-family:var(--fd);font-size:24px;font-style:italic;margin-bottom:8px;color:#fff}
.reels-empty p{font-size:13.5px;text-align:center;max-width:240px}

.reels-loading{
  height:calc(100dvh - var(--tabbar-h) - var(--safe-b));
  display:flex;align-items:center;justify-content:center;color:#fff
}

/* Comment sheet */
.cs-back{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s ease;backdrop-filter:blur(8px)}
.cs-back.open{opacity:1;pointer-events:auto}
.cs{position:fixed;left:0;right:0;bottom:0;height:65dvh;background:var(--bg);border-radius:var(--r3) var(--r3) 0 0;z-index:201;transform:translateY(100%);transition:transform .42s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column}
.cs.open{transform:translateY(0)}
.cs-handle{width:40px;height:4px;border-radius:2px;background:var(--line);margin:13px auto 5px}
.cs-head{padding:8px 20px 14px;border-bottom:1px solid var(--line);text-align:center}
.cs-head .cs-title{font-family:var(--fd);font-size:18px;font-weight:500}
.cs-head .cs-count{font-size:11px;color:var(--ink3);font-weight:600;margin-top:2px}
.cs-body{flex:1;overflow-y:auto;padding:14px 20px;-webkit-overflow-scrolling:touch}
.cs-empty{text-align:center;padding:44px 20px;color:var(--ink3)}
.cs-empty .ce-icon{font-size:36px;margin-bottom:10px}
.cs-empty p{font-size:13px}
.comment{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--line2)}
.comment:last-child{border:none}
.comment-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--gold));color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:500;flex-shrink:0;font-size:14px}
.comment-body{flex:1;min-width:0}
.comment-name{font-size:12.5px;font-weight:800;color:var(--ink)}
.comment-text{font-size:13.5px;color:var(--ink2);margin-top:2px;line-height:1.4;word-wrap:break-word}
.comment-time{font-size:10.5px;color:var(--ink4);font-weight:600;margin-top:3px}
.cs-foot{padding:11px 18px calc(13px + var(--safe-b));border-top:1px solid var(--line);background:var(--bg2);display:flex;gap:8px;align-items:center}
.cs-input{flex:1;padding:10px 16px;background:var(--bg3);border:1.5px solid transparent;border-radius:100px;font-size:14px;color:var(--ink);transition:border-color .2s ease}
.cs-input:focus{border-color:var(--accent)}
.cs-send{width:42px;height:42px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .2s ease}
.cs-send:active{transform:scale(.9)}
.cs-send:disabled{opacity:.4}

/* Reels home preview row (carousel on home page) */
.reels-scroll{display:flex;gap:12px;padding:4px 20px 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.reels-scroll::-webkit-scrollbar{display:none}
.reel-prev{flex-shrink:0;width:148px;border-radius:var(--r3);overflow:hidden;position:relative;background:var(--bg3);box-shadow:var(--sh2);cursor:pointer;transition:transform .3s ease;will-change:transform}
.reel-prev:active{transform:scale(.95)}
.reel-prev-thumb{width:100%;aspect-ratio:9/16;object-fit:cover;display:block}
.reel-prev-grad{position:absolute;inset:0;background:linear-gradient(to bottom,transparent 28%,rgba(0,0,0,.14) 52%,rgba(0,0,0,.85) 100%)}
.reel-prev-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-58%);width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.22);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1.5px solid rgba(255,255,255,.45);display:flex;align-items:center;justify-content:center}
.reel-prev-play svg{margin-left:3px}
.reel-prev-meta{position:absolute;bottom:0;left:0;right:0;padding:11px;color:#fff}
.reel-prev-name{font-family:var(--fd);font-size:13.5px;font-weight:500;line-height:1.2;margin-bottom:3px;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.reel-prev-stats{display:flex;gap:8px;font-size:10px;color:rgba(255,255,255,.85);font-weight:700}

/* Deals/tonight */
.deals-scroll{display:flex;flex-direction:column;gap:13px;padding:4px 20px 16px}
.deal-card{border-radius:var(--r3);overflow:hidden;background:var(--bg2);border:1px solid var(--line);box-shadow:var(--sh1);display:flex;min-height:110px;position:relative;transition:transform .28s ease,box-shadow .28s ease;cursor:pointer}
.deal-card:active{transform:scale(.983);box-shadow:none}
.deal-thumb{width:108px;flex-shrink:0;position:relative;overflow:hidden;background:var(--bg3)}
.deal-thumb img{width:100%;height:100%;object-fit:cover}
.deal-disc{position:absolute;top:9px;left:9px;padding:5px 10px;border-radius:var(--r);background:var(--accent);color:#fff;font-size:13px;font-weight:800;letter-spacing:-.01em;box-shadow:0 3px 12px rgba(var(--accentRgb),.45)}
.deal-body{flex:1;padding:13px 14px 13px 12px;display:flex;flex-direction:column;justify-content:space-between}
.deal-title{font-family:var(--fd);font-size:15.5px;font-weight:500;color:var(--ink);line-height:1.2;margin-bottom:4px}
.deal-desc{font-size:11px;color:var(--ink3);line-height:1.4}
.deal-footer{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.deal-expire{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.05em}
.deal-cta{padding:6px 13px;background:var(--ink);color:var(--bg);border-radius:100px;font-size:10.5px;font-weight:800;letter-spacing:.04em;text-transform:uppercase}

.tonight-scroll{display:flex;gap:11px;padding:4px 20px 16px;overflow-x:auto;scrollbar-width:none}
.tonight-scroll::-webkit-scrollbar{display:none}
.tonight-card{flex-shrink:0;width:196px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r3);overflow:hidden;box-shadow:var(--sh1);cursor:pointer;transition:transform .28s ease}
.tonight-card:active{transform:scale(.95)}
.tonight-thumb{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}
.tonight-body{padding:11px 13px 14px}
.tonight-name{font-family:var(--fd);font-size:14.5px;font-weight:500;color:var(--ink);margin-bottom:4px}
.tonight-meta{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink3);font-weight:600}
.tonight-pop{display:flex;align-items:center;gap:5px;margin-top:7px}
.pop-bar{flex:1;height:3px;background:var(--line);border-radius:2px;overflow:hidden}
.pop-fill{height:100%;background:linear-gradient(to right,var(--accent),var(--gold));border-radius:2px;transition:width 1.2s ease}
.pop-label{font-size:9.5px;color:var(--accent);font-weight:800}

/* TAB BAR — 5 tabs with Reels in CENTER (special floating button style) */
.tabbar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--tabbar-h) + var(--safe-b));

// ─── HELPERS ────────────────────────────────────────────────
const t = k => (T[S.lang]||T.uz)[k] ?? k;
const esc = s => String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const isoDate = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const addDays = n => { const d = new Date(); d.setDate(d.getDate()+n); return d; };
const humanDate = iso => { const d = new Date(iso); return `${d.getDate()} ${t('months')[d.getMonth()]}`; };
function isOpen(wh){
  if(!wh) return null;
  const m = String(wh).match(/(\d{1,2}):(\d{2})\s*[-–—]\s*(\d{1,2}):(\d{2})/);
  if(!m) return null;
  const [,oh,om,ch,cm] = m.map(Number);
  const now = new Date(), cur = now.getHours()*60+now.getMinutes(), op = oh*60+om;
  let cl = ch*60+cm; if(cl<=op) cl+=1440;
  return cur>=op && cur<=cl;
}
function timeAgo(iso){
  const d = new Date(iso); const diff = Math.floor((Date.now() - d.getTime())/1000);
  if(diff<60) return t('just_now');
  if(diff<3600) return `${Math.floor(diff/60)} ${t('min_ago')}`;
  if(diff<86400) return `${Math.floor(diff/3600)} ${t('hour_ago')}`;
  return `${Math.floor(diff/86400)} ${t('day_ago')}`;
}
function fmtCount(n){
  if(n<1000) return String(n);
  if(n<1000000) return (n/1000).toFixed(n>=10000?0:1).replace('.0','')+'K';
  return (n/1000000).toFixed(1).replace('.0','')+'M';
}

let _tt;
function toast(msg,type=''){
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show'+(type?' '+type:'');
  clearTimeout(_tt); _tt = setTimeout(()=>el.classList.remove('show'),2800);
}

async function api(path,opts={}){
  const h = {'Content-Type':'application/json',...(opts.headers||{})};
  if(S.token) h.Authorization = `Bearer ${S.token}`;
  const r = await fetch(API+path,{...opts,headers:h});
  const d = await r.json().catch(()=>null);
  if(!r.ok) throw new Error(d?.error||`HTTP ${r.status}`);
  return d;
}

function applyTheme(force){
  let scheme = force||S.theme;
  if(scheme==='auto') scheme = tg?.colorScheme||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
  document.documentElement.setAttribute('data-theme',scheme);
  const pill = document.getElementById('theme-pill');
  if(pill) pill.textContent = scheme==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur==='dark'?'light':'dark';
  S.theme = next; localStorage.setItem('ot_theme',next); applyTheme(next);
}
document.getElementById('theme-toggle').addEventListener('click',toggleTheme);

async function loadRestaurants(){
  try{
    let url = '/restaurants';
    if(S.coords) url += `?lat=${S.coords.lat}&lng=${S.coords.lng}`;
    const raw = await api(url);
    S.restaurants = Array.isArray(raw)?raw:(raw.restaurants||[]);
    S.restaurants.sort((a,b)=>(b.is_premium?1:0)-(a.is_premium?1:0)||(b.rating||0)-(a.rating||0));
    applyFilters();
  }catch{
    document.getElementById('rest-list').innerHTML = `<div class="empty"><h3>${t('err_load')}</h3><p>${t('err_load_s')}</p></div>`;
  }
}

function applyFilters(){
  const chip = S.chip||'all', q = (S.q||'').toLowerCase();
  let list = S.restaurants;
  if(chip!=='all') list = list.filter(r=>{
    const cs = Array.isArray(r.cuisine)?r.cuisine:(r.cuisine?[r.cuisine]:[]);
    return cs.some(c=>String(c).toLowerCase().includes(chip));
  });
  if(q) list = list.filter(r=>(r.name||'').toLowerCase().includes(q));
  S.filtered = list; renderRestaurants(); renderTonightSection();
}

function renderRestaurants(){
  const el = document.getElementById('rest-list');
  const cnt = document.getElementById('rest-count');
  if(cnt) cnt.textContent = `${S.filtered.length} ta`;

    el.innerHTML = `<div class="empty"><h3>${t('not_found')}</h3><p>${t('not_found_sub')}</p></div>`;
    return;
  }
  el.className = 'card-list';
  el.innerHTML = S.filtered.map(r=>{
    const img = r.image_url||'https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800';

    const o = isOpen(r.working_hours);
    const cs = Array.isArray(r.cuisine)?r.cuisine.slice(0,2):[];
    return `<div class="rest-card" onclick="openSheet(${r.id})">
      <div class="c-image">
        <img src="${esc(img)}" alt="${esc(r.name)}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800'">

async function loadReels(){
  try{
    const raw = await api('/reels');

    // Filter only published reels
    list = list.filter(r=>r.is_published!==false && r.url);

  }catch{

  renderReelsHomeStrip();
}

function attachReelHandlers(){
  const slides = document.querySelectorAll('.reel-slide');
  slides.forEach(slide=>{
    const id = Number(slide.dataset.id);
    const video = slide.querySelector('video');
    const pauseOverlay = slide.querySelector('.reel-pause-overlay');
    const mediaWrap = slide.querySelector('.reel-media-wrap');

    let lastTap = 0;
    if(mediaWrap){
      mediaWrap.addEventListener('click',(e)=>{
        const now = Date.now();
        if(now - lastTap < 300){
          // Double-tap → like
          toggleLike(id, slide);
          showHeartPop(slide);
          lastTap = 0;
        } else {
          lastTap = now;
          // Single-tap → pause/play (after delay)
          setTimeout(()=>{
            if(Date.now() - lastTap >= 290 && video){
              if(video.paused){
                video.play().catch(()=>{});
                pauseOverlay.classList.remove('show');
              } else {
                video.pause();
                pauseOverlay.classList.add('show');
              }
            }
          },300);
        }
      });
    }

    // Action buttons
    slide.querySelectorAll('.reel-action').forEach(act=>{
      act.addEventListener('click',(e)=>{
        e.stopPropagation();
        const action = act.dataset.act;
        if(action==='like'){
          toggleLike(id,slide);
          if(!S.reelLikes[id]) showHeartPop(slide);
        } else if(action==='comment'){
          openComments(id);
        } else if(action==='save'){
          toggleSave(id,slide);
        } else if(action==='share'){
          shareReel(id);
        }
      });
    });
  });
}

function showHeartPop(slide){
  const old = slide.querySelector('.heart-pop');
  if(old) old.remove();
  const h = document.createElement('div');
  h.className = 'heart-pop';
  h.innerHTML = '♥';
  slide.appendChild(h);
  setTimeout(()=>h.remove(),800);
}

function toggleLike(id, slide){
  const wasLiked = !!S.reelLikes[id];
  if(wasLiked){
    delete S.reelLikes[id];
  } else {
    S.reelLikes[id] = true;
    if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  }
  localStorage.setItem('ot_reel_likes',JSON.stringify(S.reelLikes));
  // Update UI
  const action = slide.querySelector('.reel-action[data-act="like"]');
  const icon = action.querySelector('svg');
  const count = action.querySelector('.reel-action-count');
  const reel = S.reels.find(r=>r.id===id);
  const baseLikes = Number(reel?.likes)||0;
  if(!wasLiked){
    action.classList.add('liked');
    icon.setAttribute('fill','currentColor');
    count.textContent = fmtCount(baseLikes+1);
    // Send to backend (optional)
    api(`/reels/${id}/like`,{method:'POST'}).catch(()=>{});
  } else {
    action.classList.remove('liked');
    icon.setAttribute('fill','none');
    count.textContent = fmtCount(baseLikes);
  }
}

function toggleSave(id, slide){
  const idx = S.reelSaves.indexOf(id);
  if(idx>=0) S.reelSaves.splice(idx,1);
  else S.reelSaves.push(id);
  localStorage.setItem('ot_reel_saves',JSON.stringify(S.reelSaves));
  const action = slide.querySelector('.reel-action[data-act="save"]');
  const icon = action.querySelector('svg');
  const count = action.querySelector('.reel-action-count');
  const saved = S.reelSaves.includes(id);
  action.classList.toggle('liked',saved);
  icon.setAttribute('fill',saved?'currentColor':'none');
  count.textContent = saved?'Saved':'Save';
  if(tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  toast(saved?'Saqlandi':'Olib tashlandi','success');
}

function shareReel(id){
  const reel = S.reels.find(r=>r.id===id);
  if(!reel) return;
  const url = `https://t.me/onetable_uz_bot?start=reel_${id}`;
  if(tg?.openTelegramLink){
    tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=${encodeURIComponent(reel.caption||'OneTable')}`);
  } else if(navigator.share){
    navigator.share({title:'OneTable',text:reel.caption||'',url}).catch(()=>{});
  } else {
    navigator.clipboard?.writeText(url).then(()=>toast(t('share_link'),'success'));
  }
}

let reelObserver = null;
function setupReelObserver(){
  if(reelObserver) reelObserver.disconnect();
  reelObserver = new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      const video = entry.target.querySelector('video');
      const pauseOverlay = entry.target.querySelector('.reel-pause-overlay');
      if(entry.isIntersecting && entry.intersectionRatio > 0.7){
        if(video){
          video.play().catch(()=>{});
          if(pauseOverlay) pauseOverlay.classList.remove('show');
        }
        // Increment view (optional backend)
        const id = Number(entry.target.dataset.id);
        api(`/reels/${id}/view`,{method:'POST'}).catch(()=>{});
      } else {
        if(video){
          video.pause();
          video.currentTime = 0;
        }
      }
    });
  },{threshold:[0,0.7,1]});
  document.querySelectorAll('.reel-slide').forEach(s=>reelObserver.observe(s));
}

    body.innerHTML = `
      <div class="steps-bar"><div class="step-seg done"></div><div class="step-seg done"></div><div class="step-seg active"></div></div>
      <div style="text-align:center;padding:20px 0 16px"><div style="font-family:var(--fd);font-size:24px;margin-bottom:8px">${esc(b.restaurant.name)}</div><div style="color:var(--ink3);font-size:13.5px">${humanDate(b.date)} · ${b.time} · ${b.guests} ${t('guests_s')}</div><div style="color:var(--ink4);font-size:12.5px;margin-top:4px">${esc(b.zone?.name||t('main_zone'))}</div></div>
      <div style="background:var(--bg3);border-radius:var(--r2);padding:15px 17px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:13px">
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('date_l')}</div><div style="font-weight:800;font-size:14px">${humanDate(b.date)}</div></div>
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('time_l')}</div><div style="font-weight:800;font-size:14px">${b.time}</div></div>
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('guests_l')}</div><div style="font-weight:800;font-size:14px">${b.guests} ${t('guests_s')}</div></div>
          <div><div style="font-size:9.5px;color:var(--ink3);font-weight:700;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px">${t('zone_l')}</div><div style="font-weight:800;font-size:14px">${esc(b.zone?.name||t('main_zone'))}</div></div>
        </div>
      </div>`;
    foot.innerHTML = `<div style="display:flex;gap:9px"><button class="btn-primary" style="background:var(--bg3);color:var(--ink);flex:0 0 48px;box-shadow:none" onclick="S.booking.step=2;renderStep()">←</button><button class="btn-primary" style="flex:1" id="submit-btn" onclick="submitBooking()">${t('confirm_btn')} · ${b.time}</button></div>`;
  }
}

window.selectZone = function(z){S.booking.zone = typeof z==='string'?JSON.parse(z):z;renderStep();};

async function loadAvailability(){
  try{
    const av = await api(`/restaurants/${S.booking.restaurant.id}/availability?date=${S.booking.date}`);
    S.booking.availability = Array.isArray(av)?av:[];
  }catch{S.booking.availability = [];}
  renderStep();
}
async function submitBooking(){
  const b = S.booking, btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span>';
  try{
    await api('/reservations',{method:'POST',body:JSON.stringify({restaurant_id:b.restaurant.id,zone_id:b.zone?.id||null,date:b.date,time:b.time,guests:b.guests})});
    toast(t('bk_ok'),'success'); closeSheet(); loadBookings(); switchTab('bookings');
  }catch(e){
    toast(e.message||'Xatolik','error'); btn.disabled = false; btn.innerHTML = `${t('confirm_btn')} · ${b.time}`;
  }
}
window.submitBooking = submitBooking;

// ─── SEARCH ─────────────────────────────────────────────────
let _st;
document.getElementById('search-input').addEventListener('input',e=>{
  clearTimeout(_st); _st = setTimeout(()=>{S.q = e.target.value.trim();applyFilters();},250);
});

// ─── GEO ────────────────────────────────────────────────────
function requestGeo(){
  if(!navigator.geolocation){S.coords = {lat:41.2995,lng:69.2401};return;}
  navigator.geolocation.getCurrentPosition(
    p=>{S.coords = {lat:p.coords.latitude,lng:p.coords.longitude};loadRestaurants();},
    ()=>{S.coords = {lat:41.2995,lng:69.2401};},
    {timeout:5000}
  );
}

function initReveal(){
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:.08});
  document.querySelectorAll('.reveal').forEach(el=>obs.observe(el));
}

// ─── DEEP LINK to reels ──────────────────────────────────────
function handleDeepLink(){
  const tgParam = tg?.initDataUnsafe?.start_param || '';
  if(tgParam.startsWith('reel_')){
    const reelId = Number(tgParam.replace('reel_',''));
    const idx = S.reels.findIndex(r=>r.id===reelId);
    if(idx>=0) openReelsAt(idx);
  } else if(tgParam.startsWith('restaurant_')){
    const rid = Number(tgParam.replace('restaurant_',''));
    setTimeout(()=>openSheet(rid),300);
  }
}

// ─── INIT ──────────────────────────────────────────────────
async function init(){
  applyTheme();
  if(tg?.onEvent) tg.onEvent('themeChanged',()=>{if(S.theme==='auto') applyTheme();});

  const savedLang = localStorage.getItem('ot_lang');
  if(savedLang) S.lang = savedLang;
  else if(tg?.initDataUnsafe?.user?.language_code){
    const lc = tg.initDataUnsafe.user.language_code;
    S.lang = lc.startsWith('ru')?'ru':lc.startsWith('en')?'en':'uz';
  }

  applyLang();
  renderChips();
  renderTrending();

  await auth();
  document.getElementById('home-user-name').textContent = S.user?.first_name||(S.lang==='uz'?'mehmon':S.lang==='ru'?'гость':'guest');

  requestGeo();
  await loadRestaurants();
  await loadReels();

  renderTonightSection();
  renderReelsHomeStrip();
  initReveal();
  handleDeepLink();
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
</body>
</html>
