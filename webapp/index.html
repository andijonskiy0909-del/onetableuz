<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OneTable</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#f8fafc; color:#1a1a2e; }
.header { background:#1a1a2e; color:white; padding:16px; text-align:center; position:sticky; top:0; z-index:100; }
.header h1 { font-size:20px; font-weight:700; }
.lang-switcher { display:flex; gap:6px; justify-content:center; margin-top:8px; }
.lang-btn { padding:3px 10px; border-radius:20px; border:1px solid rgba(255,255,255,0.3); background:transparent; color:white; font-size:12px; cursor:pointer; }
.lang-btn.active { background:#ef4444; border-color:#ef4444; font-weight:600; }
.search { padding:12px 16px; }
.search input { width:100%; padding:10px 16px; border:1px solid #e2e8f0; border-radius:12px; font-size:14px; outline:none; }
.filters { display:flex; gap:8px; padding:0 16px 12px; overflow-x:auto; }
.filter-btn { padding:6px 14px; border:1px solid #e2e8f0; border-radius:20px; background:white; font-size:13px; cursor:pointer; white-space:nowrap; }
.filter-btn.active { background:#ef4444; color:white; border-color:#ef4444; }
.restaurants { padding:0 16px; display:flex; flex-direction:column; gap:12px; }
.card { background:white; border-radius:16px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,0.06); cursor:pointer; }
.card img { width:100%; height:160px; object-fit:cover; }
.card-body { padding:12px; }
.card-name { font-size:16px; font-weight:600; margin-bottom:4px; }
.card-meta { font-size:13px; color:#64748b; margin-bottom:8px; }
.card-footer { display:flex; justify-content:space-between; align-items:center; gap:8px; }
.rating { font-size:13px; color:#f59e0b; font-weight:600; }
.card-btns { display:flex; gap:6px; }
.btn-view { background:#f1f5f9; color:#1a1a2e; border:none; padding:8px 14px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; }
.btn-reserve { background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:8px; font-size:13px; cursor:pointer; font-weight:600; }
.loading { text-align:center; padding:40px; color:#64748b; }
.bottom-nav { position:fixed; bottom:0; left:0; right:0; background:white; border-top:1px solid #e2e8f0; display:flex; padding:8px 0; }
.nav-item { flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; cursor:pointer; padding:4px; }
.nav-item span { font-size:10px; color:#64748b; }
.nav-item.active span { color:#ef4444; }
.content { padding-bottom:70px; }
/* Modal */
.modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.5); z-index:200; justify-content:center; align-items:flex-end; }
.modal.open { display:flex; }
.modal-content { background:white; border-radius:20px 20px 0 0; padding:24px; width:100%; max-height:92vh; overflow-y:auto; }
.modal-title { font-size:18px; font-weight:700; margin-bottom:16px; }
.form-group { margin-bottom:14px; }
.form-group label { font-size:13px; color:#64748b; margin-bottom:6px; display:block; font-weight:500; }
.form-group input, .form-group select { width:100%; padding:10px; border:1px solid #e2e8f0; border-radius:8px; font-size:14px; outline:none; }
/* Steps */
.steps { display:flex; gap:0; margin-bottom:20px; }
.step { flex:1; text-align:center; font-size:11px; color:#94a3b8; padding:8px 4px; border-bottom:2px solid #e2e8f0; }
.step.active { color:#ef4444; border-color:#ef4444; font-weight:600; }
.step.done { color:#10b981; border-color:#10b981; }
.step-panel { display:none; }
.step-panel.active { display:block; }
/* Zona tanlash */
.zones-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin-top:6px; }
.zone-card { border:2px solid #e2e8f0; border-radius:12px; padding:14px; cursor:pointer; text-align:center; transition:all .15s; background:white; }
.zone-card:hover { border-color:#ef4444; }
.zone-card.selected { border-color:#ef4444; background:#fff5f5; }
.zone-card .zone-icon { font-size:28px; margin-bottom:6px; }
.zone-card .zone-name { font-size:14px; font-weight:600; }
.zone-card .zone-desc { font-size:12px; color:#64748b; margin-top:2px; }
.zone-card .zone-cap { font-size:11px; color:#94a3b8; margin-top:4px; }
/* Vaqt slotlari */
.time-slots { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-top:6px; }
.slot { padding:8px 4px; border:1px solid #e2e8f0; border-radius:8px; font-size:13px; text-align:center; cursor:pointer; background:white; transition:all .15s; }
.slot:hover:not(.slot-busy) { border-color:#ef4444; color:#ef4444; }
.slot.selected { background:#ef4444; color:white; border-color:#ef4444; font-weight:600; }
.slot.slot-busy { background:#f1f5f9; color:#cbd5e1; cursor:not-allowed; text-decoration:line-through; }
.slot-loading { grid-column:1/-1; text-align:center; color:#94a3b8; font-size:13px; padding:12px; }
/* Oldindan zakaz */
.menu-section { margin-bottom:16px; }
.menu-section-title { font-size:13px; font-weight:600; color:#64748b; margin-bottom:8px; text-transform:uppercase; letter-spacing:.5px; }
.menu-item-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #f1f5f9; }
.menu-item-row:last-child { border-bottom:none; }
.menu-item-info .name { font-size:14px; font-weight:500; }
.menu-item-info .price { font-size:13px; color:#ef4444; font-weight:600; margin-top:2px; }
.qty-control { display:flex; align-items:center; gap:8px; }
.qty-btn { width:28px; height:28px; border-radius:50%; border:1.5px solid #e2e8f0; background:white; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; font-weight:600; }
.qty-btn:hover { border-color:#ef4444; color:#ef4444; }
.qty-num { font-size:15px; font-weight:600; min-width:20px; text-align:center; }
.order-total { background:#f8fafc; border-radius:10px; padding:12px 16px; margin-top:12px; display:flex; justify-content:space-between; align-items:center; }
.order-total .label { font-size:14px; color:#64748b; }
.order-total .amount { font-size:18px; font-weight:700; color:#ef4444; }
/* Buttons */
.btn-submit { width:100%; background:#ef4444; color:white; border:none; padding:14px; border-radius:12px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; }
.btn-submit:disabled { background:#cbd5e1; cursor:not-allowed; }
.btn-back { width:100%; background:#f1f5f9; color:#64748b; border:none; padding:12px; border-radius:12px; font-size:14px; cursor:pointer; margin-top:8px; }
/* Bronlarim */
.page { display:none; padding:16px; padding-bottom:70px; }
.page.active { display:block; }
.reservation-card { background:white; border-radius:12px; padding:16px; margin-bottom:12px; box-shadow:0 2px 8px rgba(0,0,0,0.06); }
.res-name { font-weight:600; font-size:16px; }
.res-info { font-size:13px; color:#64748b; margin-top:4px; }
.res-status { display:inline-block; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; margin-top:8px; }
.status-pending { background:#fef3c7; color:#d97706; }
.status-confirmed { background:#d1fae5; color:#059669; }
.status-cancelled { background:#fee2e2; color:#dc2626; }
.res-footer { display:flex; justify-content:space-between; align-items:center; margin-top:10px; }
.btn-cancel-res { background:none; border:1px solid #fca5a5; color:#ef4444; padding:6px 12px; border-radius:8px; font-size:12px; cursor:pointer; }
.pre-order-badge { display:inline-block; background:#eff6ff; color:#3b82f6; font-size:11px; padding:2px 8px; border-radius:6px; margin-top:4px; font-weight:500; }
.zone-badge { display:inline-block; background:#f0fdf4; color:#16a34a; font-size:11px; padding:2px 8px; border-radius:6px; margin-left:4px; font-weight:500; }
/* Spinner */
.spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin .6s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
/* Toast */
.toast { position:fixed; top:70px; left:50%; transform:translateX(-50%); background:#1a1a2e; color:white; padding:10px 20px; border-radius:10px; font-size:14px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; white-space:nowrap; }
.toast.show { opacity:1; }
</style>
</head>
<body>

<div class="header">
  <h1>🍽 OneTable</h1>
  <div class="lang-switcher">
    <button class="lang-btn active" onclick="setLang('uz')">🇺🇿 UZ</button>
    <button class="lang-btn" onclick="setLang('ru')">🇷🇺 RU</button>
    <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<!-- Bosh sahifa -->
<div id="homePage" class="page active">
  <div class="content">
    <div class="search"><input type="text" id="searchInput" oninput="filterRestaurants()"></div>
    <div class="filters">
      <button class="filter-btn active" onclick="setFilter('all',this)" data-i18n="all">Hammasi</button>
      <button class="filter-btn" onclick="setFilter('Uzbek',this)">O'zbek</button>
      <button class="filter-btn" onclick="setFilter('European',this)" data-i18n="european">Evropa</button>
      <button class="filter-btn" onclick="setFilter('Asian',this)" data-i18n="asian">Osiyo</button>
      <button class="filter-btn" onclick="setFilter('Italian',this)">Italyan</button>
      <button class="filter-btn" onclick="setFilter('$',this)">$</button>
      <button class="filter-btn" onclick="setFilter('$$',this)">$$</button>
      <button class="filter-btn" onclick="setFilter('$$$',this)">$$$</button>
    </div>
    <div class="restaurants" id="restaurantList"><div class="loading">Yuklanmoqda...</div></div>
  </div>
</div>

<!-- Bronlarim -->
<div id="bookingsPage" class="page">
  <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">📅 Bronlarim</h2>
  <div id="bookingsList"><div class="loading">Yuklanmoqda...</div></div>
</div>

<!-- Profil -->
<div id="profilePage" class="page">
  <h2 style="font-size:18px;font-weight:700;margin-bottom:16px;">👤 Profil</h2>
  <div id="profileInfo" style="background:white;border-radius:12px;padding:16px;"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-home" onclick="showPage('home')">
    <span>🏠</span><span id="nav-home-txt">Bosh sahifa</span>
  </div>
  <div class="nav-item" id="nav-bookings" onclick="showPage('bookings')">
    <span>📅</span><span id="nav-bookings-txt">Bronlarim</span>
  </div>
  <div class="nav-item" id="nav-profile" onclick="showPage('profile')">
    <span>👤</span><span id="nav-profile-txt">Profil</span>
  </div>
</div>

<!-- Bron Modal — 3 qadam -->
<div class="modal" id="reserveModal">
  <div class="modal-content">
    <div class="modal-title" id="modalTitle">Bron qilish</div>

    <!-- Steps indicator -->
    <div class="steps">
      <div class="step active" id="step-ind-1">1. Zona</div>
      <div class="step" id="step-ind-2">2. Vaqt</div>
      <div class="step" id="step-ind-3">3. Zakaz</div>
    </div>

    <!-- Step 1: Zona tanlash -->
    <div class="step-panel active" id="step-1">
      <div class="form-group">
        <label>📅 Sana</label>
        <input type="date" id="resDate">
      </div>
      <div class="form-group">
        <label>👥 Mehmonlar soni</label>
        <select id="resGuests"></select>
      </div>
      <div class="form-group">
        <label>🏠 Zona tanlang</label>
        <div class="zones-grid" id="zonesGrid">
          <div class="slot-loading" style="grid-column:1/-1">Yuklanmoqda...</div>
        </div>
      </div>
      <button class="btn-submit" id="btnStep1" onclick="goStep2()" disabled>Davom etish →</button>
      <button class="btn-back" onclick="closeModal()">Bekor qilish</button>
    </div>

    <!-- Step 2: Vaqt tanlash -->
    <div class="step-panel" id="step-2">
      <div class="form-group">
        <label>⏰ Vaqt tanlang</label>
        <div class="time-slots" id="timeSlots">
          <div class="slot-loading">Yuklanmoqda...</div>
        </div>
      </div>
      <div class="form-group">
        <label>💬 Izoh (ixtiyoriy)</label>
        <input type="text" id="resComment" placeholder="Tug'ilgan kun, maxsus xohish...">
      </div>
      <button class="btn-submit" id="btnStep2" onclick="goStep3()" disabled>Davom etish →</button>
      <button class="btn-back" onclick="goStep(1)">← Orqaga</button>
    </div>

    <!-- Step 3: Oldindan zakaz -->
    <div class="step-panel" id="step-3">
      <div style="font-size:13px;color:#64748b;margin-bottom:12px;">
        Ixtiyoriy: restoranга kelmasdan oldin taom buyurtma qiling
      </div>
      <div id="menuList"><div class="loading">Menyu yuklanmoqda...</div></div>
      <div class="order-total" id="orderTotal" style="display:none">
        <span class="label">Jami zakaz:</span>
        <span class="amount" id="totalAmount">0 so'm</span>
      </div>
      <button class="btn-submit" id="btnSubmit" onclick="submitReservation()">✅ Bron qilish</button>
      <button class="btn-back" onclick="goStep(2)">← Orqaga</button>
    </div>

  </div>
</div>

<script>
const tg = window.Telegram?.WebApp || {ready(){},expand(){},showAlert:alert,initDataUnsafe:{}};
tg.ready(); tg.expand();

const API_URL = 'https://onetableuz-production.up.railway.app/api';
let allRestaurants = [], currentFilter = 'all';
let selectedRestaurantId = null, selectedTime = null, selectedZoneId = null;
let authToken = localStorage.getItem('token');
let currentLang = localStorage.getItem('lang') || 'uz';
let menuItems = [], preOrder = {};
let currentStep = 1;

// ── i18n ─────────────────────────────────────────────────────
const i18n = {
  uz: {
    all:'Hammasi', european:'Evropa', asian:'Osiyo',
    loading:'Yuklanmoqda...', error:'Xatolik', not_found:'Restoran topilmadi',
    no_bookings:'Bronlar yo\'q', my_bookings:'📅 Bronlarim',
    profile:'👤 Profil', home:'Bosh sahifa', bookings:'Bronlarim',
    reserve:'Bron', view:'Ko\'rish', search_ph:'Restoran qidiring...',
    person: n=>`${n} kishi`,
    success:'✅ Bron qilindi!', err_login:'❌ Botni qayta oching!',
    err_server:'❌ Server xatoligi!', err_busy:'❌ Bu vaqt band!',
    cancel_confirm:'Bronni bekor qilasizmi?',
    cancelled:'🗑 Bekor qilindi', cancel_fail:'❌ Bekor qilib bo\'lmadi',
    st_confirmed:'✅ Tasdiqlangan', st_pending:'⏳ Kutilmoqda', st_cancelled:'❌ Bekor',
    cancel_btn:'Bekor qilish', view_bookings:'📅 Bronlarimni ko\'rish',
    sending:'Yuborilmoqda...',
  },
  ru: {
    all:'Все', european:'Европа', asian:'Азия',
    loading:'Загрузка...', error:'Ошибка', not_found:'Рестораны не найдены',
    no_bookings:'Нет броней', my_bookings:'📅 Мои брони',
    profile:'👤 Профиль', home:'Главная', bookings:'Брони',
    reserve:'Бронь', view:'Смотреть', search_ph:'Поиск...',
    person: n=>`${n} чел.`,
    success:'✅ Забронировано!', err_login:'❌ Перезапустите бота!',
    err_server:'❌ Ошибка сервера!', err_busy:'❌ Время занято!',
    cancel_confirm:'Отменить бронирование?',
    cancelled:'🗑 Отменено', cancel_fail:'❌ Не удалось отменить',
    st_confirmed:'✅ Подтверждено', st_pending:'⏳ Ожидание', st_cancelled:'❌ Отменено',
    cancel_btn:'Отменить', view_bookings:'📅 Мои бронирования',
    sending:'Отправляется...',
  },
  en: {
    all:'All', european:'European', asian:'Asian',
    loading:'Loading...', error:'Error', not_found:'No restaurants found',
    no_bookings:'No bookings', my_bookings:'📅 My Bookings',
    profile:'👤 Profile', home:'Home', bookings:'Bookings',
    reserve:'Book', view:'View', search_ph:'Search...',
    person: n=>`${n} ${n===1?'person':'people'}`,
    success:'✅ Booked!', err_login:'❌ Reopen the bot!',
    err_server:'❌ Server error!', err_busy:'❌ Time taken!',
    cancel_confirm:'Cancel booking?',
    cancelled:'🗑 Cancelled', cancel_fail:'❌ Could not cancel',
    st_confirmed:'✅ Confirmed', st_pending:'⏳ Pending', st_cancelled:'❌ Cancelled',
    cancel_btn:'Cancel', view_bookings:'📅 View bookings',
    sending:'Sending...',
  }
};
const T=(k,a)=>{const v=i18n[currentLang][k];return typeof v==='function'?v(a):v||k;};

function setLang(lang){
  currentLang=lang; localStorage.setItem('lang',lang);
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  applyT(); filterRestaurants();
}
function applyT(){
  document.getElementById('searchInput').placeholder=T('search_ph');
  document.querySelector('[data-i18n="all"]').textContent=T('all');
  document.querySelector('[data-i18n="european"]').textContent=T('european');
  document.querySelector('[data-i18n="asian"]').textContent=T('asian');
  document.querySelector('#bookingsPage h2').textContent=T('my_bookings');
  document.querySelector('#profilePage h2').textContent=T('profile');
  document.getElementById('nav-home-txt').textContent=T('home');
  document.getElementById('nav-bookings-txt').textContent=T('bookings');
  document.getElementById('nav-profile-txt').textContent=T('profile');
  buildGuests();
}
function buildGuests(){
  const s=document.getElementById('resGuests'),v=s.value||'2';
  s.innerHTML=[1,2,3,4,5,6].map(n=>`<option value="${n}"${n==v?' selected':''}>${T('person',n)}${n===6?'+':''}</option>`).join('');
}

// ── Toast ────────────────────────────────────────────────────
function showToast(msg,ms=2500){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),ms);
}

// ── Auth ─────────────────────────────────────────────────────
async function autoLogin(){
  try{
    const user=tg.initDataUnsafe?.user; if(!user) return;
    const r=await fetch(`${API_URL}/auth/telegram`,{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({telegram_id:user.id,username:user.username,first_name:user.first_name,last_name:user.last_name})});
    const d=await r.json();
    if(d.token){authToken=d.token;localStorage.setItem('token',d.token);}
  }catch(e){}
}

// ── Restoranlar ──────────────────────────────────────────────
async function loadRestaurants(){
  try{
    const r=await fetch(`${API_URL}/restaurants`);
    allRestaurants=await r.json();
    renderRestaurants(allRestaurants);
  }catch(e){document.getElementById('restaurantList').innerHTML=`<div class="loading">${T('error')}</div>`;}
}
function renderRestaurants(list){
  const c=document.getElementById('restaurantList');
  if(!list.length){c.innerHTML=`<div class="loading">${T('not_found')}</div>`;return;}
  c.innerHTML=list.map(r=>`
    <div class="card">
      <img src="${r.image_url||'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'}" alt="${r.name}"
           onerror="this.src='https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=400'">
      <div class="card-body">
        <div class="card-name">${r.name}</div>
        <div class="card-meta">${r.cuisine?r.cuisine.join(', '):''} • ${r.price_category||''} • ${r.address||''}</div>
        <div class="card-footer">
          <span class="rating">⭐ ${r.rating||'4.5'}</span>
          <div class="card-btns">
            <button class="btn-reserve" onclick="openReserve(${r.id},'${r.name.replace(/'/g,"\\'")}')">
              📅 ${T('reserve')}
            </button>
          </div>
        </div>
      </div>
    </div>`).join('');
}
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); filterRestaurants();
}
function filterRestaurants(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let f=allRestaurants;
  if(currentFilter!=='all') f=f.filter(r=>(r.cuisine&&r.cuisine.includes(currentFilter))||r.price_category===currentFilter);
  if(q) f=f.filter(r=>r.name.toLowerCase().includes(q));
  renderRestaurants(f);
}

// ── Modal & Steps ────────────────────────────────────────────
function openReserve(id,name){
  selectedRestaurantId=id; selectedTime=null; selectedZoneId=null; preOrder={};
  document.getElementById('modalTitle').textContent=`🍽 ${name}`;
  const today=new Date().toISOString().split('T')[0];
  document.getElementById('resDate').value=today;
  document.getElementById('resDate').min=today;
  document.getElementById('resComment').value='';
  document.getElementById('reserveModal').classList.add('open');
  buildGuests(); goStep(1); loadZones();
}
function closeModal(){
  document.getElementById('reserveModal').classList.remove('open');
  selectedTime=null; selectedZoneId=null; preOrder={};
}
function goStep(n){
  currentStep=n;
  document.querySelectorAll('.step-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(`step-${n}`).classList.add('active');
  for(let i=1;i<=3;i++){
    const el=document.getElementById(`step-ind-${i}`);
    el.className='step'+(i===n?' active':i<n?' done':'');
  }
}
function goStep2(){
  if(!selectedZoneId){showToast('⚠️ Zona tanlang!');return;}
  goStep(2); loadTimeSlots();
}
function goStep3(){
  if(!selectedTime){showToast('⚠️ Vaqt tanlang!');return;}
  goStep(3); loadMenu();
}

// ── Zonalar ──────────────────────────────────────────────────
async function loadZones(){
  const grid=document.getElementById('zonesGrid');
  grid.innerHTML='<div class="slot-loading" style="grid-column:1/-1">Yuklanmoqda...</div>';
  try{
    const r=await fetch(`${API_URL}/restaurants/${selectedRestaurantId}/zones`);
    const zones=await r.json();
    if(!zones.length){
      // Zona yo'q bo'lsa default ko'rsat
      grid.innerHTML=`
        <div class="zone-card selected" onclick="selectZone(null,'Asosiy zal',this)">
          <div class="zone-icon">🪑</div>
          <div class="zone-name">Asosiy zal</div>
          <div class="zone-desc">Standart joy</div>
        </div>`;
      selectedZoneId='default';
      document.getElementById('btnStep1').disabled=false;
      return;
    }
    grid.innerHTML=zones.map(z=>`
      <div class="zone-card" onclick="selectZone(${z.id},'${z.name}',this)">
        <div class="zone-icon">${z.icon||'🪑'}</div>
        <div class="zone-name">${z.name}</div>
        <div class="zone-desc">${z.description||''}</div>
        <div class="zone-cap">👥 max ${z.capacity} kishi</div>
      </div>`).join('');
  }catch(e){
    grid.innerHTML='<div class="slot-loading" style="grid-column:1/-1">Zonalar yuklanmadi</div>';
  }
}
function selectZone(id,name,el){
  document.querySelectorAll('.zone-card').forEach(z=>z.classList.remove('selected'));
  el.classList.add('selected');
  selectedZoneId=id;
  document.getElementById('btnStep1').disabled=false;
}

// ── Vaqt slotlari ────────────────────────────────────────────
async function loadTimeSlots(){
  const date=document.getElementById('resDate').value; if(!date) return;
  selectedTime=null;
  document.getElementById('btnStep2').disabled=true;
  const c=document.getElementById('timeSlots');
  c.innerHTML='<div class="slot-loading">⏳ Vaqtlar yuklanmoqda...</div>';
  const slots=[];
  for(let h=10;h<=21;h++){slots.push(`${String(h).padStart(2,'0')}:00`);slots.push(`${String(h).padStart(2,'0')}:30`);}
  slots.push('22:00');
  let busy=[];
  try{
    const r=await fetch(`${API_URL}/restaurants/${selectedRestaurantId}/availability?date=${date}`);
    if(r.ok){const d=await r.json();busy=Array.isArray(d)?d:(d.busy_times||[]);}
  }catch(e){}
  const now=new Date(), isToday=new Date(date).toDateString()===now.toDateString();
  c.innerHTML=slots.map(s=>{
    const isBusy=busy.includes(s);
    let isPast=false;
    if(isToday){const[h,m]=s.split(':').map(Number);isPast=(h*60+m)<(now.getHours()*60+now.getMinutes()+60);}
    const dis=isBusy||isPast;
    return `<div class="slot${dis?' slot-busy':''}" onclick="${dis?'':` selectSlot('${s}',this)`}">${s}</div>`;
  }).join('');
}
function selectSlot(time,el){
  document.querySelectorAll('.slot.selected').forEach(s=>s.classList.remove('selected'));
  el.classList.add('selected'); selectedTime=time;
  document.getElementById('btnStep2').disabled=false;
}

// ── Menyu (oldindan zakaz) ───────────────────────────────────
async function loadMenu(){
  const c=document.getElementById('menuList');
  c.innerHTML='<div class="loading">Menyu yuklanmoqda...</div>';
  try{
    const r=await fetch(`${API_URL}/restaurants/${selectedRestaurantId}/menu`);
    menuItems=await r.json();
    if(!menuItems.length){
      c.innerHTML='<div style="text-align:center;color:#94a3b8;padding:20px;">Menyu mavjud emas<br><small>Bron qilishni davom ettiring</small></div>';
      document.getElementById('orderTotal').style.display='none';
      return;
    }
    renderMenu();
  }catch(e){
    c.innerHTML='<div style="text-align:center;color:#94a3b8;padding:20px;">Menyu yuklanmadi</div>';
  }
}
function renderMenu(){
  const cats={};
  menuItems.forEach(item=>{
    const cat=item.category||'Boshqa';
    if(!cats[cat]) cats[cat]=[];
    cats[cat].push(item);
  });
  document.getElementById('menuList').innerHTML=Object.entries(cats).map(([cat,items])=>`
    <div class="menu-section">
      <div class="menu-section-title">${cat}</div>
      ${items.map(item=>`
        <div class="menu-item-row">
          <div class="menu-item-info">
            <div class="name">${item.name}</div>
            <div class="price">${Number(item.price).toLocaleString()} so'm</div>
          </div>
          <div class="qty-control">
            <button class="qty-btn" onclick="changeQty(${item.id},-1)">−</button>
            <span class="qty-num" id="qty-${item.id}">${preOrder[item.id]||0}</span>
            <button class="qty-btn" onclick="changeQty(${item.id},1)">+</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
  updateTotal();
}
function changeQty(id,delta){
  const current=preOrder[id]||0;
  const newVal=Math.max(0,current+delta);
  if(newVal===0) delete preOrder[id]; else preOrder[id]=newVal;
  const el=document.getElementById(`qty-${id}`);
  if(el) el.textContent=newVal;
  updateTotal();
}
function updateTotal(){
  const total=Object.entries(preOrder).reduce((sum,[id,qty])=>{
    const item=menuItems.find(m=>m.id==id);
    return sum+(item?item.price*qty:0);
  },0);
  const el=document.getElementById('orderTotal');
  if(total>0){
    el.style.display='flex';
    document.getElementById('totalAmount').textContent=total.toLocaleString()+' so\'m';
  } else {
    el.style.display='none';
  }
}

// ── Bron yuborish ────────────────────────────────────────────
async function submitReservation(){
  if(!authToken){showToast(T('err_login'));return;}
  const date=document.getElementById('resDate').value;
  const guests=document.getElementById('resGuests').value;
  const comment=document.getElementById('resComment').value;
  const btn=document.getElementById('btnSubmit');
  btn.disabled=true;
  btn.innerHTML=`<span class="spinner"></span>${T('sending')}`;

  // Pre-order formatlash
  const preOrderList=Object.entries(preOrder).map(([id,qty])=>{
    const item=menuItems.find(m=>m.id==id);
    return {id:parseInt(id),name:item?.name,qty,price:item?.price};
  });

  try{
    const r=await fetch(`${API_URL}/reservations`,{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${authToken}`},
      body:JSON.stringify({
        restaurant_id:selectedRestaurantId,
        zone_id:selectedZoneId==='default'?null:selectedZoneId,
        date, time:selectedTime,
        guests:parseInt(guests),
        comment,
        pre_order:preOrderList
      })});
    const d=await r.json();
    if(d.id||r.ok){
      closeModal();
      showToast(T('success'));
      setTimeout(()=>showPage('bookings'),800);
    } else {
      btn.disabled=false;
      btn.textContent='✅ Bron qilish';
      showToast('❌ '+(d.error||T('err_server')));
    }
  }catch(e){
    btn.disabled=false;
    btn.textContent='✅ Bron qilish';
    showToast(T('err_server'));
  }
}

// ── Bronlarim ────────────────────────────────────────────────
async function loadBookings(){
  if(!authToken){document.getElementById('bookingsList').innerHTML=`<div class="loading">${T('err_login')}</div>`;return;}
  document.getElementById('bookingsList').innerHTML=`<div class="loading">${T('loading')}</div>`;
  try{
    const r=await fetch(`${API_URL}/reservations/my`,{headers:{'Authorization':`Bearer ${authToken}`}});
    const data=await r.json();
    if(!data.length){
      document.getElementById('bookingsList').innerHTML='<div class="loading"><div style="font-size:40px;margin-bottom:12px;">📭</div><div>Bronlar yo\'q</div></div>';
      return;
    }
    const stCls={confirmed:'status-confirmed',pending:'status-pending',cancelled:'status-cancelled'};
    document.getElementById('bookingsList').innerHTML=data.sort((a,b)=>new Date(b.date)-new Date(a.date)).map(b=>{
      const s=b.status||'pending';
      const canCancel=new Date(b.date)>=new Date()&&s!=='cancelled';
      const preOrderItems=b.pre_order&&b.pre_order.length?b.pre_order:null;
      return `<div class="reservation-card">
        <div class="res-name">${b.restaurant_name||b.name||'Restaurant'}</div>
        <div class="res-info">📅 ${fmtDate(b.date)} • ⏰ ${b.time} • 👥 ${T('person',b.guests)}</div>
        ${b.zone_name?`<div class="res-info">🏠 <span class="zone-badge">${b.zone_name}</span></div>`:''}
        ${b.address?`<div class="res-info">📍 ${b.address}</div>`:''}
        ${b.comment?`<div class="res-info">💬 ${b.comment}</div>`:''}
        ${preOrderItems?`<div class="res-info">🍽 <span class="pre-order-badge">${preOrderItems.length} ta taom zakazlangan</span></div>`:''}
        <div class="res-footer">
          <span class="res-status ${stCls[s]||'status-pending'}">${T('st_'+s)||T('st_pending')}</span>
          ${canCancel?`<button class="btn-cancel-res" onclick="cancelRes(${b.id})">${T('cancel_btn')}</button>`:''}
        </div>
      </div>`;
    }).join('');
  }catch(e){document.getElementById('bookingsList').innerHTML=`<div class="loading">${T('error')}</div>`;}
}

async function cancelRes(id){
  if(!confirm(T('cancel_confirm'))) return;
  try{
    const r=await fetch(`${API_URL}/reservations/${id}`,{method:'DELETE',headers:{'Authorization':`Bearer ${authToken}`}});
    if(r.ok){showToast(T('cancelled'));loadBookings();}
    else showToast(T('cancel_fail'));
  }catch(e){showToast(T('error'));}
}

function fmtDate(s){
  const d=new Date(s);
  if(currentLang==='uz'){const m=['Yan','Feb','Mar','Apr','May','Iyn','Iyl','Avg','Sen','Okt','Noy','Dek'];return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()}`;}
  return d.toLocaleDateString(currentLang==='ru'?'ru-RU':'en-GB',{day:'numeric',month:'short',year:'numeric'});
}

// ── Sahifalar ────────────────────────────────────────────────
function showPage(page){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(page==='home'){document.getElementById('homePage').classList.add('active');document.getElementById('nav-home').classList.add('active');}
  if(page==='bookings'){document.getElementById('bookingsPage').classList.add('active');document.getElementById('nav-bookings').classList.add('active');loadBookings();}
  if(page==='profile'){
    document.getElementById('profilePage').classList.add('active');document.getElementById('nav-profile').classList.add('active');
    const user=tg.initDataUnsafe?.user;
    document.getElementById('profileInfo').innerHTML=user?`
      <div style="font-size:48px;text-align:center;margin-bottom:12px;">👤</div>
      <div style="text-align:center;font-size:18px;font-weight:600;">${user.first_name} ${user.last_name||''}</div>
      <div style="text-align:center;color:#64748b;margin-top:4px;margin-bottom:16px;">@${user.username||''}</div>
      <button onclick="showPage('bookings')" style="width:100%;background:#f1f5f9;border:none;padding:12px;border-radius:10px;font-size:14px;cursor:pointer;">${T('view_bookings')}</button>
    `:`<div class="loading">${T('error')}</div>`;
  }
}

// ── Init ─────────────────────────────────────────────────────
applyT();
const tgLang=tg.initDataUnsafe?.user?.language_code;
if(tgLang&&!localStorage.getItem('lang')){
  if(tgLang.startsWith('ru')) setLang('ru');
  else if(tgLang.startsWith('en')) setLang('en');
}
autoLogin();
loadRestaurants();
</script>
